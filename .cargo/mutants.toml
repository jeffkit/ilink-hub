# ── 排除特定变异模式（减少噪音）──────────────────────────────────────
# 日志调用的变异不影响业务语义
exclude_re = [
    "tracing::",
    "warn!",
    "info!",
    "debug!",
    "error!",
    # ── 已知"良性 missed mutants"（文档化决策，无需补测）──────────────
    # 1. resp.ret match guard / 比较变异（commands.rs / dispatch.rs）：
    #    `resp.ret.map(|r| r != 0).unwrap_or(false)` 只控制走哪条日志分支
    #    （error!/warn! vs debug!/noop），对系统状态无影响。
    #    要捕获需要 log-interception，成本 >> 收益。
    "resp.ret.map",
    # 同路径上的 `r != 0` → `r == 0`（变异体名不含 map，需单独排除）
    "replace != with == in handle_hub_command",
    "replace != with == in dispatch_message",
    # 2. pairing.rs 时间边界变异（> vs >=）：
    #    `created_at.elapsed() > PAIRING_TTL` 等使用 std::time::Instant，
    #    无法通过 tokio::time::pause() 控制。>= 边界（差 1 纳秒）在业务上无意义。
    #    若要捕获需将 Instant 改为可注入依赖，改动大于收益。
    "elapsed() > PAIRING_TTL",
    "elapsed() > SCANNED_TTL",
    "elapsed() > CONFIRMED_TTL",
    "elapsed() < CONFIRMED_TTL",
    # 3. login.rs poll 计数 `attempts += 1`：
    #    现有成功路径只轮询 1 次；`+=` → `*=` 在 attempts=0 时仍为 0，但单次成功路径
    #    观察不到差异。要捕获需 mock 60 次 wait + 驱动 tokio 时钟，成本 >> 收益。
    #    exclude_re 匹配的是变异体名称（如 "replace += with *="），不是源码文本。
    "replace \\+= with \\*=",
    # 4. sse_ticket.rs Instant 过期比较（> vs >= / == / <）：
    #    `*exp > now` 使用 std::time::Instant，无法用 tokio::time::pause 控制。
    #    纳秒级边界在业务上无意义；已有「强制改写 Instant 到过去」的过期测试覆盖语义。
    #    匹配变异体名：replace > with {==,<,>=} in SseTicketStore::{issue,consume}
    "replace > with (==|<|>=) in SseTicketStore::",
]
