name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ilink-hub

permissions:
  contents: write
  packages: write

jobs:
  # ─── Build native binaries ────────────────────────────────────────────────
  build-native:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: ilink-hub-linux-x86_64
            bridge_asset: ilink-hub-bridge-linux-x86_64
            use_cross: true

          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: ilink-hub-linux-aarch64
            bridge_asset: ilink-hub-bridge-linux-aarch64
            use_cross: true

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            asset_name: ilink-hub-macos-x86_64
            bridge_asset: ilink-hub-bridge-macos-x86_64
            use_cross: false

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            asset_name: ilink-hub-macos-aarch64
            bridge_asset: ilink-hub-bridge-macos-aarch64
            use_cross: false

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: ilink-hub-windows-x86_64.exe
            bridge_asset: ilink-hub-bridge-windows-x86_64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux only)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --target ${{ matrix.target }} --release

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --target ${{ matrix.target }} --release

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
             ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" `
                    "${{ matrix.asset_name }}"

      - name: Rename bridge (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp "target/${{ matrix.target }}/release/ilink-hub-bridge" "${{ matrix.bridge_asset }}"
          chmod +x "${{ matrix.bridge_asset }}"

      - name: Rename bridge (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/ilink-hub-bridge.exe" `
                    "${{ matrix.bridge_asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bridge_asset }}
          path: ${{ matrix.bridge_asset }}
          retention-days: 1

  # ─── Desktop (Tauri) installers ───────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            ext: dmg
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
            ext: dmg
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
            ext: msi
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb
            ext: deb

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/ilink-hub-desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo (Tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/ilink-hub-desktop/src-tauri
          key: desktop-${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: desktop/ilink-hub-desktop
        run: npm ci

      - name: Build Tauri
        working-directory: desktop/ilink-hub-desktop
        env:
          CI: true
        run: npm run tauri build -- --ci --target ${{ matrix.target }} -b ${{ matrix.bundle }}

      - name: Stage desktop bundle (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          BUNDLE: ${{ matrix.bundle }}
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          ROOT="desktop/ilink-hub-desktop/src-tauri/target/${TARGET}/release/bundle"
          mkdir -p staging
          shopt -s nullglob
          case "$BUNDLE" in
            dmg) files=("$ROOT"/dmg/*.dmg) ;;
            deb) files=("$ROOT"/deb/*.deb) ;;
            *) echo "Unknown bundle: $BUNDLE"; exit 1 ;;
          esac
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No bundle under $ROOT"
            find "$ROOT" -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp "${files[0]}" "staging/ilink-hub-desktop-${NAME}.${EXT}"
          ls -lh "staging/ilink-hub-desktop-${NAME}.${EXT}"

      - name: Stage desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: |
          $root = "desktop/ilink-hub-desktop/src-tauri/target/$env:TARGET/release/bundle/msi"
          if (-not (Test-Path $root)) {
            Get-ChildItem -Recurse "desktop/ilink-hub-desktop/src-tauri/target/$env:TARGET/release/bundle" -ErrorAction SilentlyContinue |
              Select-Object -First 50 | Format-Table
            throw "MSI directory not found: $root"
          }
          New-Item -ItemType Directory -Force staging | Out-Null
          $msi = Get-ChildItem "$root/*.msi" | Select-Object -First 1
          if (-not $msi) { throw "No MSI under $root" }
          Copy-Item $msi.FullName "staging/ilink-hub-desktop-$env:NAME.$env:EXT"
          Get-Item "staging/ilink-hub-desktop-$env:NAME.$env:EXT" | Format-List *

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ilink-hub-desktop-${{ matrix.name }}
          path: staging/ilink-hub-desktop-${{ matrix.name }}.${{ matrix.ext }}
          retention-days: 1

  # ─── Docker image ─────────────────────────────────────────────────────────
  docker:
    name: Docker (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Publish to crates.io ────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} || true

  # ─── Publish Node.js SDK to npm ──────────────────────────────────────────
  publish-npm:
    name: Publish sdk/node to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/node
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (if any)
        run: npm install --ignore-scripts 2>/dev/null || true

      - name: Run tests
        run: npm test

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ─── GitHub Release ───────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-native, publish-crates, build-desktop, publish-npm]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ### Desktop app (Tauri)

            Prebuilt installers are attached as `ilink-hub-desktop-*` assets (macOS `.dmg` Apple Silicon + Intel, Windows `.msi`, Linux `.deb`). Unsigned macOS builds may require **right-click → Open** the first time. Linux: `sudo apt install ./ilink-hub-desktop-linux-x86_64.deb` (or use your package manager). Same Hub behavior as `ilink-hub serve`; see [docs](https://jeffkit.github.io/ilink-hub/guide/installation#desktop).

            ### Linux / macOS — download binary

            ```bash
            # Linux x86_64
            curl -Lo ilink-hub https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ilink-hub-linux-x86_64
            chmod +x ilink-hub && sudo mv ilink-hub /usr/local/bin/

            # macOS Apple Silicon
            curl -Lo ilink-hub https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ilink-hub-macos-aarch64
            chmod +x ilink-hub && sudo mv ilink-hub /usr/local/bin/
            ```

            ### Docker

            ```bash
            docker run -d -p 8765:8765 -v ilink-hub-data:/data \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Cargo

            ```bash
            cargo install ilink-hub
            ```

            ### ilink-hub-bridge (per platform)

            Same release tag includes `ilink-hub-bridge-*` assets. Example (macOS arm64):

            ```bash
            curl -LO "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ilink-hub-bridge-macos-aarch64"
            chmod +x ilink-hub-bridge-macos-aarch64 && sudo mv ilink-hub-bridge-macos-aarch64 /usr/local/bin/ilink-hub-bridge
            ```

            Omit `--token` and scan the Hub pairing QR on first run; credentials default to `~/.ilink-hub/bridge-credentials.json`.

            ## Quick Start

            ```bash
            ilink-hub serve --addr 0.0.0.0:8765          # QR login on first start if needed
            ilink-hub register --name my-ai              # register a backend
            # open http://your-hub:8765/hub/ui           # web admin panel
            ```
