name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ilink-hub

permissions:
  contents: write
  packages: write

jobs:
  # ─── Build native binaries ────────────────────────────────────────────────
  build-native:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: ilink-hub-linux-x86_64
            bridge_asset: ilink-hub-bridge-linux-x86_64
            use_cross: true

          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: ilink-hub-linux-aarch64
            bridge_asset: ilink-hub-bridge-linux-aarch64
            use_cross: true

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            asset_name: ilink-hub-macos-x86_64
            bridge_asset: ilink-hub-bridge-macos-x86_64
            use_cross: false

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            asset_name: ilink-hub-macos-aarch64
            bridge_asset: ilink-hub-bridge-macos-aarch64
            use_cross: false

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: ilink-hub-windows-x86_64.exe
            bridge_asset: ilink-hub-bridge-windows-x86_64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux only)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --target ${{ matrix.target }} --release --all-features

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --target ${{ matrix.target }} --release --all-features

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
             ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" `
                    "${{ matrix.asset_name }}"

      - name: Rename bridge (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp "target/${{ matrix.target }}/release/ilink-hub-bridge" "${{ matrix.bridge_asset }}"
          chmod +x "${{ matrix.bridge_asset }}"

      - name: Rename bridge (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/ilink-hub-bridge.exe" `
                    "${{ matrix.bridge_asset }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bridge_asset }}
          path: ${{ matrix.bridge_asset }}
          retention-days: 1

  # ─── Desktop (Tauri) installers ───────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # Desktop (Tauri) installers are intentionally skipped for the 0.3.0 release:
    # this release ships hub + bridge + manager only (no desktop). Re-enable by
    # removing the `if: false` below. The job remains best-effort
    # (continue-on-error) and is NOT a dependency of create-release /
    # update-homebrew-tap, so even when enabled it cannot block the release.
    if: false
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
            ext: dmg
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
            ext: dmg
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
            ext: msi
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle: deb
            ext: deb

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/ilink-hub-desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo (Tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/ilink-hub-desktop/src-tauri
          key: desktop-${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: desktop/ilink-hub-desktop
        run: npm ci

      - name: Build Tauri
        working-directory: desktop/ilink-hub-desktop
        env:
          CI: true
        run: npm run tauri build -- --ci --target ${{ matrix.target }} -b ${{ matrix.bundle }}

      - name: Stage desktop bundle (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        env:
          BUNDLE: ${{ matrix.bundle }}
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          ROOT="desktop/ilink-hub-desktop/src-tauri/target/${TARGET}/release/bundle"
          mkdir -p staging
          shopt -s nullglob
          case "$BUNDLE" in
            dmg) files=("$ROOT"/dmg/*.dmg) ;;
            deb) files=("$ROOT"/deb/*.deb) ;;
            *) echo "Unknown bundle: $BUNDLE"; exit 1 ;;
          esac
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No bundle under $ROOT"
            find "$ROOT" -type f 2>/dev/null | head -80 || true
            exit 1
          fi
          cp "${files[0]}" "staging/ilink-hub-desktop-${NAME}.${EXT}"
          ls -lh "staging/ilink-hub-desktop-${NAME}.${EXT}"

      - name: Stage desktop bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        run: |
          $root = "desktop/ilink-hub-desktop/src-tauri/target/$env:TARGET/release/bundle/msi"
          if (-not (Test-Path $root)) {
            Get-ChildItem -Recurse "desktop/ilink-hub-desktop/src-tauri/target/$env:TARGET/release/bundle" -ErrorAction SilentlyContinue |
              Select-Object -First 50 | Format-Table
            throw "MSI directory not found: $root"
          }
          New-Item -ItemType Directory -Force staging | Out-Null
          $msi = Get-ChildItem "$root/*.msi" | Select-Object -First 1
          if (-not $msi) { throw "No MSI under $root" }
          Copy-Item $msi.FullName "staging/ilink-hub-desktop-$env:NAME.$env:EXT"
          Get-Item "staging/ilink-hub-desktop-$env:NAME.$env:EXT" | Format-List *

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ilink-hub-desktop-${{ matrix.name }}
          path: staging/ilink-hub-desktop-${{ matrix.name }}.${{ matrix.ext }}
          retention-days: 1

  # ─── Publish to crates.io ────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} || true

  # ─── GitHub Release ───────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Only require the native hub/bridge binaries + crates publish. The desktop
    # (Tauri) build is best-effort and intentionally NOT a dependency, so a desktop
    # failure can no longer skip the release and starve the Homebrew tap update
    # (which is what kept brew stuck on an old version).
    needs: [build-native, publish-crates]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            > This release ships **hub + bridge + manager** only (no desktop app).

            ### Linux / macOS — download binary

            ```bash
            # Linux x86_64
            curl -Lo ilink-hub https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ilink-hub-linux-x86_64
            chmod +x ilink-hub && sudo mv ilink-hub /usr/local/bin/

            # macOS Apple Silicon
            curl -Lo ilink-hub https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ilink-hub-macos-aarch64
            chmod +x ilink-hub && sudo mv ilink-hub /usr/local/bin/
            ```

            ### Docker

            ```bash
            docker run -d -p 8765:8765 -v ilink-hub-data:/data \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Cargo

            ```bash
            cargo install ilink-hub
            ```

            ### ilink-hub-bridge (per platform)

            Same release tag includes `ilink-hub-bridge-*` assets. Example (macOS arm64):

            ```bash
            curl -LO "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ilink-hub-bridge-macos-aarch64"
            chmod +x ilink-hub-bridge-macos-aarch64 && sudo mv ilink-hub-bridge-macos-aarch64 /usr/local/bin/ilink-hub-bridge
            ```

            Omit `--token` and scan the Hub pairing QR on first run; credentials default to `~/.ilink-hub/bridge-credentials.json`.

            ## Quick Start

            ```bash
            ilink-hub serve --addr 0.0.0.0:8765          # QR login on first start if needed
            ilink-hub register --name my-ai              # register a backend
            # open http://your-hub:8765/hub/ui           # web admin panel
            ```

  # ─── Update Homebrew Tap ─────────────────────────────────────────────────
  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [create-release]
    steps:
      - name: Download macOS binaries from release
        run: |
          VERSION="${{ github.ref_name }}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${VERSION}"
          curl -fsSLo ilink-hub-macos-aarch64        "${BASE}/ilink-hub-macos-aarch64"
          curl -fsSLo ilink-hub-macos-x86_64         "${BASE}/ilink-hub-macos-x86_64"
          curl -fsSLo ilink-hub-bridge-macos-aarch64 "${BASE}/ilink-hub-bridge-macos-aarch64"
          curl -fsSLo ilink-hub-bridge-macos-x86_64  "${BASE}/ilink-hub-bridge-macos-x86_64"

      - name: Compute SHA256
        id: sha
        run: |
          echo "arm64=$(sha256sum ilink-hub-macos-aarch64        | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86=$(sha256sum   ilink-hub-macos-x86_64         | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "arm64_bridge=$(sha256sum ilink-hub-bridge-macos-aarch64 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "x86_bridge=$(sha256sum   ilink-hub-bridge-macos-x86_64  | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: jeffkit/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Formula
        env:
          VERSION: ${{ github.ref_name }}
          ARM64:        ${{ steps.sha.outputs.arm64 }}
          X86:          ${{ steps.sha.outputs.x86 }}
          ARM64_BRIDGE: ${{ steps.sha.outputs.arm64_bridge }}
          X86_BRIDGE:   ${{ steps.sha.outputs.x86_bridge }}
        run: |
          VER="${VERSION#v}"
          FORMULA="homebrew-tap/Formula/ilink-hub.rb"
          cat > "$FORMULA" <<RUBY
          # typed: false
          # frozen_string_literal: true

          class IlinkHub < Formula
            desc "iLink-compatible multiplexer hub for WeChat ClawBot — connect one WeChat account to multiple AI agent backends"
            homepage "https://jeffkit.github.io/ilink-hub/"
            version "${VER}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/jeffkit/ilink-hub/releases/download/${VERSION}/ilink-hub-macos-aarch64"
                sha256 "${ARM64}"

                resource "ilink_hub_bridge" do
                  url "https://github.com/jeffkit/ilink-hub/releases/download/${VERSION}/ilink-hub-bridge-macos-aarch64"
                  sha256 "${ARM64_BRIDGE}"
                end
              else
                url "https://github.com/jeffkit/ilink-hub/releases/download/${VERSION}/ilink-hub-macos-x86_64"
                sha256 "${X86}"

                resource "ilink_hub_bridge" do
                  url "https://github.com/jeffkit/ilink-hub/releases/download/${VERSION}/ilink-hub-bridge-macos-x86_64"
                  sha256 "${X86_BRIDGE}"
                end
              end
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "ilink-hub-macos-aarch64" => "ilink-hub"
                resource("ilink_hub_bridge").stage do
                  bin.install "ilink-hub-bridge-macos-aarch64" => "ilink-hub-bridge"
                end
              elsif OS.mac?
                bin.install "ilink-hub-macos-x86_64" => "ilink-hub"
                resource("ilink_hub_bridge").stage do
                  bin.install "ilink-hub-bridge-macos-x86_64" => "ilink-hub-bridge"
                end
              end
            end

            # brew services start jeffkit/tap/ilink-hub
            # Runs ilink-hub-bridge in manager mode; manages all bridge profiles automatically.
            #
            # Required after install:
            #   Edit ~/Library/LaunchAgents/homebrew.mxcl.ilink-hub.plist and add:
            #     WEIXIN_BASE_URL  → your Hub URL (e.g. http://your-server:8765)
            #     ILINK_ADMIN_TOKEN → admin token from Hub config
            service do
              run [opt_bin/"ilink-hub-bridge", "manager"]
              keep_alive true
              log_path var/"log/ilink-hub-bridge-manager.log"
              error_log_path var/"log/ilink-hub-bridge-manager-error.log"
              environment_variables(
                RUST_LOG:        "info,ilink_hub_bridge=debug",
                HOME:            Dir.home,
                WEIXIN_BASE_URL: "http://your-hub-server:8765",
                PATH:            "#{HOMEBREW_PREFIX}/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
              )
            end

            def caveats
              <<~EOS
                After starting the service, edit the LaunchAgent plist to set your Hub URL and admin token:
                  #{Dir.home}/Library/LaunchAgents/homebrew.mxcl.ilink-hub.plist

                Required environment variables:
                  WEIXIN_BASE_URL   → your Hub URL (e.g. http://your-server:8765)
                  ILINK_ADMIN_TOKEN → admin token from Hub config

                Then restart the service:
                  brew services restart jeffkit/tap/ilink-hub

                Bridge profiles and credentials are stored in:
                  ~/.ilink-hub-bridge/profiles/
                  ~/.ilink-hub-bridge/credentials/
              EOS
            end

            test do
              assert_match "ilink-hub", shell_output("#{bin}/ilink-hub --version")
              assert_match "ilink-hub-bridge", shell_output("#{bin}/ilink-hub-bridge --version")
            end
          end
          RUBY

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ilink-hub.rb
          git diff --cached --quiet || git commit -m "chore: bump ilink-hub to ${{ github.ref_name }}"
          git push
