name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ilink-hub

permissions:
  contents: write
  packages: write

jobs:
  # ─── Build native binaries ────────────────────────────────────────────────
  build-native:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: ilink-hub-linux-x86_64
            use_cross: true

          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: ilink-hub-linux-aarch64
            use_cross: true

          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            asset_name: ilink-hub-macos-x86_64
            use_cross: false

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            asset_name: ilink-hub-macos-aarch64
            use_cross: false

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: ilink-hub-windows-x86_64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux only)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --target ${{ matrix.target }} --release

      - name: Build (cargo)
        if: "!matrix.use_cross"
        run: cargo build --target ${{ matrix.target }} --release

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
             ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" `
                    "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          retention-days: 1

  # ─── Docker image ─────────────────────────────────────────────────────────
  docker:
    name: Docker (ghcr.io)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Publish to crates.io ────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

  # ─── GitHub Release ───────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-native, docker, publish-crates]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ### Linux / macOS — download binary

            ```bash
            # Linux x86_64
            curl -Lo ilink-hub https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ilink-hub-linux-x86_64
            chmod +x ilink-hub && sudo mv ilink-hub /usr/local/bin/

            # macOS Apple Silicon
            curl -Lo ilink-hub https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ilink-hub-macos-aarch64
            chmod +x ilink-hub && sudo mv ilink-hub /usr/local/bin/
            ```

            ### Docker

            ```bash
            docker run -d -p 8765:8765 -v ilink-hub-data:/data \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Cargo

            ```bash
            cargo install ilink-hub
            ```

            ## Quick Start

            ```bash
            ilink-hub login                              # scan WeChat QR
            ilink-hub serve --addr 0.0.0.0:8765          # start hub
            ilink-hub register --name my-ai              # register a backend
            # open http://your-hub:8765/hub/ui           # web admin panel
            ```
