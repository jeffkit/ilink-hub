name: Publish SDK to npm

on:
  # 随 release tag 自动触发
  push:
    tags:
      - 'v*'
  # 手动触发（补发 / 测试用）
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'node'
        type: choice
        options:
          - node

jobs:
  publish-node-sdk:
    name: Publish sdk/node to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/node
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Run tests
        run: npm test

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
