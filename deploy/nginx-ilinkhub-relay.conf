# ilinkhub.ai — pairing relay (replaces Tunely for phone binding)
# Install: /etc/nginx/sites-available/ilinkhub.ai

server {
    listen 80;
    server_name ilinkhub.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ilinkhub.ai;

    ssl_certificate /etc/letsencrypt/live/ilinkhub.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ilinkhub.ai/privkey.pem;

    access_log /var/log/nginx/ilinkhub_access.log;
    error_log /var/log/nginx/ilinkhub_error.log;

    client_max_body_size 1M;

    location /ws/pairing {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /pair/ {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8789/health;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
