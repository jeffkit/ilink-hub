# ilinkhub.ai — pairing relay (replaces Tunely for phone binding)
# Install: /etc/nginx/sites-available/ilinkhub.ai
#
# IMPORTANT — A-M3-6: the ilink-hub pair_confirm rate limiter keys on
# `(pairing_code, peer_ip)` where peer_ip is the immediate TCP peer
# (axum's `ConnectInfo`). When this nginx config terminates TLS and
# proxies to the backend, the immediate peer becomes 127.0.0.1 and the
# rate limit is effectively per-(pairing_code, nginx) — a single
# attacker behind the proxy can race unlimited requests.
#
# ilink-hub's pair_confirm handler does NOT currently consume
# X-Forwarded-For (an audit note from M3; see
# docs/exec-plans/active/todo-security-p1/reviews/m3/review-findings.yaml
# A-M3-6). Until the handler reads XFF, this file is the choke point:
#   * keep the proxying hop on loopback (already true here: 127.0.0.1);
#   * ensure the ilink-hub port is NOT exposed to the public internet
#     alongside nginx — only nginx may reach it.
# When ilink-hub gains XFF support, the trusted-proxy header below is
# what the handler will consume; honour only the leftmost untrusted
# entry (i.e. the entry added by the first trusted hop).

# Map: $proxy_add_x_forwarded_for appends $remote_addr to any
# X-Forwarded-For the client sent. We trust this nginx as the sole
# trusted hop in front of ilink-hub; the backend must use the leftmost
# XFF entry that is NOT one of the trusted proxy addresses.

server {
    listen 80;
    server_name ilinkhub.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ilinkhub.ai;

    ssl_certificate /etc/letsencrypt/live/ilinkhub.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ilinkhub.ai/privkey.pem;

    access_log /var/log/nginx/ilinkhub_access.log;
    error_log /var/log/nginx/ilinkhub_error.log;

    client_max_body_size 1M;

    location /ws/pairing {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /pair/ {
        proxy_pass http://127.0.0.1:8789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8789/health;
        proxy_set_header Host $host;
    }

    location / {
        return 404;
    }
}
