emory:` 已正确 `max_connectio","fixHint":"```rust   // 文件型 SQLite 同样 pin 到单连接，或设置 busy_timeout   let pool = if url.contains(\":memory:\") || url.starts_with(\"sqlite:\") {       sqlx::pool::PoolOptions::<sqlx::Any>::new()           .max_connections(1)           .connect(url).await?   } else {       AnyPool::connect(url).await?   };   ```   或通过连"},{"id":"E-03","title":"relay 客户端无 shutdown 信号，进程关闭时强制 kill","severity":"P1","files":["src/relay/client.rs:18-29"],"description":"`spawn_relay_client` 生成的 task 是无限重连 loop，没有 `watch::Receiver<bool>` shutdown 信号。Hub 关闭时该 task 被 tokio runtime 强制 drop，relay 服务端看到异常断开。对比 `spawn_health_checker`、`spawn_quote_index_evictor` 均正确使用了 `shut","fixHint":"在 `spawn_relay_client` 签名中加入 `shutdown_rx: watch::Receiver<bool>` 参数，loop 内的 sleep 和 run_session 均用 `tokio::select!` 包裹，命中 shutdown 时 `return`。"}]},{"name":"hub-1","priority":"P2","description":"hub 模块修复：SEC-002, SEC-012, SEC-014, LOCK-01, LOCK-02","items":[{"id":"SEC-002","title":"配对码 Scanned→Confirmed 60 秒重放窗口（CWE-613）","severity":"P2","files":["src/hub/pairing.rs:61-80"],"description":"配对码在 `Wait` → `Scanned` 转换后仍保有原始 600 秒 TTL，无次级截止时间。手机扫码到操作员确认之间存在最长 600 秒的窗口，观察到 QR 链接的第三方可以抢先调用 confirm。","fixHint":"进入 `Scanned` 状态时将 TTL 重置为 60 秒；`Confirmed` 后立即从 registry 删除该 code；限制同时存活的配对 session 数量（如 10 个）防止内存耗尽。"},{"id":"SEC-012","title":"LRU 淘汰后 vctx 可被不同对话复用（CWE-613）","severity":"P2","files":["src/hub/queue.rs:64-178","src/store/mod.rs:573-593"],"description":"`ContextTokenMap` LRU 达到 50,000 上限后会淘汰旧条目。被淘汰的 peer 下次发来消息时，`map_scoped` 为其创建新 `vctx_<uuid>`，向 DB 写入时若 unique index on `real_ctx` 不存在（pre-v3 迁移数据库），两个不同 vctx 会映射到同一 real_ctx，可能导致 sendmessage 向错误用户发送消息","fixHint":"在启动时断言 `idx_context_token_map_real_ctx` unique index 存在；`persist_context_token` 失败时（唯一约束冲突）记录 warn 而非静默忽略。"},{"id":"SEC-014","title":"InMemoryQueue slot 无总量上限（CWE-400）","severity":"P2","files":["src/hub/queue.rs:370-376"],"description":"`get_or_create` 为任意传入的 vtoken 字符串创建 slot，DashMap 无总条目上限。虽然 `getupdates` 路径有 registry 检查，但内部代码路径（如 dispatch 对已删除 vtoken 的 push）可绕过，长期运行会造成孤儿 slot 积累。","fixHint":"为 `InMemoryQueue` 增加最大 slot 数（如 1,000），超出时 `push` 返回 `Err(HubError::QueueBackend(\"queue slot limit exceeded\"))`。"},{"id":"LOCK-01","title":"health checker 持 registry.write() 执行 O(N) 扫描","severity":"P2","files":["src/hub/health.rs:27-31"],"description":"health checker 每 30 秒获取 `registry.write()` 锁，在持有写锁期间遍历所有客户端并修改 `online` 状态。写锁期间所有 `registry.read()` 调用（dispatch、getupdates、sendmessage）全部阻塞。客户端数量多时（N=100+）扫描可能耗时数毫秒，造成消息延迟抖动。","fixHint":"将 `ClientInfo.online` 改为 `Arc<AtomicBool>`，health checker 遍历时无需持有写锁，直接通过原子操作更新。"},{"id":"LOCK-02","title":"quote_index Mutex 序列化所有 dispatch 任务","severity":"P2","files":["src/hub/mod.rs:253-257","src/hub/quote_route.rs"],"description":"`dispatch_message` 对每条消息都获取 `quote_index.lock()`（`resolve_user_quote`），`tokio::sync::Mutex` 使所有并发 dispatch 任务在此串行化。`resolve_by_content` 目前接受 `&mut self` 但实际上只做查找，不需要 mut。","fixHint":"将 `resolve_user_quote`/`resolve_by_content` 改为 `&self` 方法；将 `quote_index` 改为 `RwLock<QuoteRouteIndex>`，dispatch 路径获取读锁（短暂持有），仅写入时获取写锁。"}]},{"name":"hub-2","priority":"P2","description":"hub 模块修复：MEM-01, TO-02, S-01, C-01, A-01","items":[{"id":"MEM-01","title":"Broadcast 路径 item_list 深 clone N 次（N = 在线客户端数）","severity":"P2","files":["src/hub/mod.rs:369","msg_clone = msg.clone()"],"description":"`WeixinMessage.item_list: Option<Vec<MessageItem>>` 在 Broadcast 路径中对每个在线客户端执行一次完整深 clone，`MessageItem.extra: serde_json::Value` 是 heap 分配的树结构，clone 代价高。3 个后端时深 clone 3 次，10 个后端时 10 次。","fixHint":"将 `item_list` 改为 `Option<Arc<Vec<MessageItem>>>`，clone 只复制 Arc 引用而非数据。需同步修改 `sendmessage` handler 中修改 `item_list` 的代码（写时复制）。"},{"id":"TO-02","title":"build_hub_ext_for_vctx DB 查询无超时","severity":"P2","files":["src/hub/mod.rs:808-838","build_hub_ext_for_vctx"],"description":"`get_active_session_name` 和 `get_backend_session` 两次 DB 查询没有超时保护。若 DB 因 SQLITE_BUSY 或 PostgreSQL 连接池耗尽而挂起，`dispatch_message` 任务永久阻塞，积压所有后续消息。","fixHint":"用 `tokio::time::timeout(Duration::from_secs(5), ...)` 包裹两次 DB 查询，超时时 warn 并返回 `None`（降级为无 HubExt 的消息转发）。"},{"id":"S-01","title":"vtoken 在 debug! 日志中未经 redact 完整输出","severity":"P2","files":["src/hub/router.rs:159"],"description":"","fixHint":"`vtoken = %&vtoken[..vtoken.len().min(8)]`"},{"id":"C-01","title":"Broadcast persist fire-and-forget 存在重启丢失窗口","severity":"P2","files":["src/hub/mod.rs:349-354"],"description":"","fixHint":"接受现有语义时，至少添加 metrics counter 记录 fire-and-forget 失败次数；在 README 中说明该设计权衡。"},{"id":"A-01","title":"HubState 神对象，14 个字段无访问边界","severity":"P2","files":["src/hub/mod.rs:131-155"],"description":"","fixHint":"按职责拆分为 `IlinkConnState`、`RoutingState` 等子结构，通过字段访问而非直接暴露全部状态。"}]},{"name":"hub-3","priority":"P3","description":"hub 模块修复：MISC-01, MEM-02, A-02, T-02","items":[{"id":"MISC-01","title":"resolve_full 用 peek 不更新 LRU 热度，活跃会话可能被提前淘汰","severity":"P3","files":["src/hub/queue.rs:152-161"],"description":"`resolve_full`（sendmessage 路径用于 reply 路由）用 `peek`（不更新 LRU 顺序），而 `resolve` 用 `get`（更新顺序）。结果是 sendmessage 的活跃会话不被计为\"热\"，在内存压力下反而更早被淘汰。","fixHint":"将 `resolve_full` 改为 `&mut self`，使用 `get` 正确更新 LRU；调用方持 write lock 即可（sendmessage 路径已有 write lock）。"},{"id":"MEM-02","title":"QuoteRouteIndex::by_content 无总量上限","severity":"P3","files":["src/hub/quote_route.rs:77-105"],"description":"`by_content` HashMap 无总条目上限，每条 Hub 命令回复（list/status/session list 等）都会注册一条内容索引。高频使用 Hub 命令时内存持续增长。","fixHint":"在 `register_outbound_content` 中检查总条目数，超过上限（如 10,000）时跳过注册并打 warn。"},{"id":"A-02","title":"MAX_QUEUE_SIZE 硬编码，慢后端场景下不可调整","severity":"P3","files":["src/hub/queue.rs:21"],"description":"","fixHint":"在 `build_queue_backend()` 中读取 `ILINK_MAX_QUEUE_SIZE` 环境变量，有效范围 `[10, 10_000]`，超界时 warn 并 clamp。"},{"id":"T-02","title":"pairing 测试未覆盖 AlreadyConfirmed 路径","severity":"P3","files":["src/hub/pairing.rs:115-117"],"description":"","fixHint":"添加测试：连续两次 confirm 同一 code，断言第二次返回 `AlreadyConfirmed`。"}]},{"name":"server-1","priority":"P2","description":"server 模块修复：SEC-004, SEC-006, SEC-007, SEC-009, SEC-010","items":[{"id":"SEC-004","title":"get_qrcode_status 无认证无限速 DoS（CWE-307）","severity":"P2","files":["src/server/pairing.rs:299-316"],"description":"`GET /ilink/bot/get_qrcode_status?qrcode=<any>` 无认证，每请求最多持有 25 秒 Tokio task。攻击者可用随机 qrcode 值开启数千并发连接耗尽服务器。","fixHint":"对该端点应用 per-IP 限速（复用 relay 已有的 `RateLimiter` 模式），或在 loop 开始前验证 code 存在且处于活跃状态，不存在时立即返回 404。"},{"id":"SEC-006","title":"admin token 非常量时间比较（CWE-312）","severity":"P2","files":["src/server/routes.rs:69"],"description":"在同一局域网或共享云环境中，精确计时攻击可逐字节推断 admin token。","fixHint":"使用 `subtle` crate（已是 `ed25519-dalek` 的传递依赖）进行常量时间比较：   ```rust   use subtle::ConstantTimeEq;   provided.as_bytes().ct_eq(required.as_bytes()).into()   ```"},{"id":"SEC-007","title":"/metrics 无认证，泄露客户端名称和消息量（CWE-284）","severity":"P2","files":["src/server/mod.rs:53-54","src/server/routes.rs:825-933"],"description":"`GET /metrics` 无任何认证，暴露所有注册客户端名称（通过 Prometheus label）、队列深度、消息吞吐量、iLink 连接状态，可用于攻击者对部署进行指纹识别。","fixHint":"对 `/metrics` 应用 `check_admin_auth` 中间件，或通过独立内部端口暴露（推荐 Prometheus 最佳实践）。"},{"id":"SEC-009","title":"name/label 字段无长度校验（CWE-20）","severity":"P2","files":["src/server/routes.rs:109-137","register","src/server/pairing.rs:362-413","pair_confirm"],"description":"`name` 和 `label` 字段无长度限制，10MB 的 name 可以被存入内存和 SQLite。Prometheus metric label 中的 client name 未做特殊字符转义（大括号、换行），可破坏 Prometheus scrape 输出。","fixHint":"在两个 handler 的入口处验证 `name.len() <= 64`、`label.len() <= 256`，超出返回 HTTP 400；Prometheus 输出中对 client name 进行转义。"},{"id":"SEC-010","title":"所有路由无 HTTP body 大小限制（CWE-400）","severity":"P2","files":["src/server/mod.rs:17-61","RequestBodyLimitLayer"],"description":"Axum 默认 body 限制为 2MB，但未显式配置 `DefaultBodyLimit`。`sendmessage` 接受含 `item_list`（嵌套 voice、text、binary payload）的请求体，relay 的 `body: String` 字段不做长度检查，可被恶意 relay 推送超大 body 到 Hub 本地 HTTP 栈。","fixHint":"在 `build_router` 中加入显式限制：   ```rust   .layer(DefaultBodyLimit::max(256 * 1024)) // 256KB 全局上限   ```   可对特定路由通过 `.layer(DefaultBodyLimit::disable())` 单独放开。"}]},{"name":"server-2","priority":"P2","description":"server 模块修复：E-01, S-02, API-01","items":[{"id":"E-01","title":"sendtyping 错误被完全丢弃，客户端永远收到假成功","severity":"P2","files":["src/server/routes.rs:439"],"description":"","fixHint":"```rust   match state.upstream.send_typing(req).await {       Ok(_) => Json(serde_json::json!({\"ret\": 0})),       Err(e) => {           warn!(error = %e, \"send_typing upstream error\");           Json(serde_json::json!({\"ret\": 500, \"errmsg\": format!(\"upstream error: {e}\")}))       }   }   ```"},{"id":"S-02","title":"vctx 完整值出现在 warn! 级别日志","severity":"P2","files":["src/server/routes.rs:298, 302, 345"],"description":"","fixHint":"`vctx = %&vctx[..vctx.len().min(8)]`"},{"id":"API-01","title":"HTTP 错误响应格式不统一（ret/error/errmsg 混用）","severity":"P2","files":["src/server/routes.rs"],"description":"","fixHint":"为 admin API 引入统一错误结构体，或在文档中明确说明两类 API 的错误格式约定。"}]},{"name":"relay","priority":"P2","description":"relay 模块修复：SEC-005, SEC-008, SEC-011, T-01, TO-03","items":[{"id":"SEC-005","title":"relay 注册无 nonce，60 秒重放攻击（CWE-330）","severity":"P2","files":["src/relay/auth.rs:7-39","src/relay/server.rs:105-106"],"description":"签名 payload 为 `\"register:{device_id}:{timestamp}\"`，时间窗口为 ±60 秒。攻击者截获一个有效的 Register WebSocket 帧后，可在 60 秒内向任意 relay 实例重放，伪装为合法 Hub 设备，劫持配对流量。","fixHint":"relay 服务端在 WebSocket 握手时发送 server nonce；Hub 签名 `\"register:{device_id}:{timestamp}:{nonce}\"`；或在服务端维护 `(device_id, timestamp)` 已用集合拒绝重放。"},{"id":"SEC-008","title":"relay device_keys/pending map 无界增长（CWE-400）","severity":"P2","files":["src/relay/server.rs:43-46"],"description":"`device_keys: HashMap` 每次新 device_id 注册就增加一条，无 LRU 淘汰上限。攻击者用不同 keypair 不断注册可耗尽 relay 服务器内存。`RateLimiter` 只限制单 IP，IPv6 轮换可绕过。","fixHint":"为 `device_keys` 设置最大条目数（如 10,000），采用 LRU 策略淘汰最久未见的 device_id。"},{"id":"SEC-011","title":"relay path allowlist URL 编码绕过（CWE-601）","severity":"P2","files":["src/relay/device.rs:130-135"],"description":"`is_allowed_relay_path` 只检查字面量 `\"..\"` 是否存在于 path 字符串。`%2e%2e` 或 `%2F..%2F` 形式的路径穿越序列可绕过该检查，通过 reqwest 的 URL 解码后到达 Hub 的内部 admin 端点。","fixHint":"对 path 进行 URL 解码后再次检查是否含 `..`；或在字符许可集（`[a-zA-Z0-9/_-]`）之外均拒绝，彻底禁止百分比编码。"},{"id":"T-01","title":"relay 模块核心逻辑无任何测试覆盖","severity":"P2","files":["src/relay/client.rs","src/relay/server.rs"],"description":"","fixHint":"为 `is_allowed_relay_path`（安全关键的白名单逻辑）添加参数化单元测试；为 `forward_to_hub` 超时行为添加集成测试。"},{"id":"TO-03","title":"relay WebSocket 读写无单帧超时","severity":"P3","files":["src/relay/client.rs:59, 118"],"description":"relay 的 WebSocket `sink.send()` 和 `stream.next()` 无超时，网络半开连接时会永久挂起。","fixHint":"用 `tokio::time::timeout(Duration::from_secs(30), ...)` 包裹每次帧操作。"}]},{"name":"ilink","priority":"P2","description":"ilink 模块修复：POLL-01, E-02, E-04, POLL-02","items":[{"id":"POLL-01","title":"-14 重登阻塞整个轮询 loop，重登期间消息全部丢失","severity":"P2","files":["src/ilink/upstream.rs:342-370"],"description":"iLink 返回 -14（会话过期）时，轮询 loop 原地等待 QR 重登完成（可能需要数分钟用户扫码）。重登期间轮询暂停，所有用户发来的消息均无响应，没有任何\"服务暂时不可用\"的回复。","fixHint":"将重登逻辑移到独立的 tokio task（已有 `relogin_tx` channel），主 polling loop 继续运行（每次 -14 触发 relogin task，loop 以更长退避等待），重登成功后 polling loop 用新 token 恢复。"},{"id":"E-02","title":"notify_start 响应被丢弃，无法检测 iLink 业务层启动错误","severity":"P2","files":["src/ilink/upstream.rs:77-84"],"description":"`notify_start` 响应体被 `let _` 丢弃，无法检测 iLink 返回的 -14 等业务错误码。若 notifystart 失败，所有后续 `sendmessage` 都会被 iLink 拒绝，但 Hub 不会感知。","fixHint":"解析响应体，`ret != 0` 时 `warn!` 并记录错误码；`ret == -14` 时触发重登流程。"},{"id":"E-04","title":"polling loop 最多延迟 70 秒才响应 shutdown","severity":"P2","files":["src/ilink/upstream.rs:271-275"],"description":"","fixHint":"```rust   tokio::select! {       biased;       _ = shutdown.changed() => { if *shutdown.borrow() { return; } }       result = self.get_updates(buf.clone(), None) => { /* 原逻辑 */ }   }   ```"},{"id":"POLL-02","title":"网络恢复后无 catch-up 逻辑","severity":"P3","files":["src/ilink/upstream.rs:372-378"],"description":"polling loop 断线后以退避重连，重连成功后从当前时间点开始 poll，断线期间累积的消息可能已被 iLink 丢弃（取决于 iLink 服务端保留策略）。","fixHint":"记录最后成功 poll 的时间戳，重连后优先请求历史消息（若 iLink API 支持）；或在断线期间向用户发送\"服务暂时中断，消息可能有延迟\"的通知。"}]},{"name":"bridge-1","priority":"P2","description":"bridge 模块修复：CHAN-01, TO-01, B-01, MISC-02, MGR-03","items":[{"id":"CHAN-01","title":"SessionDispatcher 用 UnboundedSender，CLI 慢时无限积压","severity":"P2","files":["src/bridge/mod.rs:161-218"],"description":"每个 session worker 持有一个 `UnboundedSender`，消息以无限速率进入，但 CLI 处理每条消息可能耗时数分钟。当 CLI 持续慢速处理时，channel 内积压消息无限增长，内存持续上升，最终 OOM。","fixHint":"改用有界 channel（如容量 10），`SessionDispatcher::dispatch` 发送失败时记录 warn 并丢弃最旧消息，与 `InMemoryQueue` 的背压策略保持一致。"},{"id":"TO-01","title":"handle_one_message 无整体超时，慢 CLI 永久阻塞 session worker","severity":"P2","files":["src/bridge/mod.rs:319-401"],"description":"`handle_one_message` 包含：① 等待 CLI 进程完成（有 `cli_timeout_secs` 子超时）；② 调用 Hub `sendmessage` HTTP（无超时）。若 Hub 宕机或网络超时，`sendmessage` 可能永久挂起，整个 session worker 被阻塞，后续消息无法处理。","fixHint":"在 `run_session_worker` 中用 `tokio::time::timeout` 包裹整个 `handle_one_message` 调用，超时时间建议为 `cli_timeout_secs + 30s`（给 sendmessage 留余量）。"},{"id":"B-01","title":"session worker CLI 崩溃后无退避，连续失败可能触发 spawn 风暴","severity":"P2","files":["src/bridge/mod.rs:161-173"],"description":"","fixHint":"连续失败时加指数退避（1s→2s→4s，上限 30s），或连续失败 N 次后让 worker 退出触发重建。"},{"id":"MISC-02","title":"run_bridge 错误重试无退避，Hub 宕机时持续轰炸","severity":"P3","files":["src/bridge/mod.rs:249-253"],"description":"","fixHint":"仿照 `run_polling_loop` 实现指数退避（3s → 6s → 12s，上限 60s）。"},{"id":"MGR-03","title":"BridgeApp::load 在 async 任务中调用阻塞 I/O","severity":"P3","files":["src/bridge/manager.rs:554","src/bridge/config.rs:194"],"description":"`std::fs::read_to_string` 是阻塞调用，在 `reconcile_once`（async fn）中直接调用会阻塞 Tokio worker 线程。","fixHint":"`tokio::task::spawn_blocking(|| BridgeApp::load(path)).await`"}]},{"name":"bridge-2","priority":"P3","description":"bridge 模块修复：MGR-01, MGR-02","items":[{"id":"MGR-01","title":"重启退避重置阈值等于最大退避，快速崩溃绕过退避","severity":"P3","files":["src/bridge/manager.rs:512-515"],"description":"重启退避在子进程存活时间超过一定阈值后重置为初始值。若该阈值等于最大退避值（如 60 秒），进程在每次退避结束后立刻崩溃（存活 < 1s），但退避计时器恰好在上一次等待中消耗完，下次会从头开始，无法真正惩罚持续快速崩溃。","fixHint":"将\"健康存活\"阈值设为显著大于最大退避（如最大退避的 3 倍），确保进程需要真正稳定运行一段时间才能重置退避计数。"},{"id":"MGR-02","title":"handle drop 检测延迟一个 reconcile 周期","severity":"P3","files":["src/bridge/manager.rs:198-212"],"description":"`BridgeManagerHandle` drop 后，manager 需要等到下次 `reconcile_once` 轮询时才检测到，最多延迟一个轮询间隔（默认数秒）。期间子进程仍在运行并接收消息。","fixHint":"使用 `tokio::sync::watch::Sender`，handle drop 时发送关闭信号，manager 在 `tokio::select!` 中同时等待该信号和定时器，做到即时响应。"}]},{"name":"runtime","priority":"P2","description":"runtime 模块修复：CHAN-02, SYNC-01","items":[{"id":"CHAN-02","title":"broadcast(256) 在 dispatcher 处理慢时静默丢消息","severity":"P2","files":["src/runtime/serve.rs:90","src/hub/mod.rs:330"],"description":"`broadcast::channel::<WeixinMessage>(256)` 容量为 256。`spawn_dispatcher` 的 `dispatch_message` 包含 DB 查询（`get_hub_ext_batch`、`persist_context_tokens_batch`）。若 DB 慢（如 SQLite 锁争用），dispatcher 处理速度低于上游推送速度，超出 ","fixHint":"增加通道容量（如 1024）；更重要的是将 DB 操作从 dispatcher 热路径移出（已有批量接口，继续优化将 DB 写入合并为后台 task）；并为 Lagged 事件增加 metrics counter，使丢失可观测。"},{"id":"SYNC-01","title":"启动恢复的路由条目包含已删除 vtoken","severity":"P2","files":["src/runtime/serve.rs:257-268"],"description":"`load_clients_from_db` 先恢复 clients，后恢复 routing_state。若某个 client 被删除但对应的 routing_state 行未清理（`clear_routes_for_vtoken` 仅在内存注销时调用，进程崩溃时可能跳过），重启后 `router` 内存中存在指向已删 vtoken 的路由，消息会被路由到不存在的 client 并静默丢弃。","fixHint":"`load_clients_from_db` 恢复路由后，过滤掉 registry 中不存在的 vtoken 对应的路由条目；或在 `upsert_client` 时同步清理同 vtoken 的旧路由。"}]},{"name":"store","priority":"P2","description":"store 模块修复：SYNC-02, DB-03, DB-02","items":[{"id":"SYNC-02","title":"bridge 重注册同名新 vtoken 后 routing_state 残留旧 vtoken","severity":"P2","files":["src/store/mod.rs:195-213","upsert_client"],"description":"`upsert_client` 在 `ON CONFLICT (name) DO UPDATE SET vtoken = EXCLUDED.vtoken` 时更新了 clients 表的 vtoken，但 `routing_state` 表中 `active_vtoken` 字段指向旧 vtoken 的行不会被同步更新。bridge 重启后用新 vtoken 注册，原来通过 `/use` 选择该 ","fixHint":"`upsert_client` 执行后，在同一事务中执行 `UPDATE routing_state SET active_vtoken = $new_vtoken WHERE active_vtoken = $old_vtoken`。"},{"id":"DB-03","title":"get_hub_ext_batch 行值 IN 语法不兼容 MySQL","severity":"P2","files":["src/store/mod.rs:432-479"],"description":"`WHERE (vctx, vtoken) IN (($1,$2), ($3,$4), ...)` 的行值构造语法在 SQLite 3.15+ 和 PostgreSQL 支持，但 MySQL 5.x 不支持（MySQL 8.0 支持）。若用户使用 MySQL 5.7，该查询直接报错导致 Broadcast 路径的 HubExt 全部降级为 None。","fixHint":"改为等价的 `OR` 子句：`WHERE (vctx = $1 AND vtoken = $2) OR (vctx = $3 AND vtoken = $4) OR ...`；或检测数据库类型选择不同 SQL。"},{"id":"DB-02","title":"persist_context_tokens_batch 事务持有时间随 N 增大","severity":"P3","files":["src/store/mod.rs:598-624"],"description":"在 Broadcast 场景下，事务持有时间 = N × 单条 upsert 耗时，N 较大时 SQLite write lock 被长期占用，阻塞其他写操作。","fixHint":"将批量写入分块（每批 50 条），或改用 `INSERT ... VALUES (...),(...),(...) ON CONFLICT DO UPDATE` 多值批量语法，减少事务往返次数。"}]},{"name":"misc","priority":"P2","description":"misc 模块修复：S-03, D-01, D-02","items":[{"id":"S-03","title":"{{MESSAGE}} 注入风险缺少 README 静态警告","severity":"P2","files":["README.md","docs/bridge-config.md"],"description":"","fixHint":"在 `{{MESSAGE}}` 配置示例旁添加安全警告框，说明不要用于 shell `-c` 参数，推荐 `stdin: message` 模式。"},{"id":"D-01","title":"sqlx 三驱动同时编译，二进制体积和攻击面增大","severity":"P2","files":["Cargo.toml:70"],"description":"","fixHint":"引入 `[features]` 并设 `default = [\"sqlite\"]`，postgres/mysql 作为可选特性。注意这是 **breaking change**，需配合文档更新。"},{"id":"D-02","title":"rand 版本落后（0.8 → 0.9）","severity":"P3","files":["Cargo.toml:64"],"description":"","fixHint":"升级 `rand = \"0.9\"`；`rand::thread_rng().gen::<u32>()` → `rand::random::<u32>()`；检查 `ed25519-dalek` 的 `rand_core` 兼容性。"}]}]},"steps":[{"key":"parse-todos","status":"done","durationMs":2,"completedAt":"2026-06-12T01:27:44.008Z"}],"startedAt":"2026-06-12T01:27:44.005Z","currentStep":null},"status":"running","stale":true,"orphanedStateFile":false,"displayStatus":"stale","feature":null,"startedAt":"2026-06-12T01:27:44.005Z","completedAt":null,"durationMs":3.44970703125,"currentStep":null,"pauseReason":null,"summary":null,"completedCount":1,"stepCount":1,"skippedCount":0,"errorSteps":[],"skippedSteps":[],"paused":false,"usage":{"inpu const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDur = (ms) => ms==null?'-':(ms<1000?ms+'ms':ms<60000?(ms/1000).toFixed(1)+'s':(ms/60000).toFixed(1)+'m');
const fmtTok = (n) => (n==null||n===0)?'0':(n>=1e6?(n/1e6).toFixed(2)+'M':n>=1000?(n/1000).toFixed(1)+'k':String(n));
const fmtTime = (iso) => { if(!iso) return '-'; const d=new Date(iso); return isNaN(d)?'-':d.toLocaleString('zh-CN',{hour12:false}); };
const byId = Object.fromEntries(MODEL.runs.map(r=>[r.runId,r]));
let activeStatuses = new Set();
let search = '';
let selected = null;

function statusLabel(r){ return r.stale?'stale':r.status; }
// CSS class 名白名单：只允许已知状态，其他值替换为 'unknown'，防止 state.json 注入 class 属性。
const SAFE_STATUS = new Set(['running','paused','completed','stale','unknown']);
function safeSl(r){ const s=statusLabel(r); return SAFE_STATUS.has(s)?s:'unknown'; }

function renderHeader(){
  $('repo').textContent = MODEL.repo;
  $('gen').textContent = '快照 ' + fmtTime(MODEL.generatedAt);
  const s = MODEL.stats;
  const items = [
    ['总计',s.total,''],['运行中',s.running,'running'],['僵尸',s.stale,'stale'],
    ['暂停',s.paused,'paused'],['完成',s.completed,'completed'],
    ['fallback',s.fallback,'warn'],['质量门红灯',s.gateFail,'err'],
    ...(s.skipped?[['续跑跳过',s.skipped,'']]:[]),
    ['Token',fmtTok(s.totalTokens),''],
  ];
  $('stats').innerHTML = items.map(([k,v,c])=>
    '<div class="stat"><b style="color:'+statColor(c)+'">'+v+'</b><span>'+k+'</span></div>').join('');
}
function statColor(c){return {running:'var(--running)',stale:'var(--stale)',paused:'var(--warn)',completed:'var(--ok)',warn:'var(--warn)',err:'var(--err)'}[c]||'var(--text)';}

function renderFilters(){
  const statuses = ['running','stale','paused','completed'];
  $('statusFilters').innerHTML = statuses.map(s=>
    '<span class="chip'+(activeStatuses.has(s)?' on':'')+'" data-s="'+s+'">'+s+'</span>').join('');
  $('statusFilters').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    const s=c.dataset.s; activeStatuses.has(s)?activeStatuses.delete(s):activeStatuses.add(s); renderFilters(); renderList();
  });
}

function matchFilter(r){
  if(activeStatuses.size && !activeStatuses.has(statusLabel(r))) return false;
  if(search){ const q=search.toLowerCase(); return r.runId.toLowerCase().includes(q)||(r.feature||'').toLowerCase().includes(q); }
  return true;
}

function renderList(){
  // 树形：根在前，其子紧随。被筛掉的根仍显示其匹配的子（扁平兜底）。
  const roots = MODEL.runs.filter(r=>!r.parentId);
  const shown = new Set();
  let html='';
  const renderRun = (r,isChild)=>{
    shown.add(r.runId);
    const sl=safeSl(r);
    html += '<div class="run'+(isChild?' child':'')+(selected===r.runId?' sel':'')+'" data-id="'+esc(r.runId)+'">'
      + '<div class="rid">'+esc(r.runId)+'</div>'
      + '<div class="meta"><span class="badge b-'+sl+'">'+sl+'</span>'
      + (r.feature?'<span>'+esc(r.feature)+'</span>':'')
      + '<span>'+r.completedCount+' steps'+(r.skippedCount?'<span style="color:var(--muted);font-size:10px"> +'+r.skippedCount+'↩</span>':'')+'</span>'
      + (r.signals.fallback?'<span title="fallback">↻'+r.signals.fallback+'</span>':'')
      + (r.signals.gateFail?'<span title="gate fail" style="color:var(--err)">✗gate</span>':'')
      + (r.children&&r.children.length?'<span>['+r.children.length+' 子]</span>':'')
      + '</div></div>';
  };
  for(const root of roots){
    const kids = (root.children||[]).map(id=>byId[id]).filter(Boolean);
    const rootMatch = matchFilter(root);
    const kidMatches = kids.filter(matchFilter);
    if(!rootMatch && kidMatches.length===0) continue;
    renderRun(root,false);
    for(const k of kids){ if(matchFilter(k)||rootMatch) renderRun(k,true); }
  }
  // 任何没被树覆盖的（孤儿）
  for(const r of MODEL.runs){ if(!shown.has(r.runId) && matchFilter(r)) renderRun(r,false); }
  $('runList').innerHTML = html || '<div class="empty" style="margin-top:30px">无匹配 run</div>';
  $('runList').querySelectorAll('.run').forEach(el=>el.onclick=()=>select(el.dataset.id));
}

function select(id){ selected=id; renderList(); renderDetail(byId[id]); location.hash=id; }

function renderDetail(r){
  if(!r){ $('detail').innerHTML='<div class="empty">未找到该 run</div>'; return; }
  const sl=safeSl(r);
  let h = '<h2>'+esc(r.runId)+' <span class="badge b-'+sl+'">'+sl+'</span></h2>';
  h += '<div class="sub">'+esc(r.dir)+'</div>';
  if(r.stale) h+='<div class="sigchip err" style="margin-bottom:12px">⚠ 僵尸 run：status=running 但最近活动 '+fmtTime(r.lastActivity)+' 已超阈值，进程可能已崩溃/被 kill</div>';
  if(r.paused&&r.pauseReason) h+='<div class="sigchip warn" style="margin-bottom:12px">⏸ 暂停等人工：'+esc(r.pauseReason)+'</div>';

  const u = r.usage||{};
  const tokCell = u.hasTokens ? kv('Token (in/out)', fmtTok(u.inputTokens)+' / '+fmtTok(u.outputTokens)+' = '+fmtTok(u.totalTokens)) : '';
  const childTok = r.childUsage ? kv('子run Token 合计', fmtTok(r.childUsage.inputTokens)+' / '+fmtTok(r.childUsage.outputTokens)+' = '+fmtTok(r.childUsage.totalTokens)) : '';
  const modelCell = (r.models&&r.models.length) ? kv('模型', r.models.join(', ')) : '';
  h += '<div class="kv">'
    + kv('feature',r.feature||'-') + kv('开始',fmtTime(r.startedAt))
    + kv('耗时',fmtDur(r.durationMs)) + kv('最近活动',fmtTime(r.lastActivity))
    + kv('完成步骤',r.completedCount) + (r.currentStep?kv('当前步',r.currentStep):'')
    + modelCell + tokCell + childTok
    + '</div>';

  // 信号
  const sg=r.signals;
  const sigs=[];
  if(sg.fallback){
    const byScope=sg.fallbackByScope||{};
    const detail=Object.entries(byScope).map(([s,n])=>s+':'+n).join(' ');
    sigs.push('<span class="sigchip warn" title="'+esc(detail)+'"><b>'+sg.fallback+'</b>fallback</span>');
  }
  if(sg.gateFail) sigs.push('<span class="sigchip err"><b>'+sg.gateFail+'</b>质量门红灯</span>');
  if(sg.gatePass) sigs.push('<span class="sigchip ok"><b>'+sg.gatePass+'</b>质量门通过</span>');
  if(sg.fixRounds) sigs.push('<span class="sigchip warn"><b>'+sg.fixRounds+'</b>fix 轮</span>');
  if(sg.group.done||sg.group.failed) sigs.push('<span class="sigchip"><b>'+sg.group.done+'/'+(sg.group.done+sg.group.failed)+'</b>组完成</span>');
  if(sigs.length) h+='<div class="sig">'+sigs.join('')+'</div>';

  // 子 run 网格（drain 父）
  const kids=(r.children||[]).map(id=>byId[id]).filter(Boolean);
  if(kids.length){
    h+='<div class="section-title">子 run（'+kids.length+'）</div><div class="grid">';
    for(const k of kids){ const ks=safeSl(k);
      h+='<div class="cell" data-id="'+esc(k.runId)+'"><div class="cn">'+esc(k.feature||k.runId)+'</div>'
       +'<div class="cs"><span class="badge b-'+ks+'">'+ks+'</span></div></div>';
    }
    h+='</div>';
  }

  // 步骤时间线
  const allSteps = r.steps||[];
  const skipped = r.skippedSteps||[];
  const errSteps = r.errorSteps||[];
  if(allSteps.length||skipped.length||errSteps.length){
    const max=Math.max(...allSteps.map(s=>s.durationMs||0),1);
    const totalLabel = allSteps.length+(skipped.length?' (续跑跳过 '+skipped.length+')':'');
    h+='<div class="section-title">步骤时间线（'+totalLabel+'）</div><div class="timeline">';
    for(const s of allSteps){
      const w=Math.max(2,Math.round((s.durationMs||0)/max*100));
      const tok=(s.inputTokens!=null||s.outputTokens!=null)?(fmtTok((s.inputTokens||0)+(s.outputTokens||0))+' tok'):'';
      const waitLabel = s.waitMs!=null && s.waitMs>100 ? 'wait '+fmtDur(s.waitMs) : '';
      const tip=esc(s.key)+(s.model?(' · '+s.model):'')+(tok?(' · '+tok):'')+(waitLabel?(' · '+waitLabel):'');
      h+='<div class="tl-row"><div class="tl-key" title="'+tip+'">'+esc(s.key)
        +(s.model?'<span class="tl-model">'+esc(s.model)+'</span>':'')+'</div>'
        +'<div class="tl-bar-wrap"><div class="tl-bar" style="width:'+w+'%"></div></div>'
        +'<div class="tl-dur">'+fmtDur(s.durationMs)
        +(tok?'<span class="tl-tok">'+tok+'</span>':'')
        +(waitLabel?'<span class="tl-wait">'+esc(waitLabel)+'</span>':'')
        +'</div></div>';
    }
    // 续跑跳过的步骤（灰显斜体）
    if(skipped.length){
      h+='<div style="margin-top:6px;font-size:10px;color:var(--muted)">↩ 续跑跳过（已完成）：</div>';
      for(const s of skipped){
        h+='<div class="tl-row skip"><div class="tl-key" title="skip: '+esc(s.key)+'">'+esc(s.key)+'</div>'
          +'<div class="tl-bar-wrap"><div class="tl-bar skip" style="width:15%"></div></div>'
          +'<div class="tl-dur">skip</div></div>';
      }
    }
    // 失败步
    for(const e of errSteps){
      h+='<div class="tl-row err" style="margin-top:4px"><div class="tl-key">✗ '+esc(e.key)+'</div>'
        +'<div style="color:var(--err);font-size:11px">'+esc(e.error||'error')+'</div><div></div></div>';
    }
    h+='</div>';
  }

  // 事件表
  if(r.events&&r.events.length){
    h+='<div class="section-title">事件（'+r.events.length+'）</div><table class="events"><tr><th>时间</th><th>事件</th><th>详情</th></tr>';
    for(const e of r.events){
      let d='';
      if(e.event==='fallback') d=esc(e.from)+' → '+esc(e.to)+' ('+esc(e.reason||'')+')';
      else if(e.event==='gate') d=esc(e.name)+' · '+esc(e.status)+(e.exitCode!=null?' exit '+e.exitCode:'');
      else if(e.event==='group') d=esc(e.name)+' · '+esc(e.status)+(e.reason?' ('+esc(e.reason)+')':'');
      else d=esc(JSON.stringify(e).slice(0,120));
      h+='<tr><td>'+fmtTime(e.ts)+'</td><td><b>'+esc(e.event)+'</b></td><td>'+d+'</td></tr>';
    }
    h+='</table>';
  }

  // 纯文本 .log 尾部（fanOut 子任务输出 / 失败根因）
  if(r.logs&&r.logs.length){
    h+='<div class="section-title">日志尾部（'+r.logs.length+'）</div>';
    for(const lg of r.logs){
      h+='<details><summary>'+esc(lg.name)+'</summary><pre>'+esc(lg.tail)+'</pre></details>';
    }
  }

  $('detail').innerHTML=h;
  $('detail').querySelectorAll('.cell').forEach(el=>el.onclick=()=>select(el.dataset.id));
}
function kv(k,v){return '<div><span>'+esc(k)+'</span><b>'+esc(v)+'</b></div>';}

$('search').addEventListener('input',e=>{search=e.target.value;renderList();});
renderHeader(); renderFilters(); renderList();
const initial = location.hash.slice(1);
if(initial && byId[initial]) select(initial);

</script>
