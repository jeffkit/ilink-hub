# Claude Code 示例（一文件一 profile；旧 multi-profile 已移除）
#
# 占位符（可用于 args / cwd / env 值）：
#   {{MESSAGE}} / {{SESSION_ID}} / {{SESSION_NAME}} / {{PROFILE_DIR}}
#
# agentproc 字段见 docs/knowledge/bridges/profile-protocol.md

description: Claude Code continue session
agentproc:
  executor: claude-code
  cwd: /path/to/your/project
  timeout_secs: 600
  max_reply_chars: 8000
  truncation_suffix: "\n\n…(输出已截断)"
  include_stderr_in_reply: false
  streaming: true
  send_error_reply: true
  # env:
  #   CLAUDE_MODEL: sonnet
  #   ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
