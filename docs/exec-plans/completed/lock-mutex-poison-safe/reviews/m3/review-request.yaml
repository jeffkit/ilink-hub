# ─── 风险 / 注意事项 ────────────────────────────────────────────────────────
risks:
  - 改为使用 `?` 传播错误会将原本可能发生 Panic 的场景转化为 `Result::Err` 并由外层（例如 `UpstreamClient::run_polling_loop` 或是 Hub 调用者）统一以 `Result` 错误形式捕获处理，不会导致 Tokio Worker panic 崩溃，显著提升了系统的鲁棒性。

