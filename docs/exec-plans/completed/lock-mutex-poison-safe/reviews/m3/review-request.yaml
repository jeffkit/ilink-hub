milestone: M3
title: Lock and Unwrap risks - src/ilink/upstream.rs HeaderValue unwrap() risk fix
status: ready-for-review
created: 2026-06-17

# ─── 范围 ────────────────────────────────────────────────────────────────────
scope:
  - 将 `UpstreamClient::headers` 签名变更为 `fn headers(&self) -> Result<reqwest::header::HeaderMap>`。
  - 使用 `HeaderValue::from_str(...)?` 替换 `HeaderValue::from_str(...).unwrap()`。
  - 在所有调用 `self.headers()` 的异步方法中，使用 `?` 传播错误（例如 `.headers(self.headers()?)`）。
  - 在 `src/ilink/upstream.rs` 单元测试中补充对非法 Token/UIN 生成的错误处理边界测试 `headers_fail_with_invalid_token`。

# ─── 关键改动 ────────────────────────────────────────────────────────────────
changes:
  - file: src/ilink/upstream.rs
    lines:
      - 110: `notify_start` 方法中传播 headers 错误
      - 124-139: 修改 `headers` 签名返回 `Result`，并将 `HeaderValue::from_str(...).unwrap()` 改为 `?` 传播错误
      - 156: `get_updates` 错误传播
      - 177: `send_message` 错误传播
      - 211: `send_typing` 错误传播
      - 224: `get_config` 错误传播
      - 238: `get_upload_url` 错误传播
      - 538-546: 新增 `headers_fail_with_invalid_token` 单元测试验证非法 Token 导致 `HeaderValue::from_str` 失败时的错误传播

