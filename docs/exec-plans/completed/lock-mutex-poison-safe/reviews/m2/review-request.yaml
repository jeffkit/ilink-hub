# ─── 风险 / 注意事项 ────────────────────────────────────────────────────────
risks:
  - `unwrap_or_else(|e| e.into_inner())` 会在 Mutex 被毒化（Poisoned）时获取锁所保护的数据。在该场景下，虽然数据可能是不一致状态，但相对于直接 panic 导致整个服务线程或 Tokio Worker 崩溃，这种防卫性容错机制能最大化保证系统可用性，且我们的限流器在毒化恢复后可继续正确工作。

