milestone: M2
title: Poison-Safe Locks - src/relay/ratelimit.rs 锁安全修复
status: ready-for-review
created: 2026-06-17

# ─── 范围 ────────────────────────────────────────────────────────────────────
scope:
  - 修复 `src/relay/ratelimit.rs` 中 `RateLimiter::allow` 热路径上使用 `self.inner.lock().expect(...)` 的风险。
  - 将 `.lock().expect(...)` 修改为 poison-safe 形式：`lock().unwrap_or_else(|e| e.into_inner())`。
  - 在 `src/relay/ratelimit.rs` 单元测试中补充 `test_ratelimit_poison_safe` 测试用例，显式毒化 Mutex 并验证锁访问不 panic。

# ─── 关键改动 ────────────────────────────────────────────────────────────────
changes:
  - file: src/relay/ratelimit.rs
    lines:
      - 40: `RateLimiter::allow` 锁安全处理
      - 91-111: 新增 `test_ratelimit_poison_safe` 单元测试验证 Mutex 被毒化后的健壮性

