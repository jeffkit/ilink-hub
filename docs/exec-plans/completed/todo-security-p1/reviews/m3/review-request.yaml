# ─── Behavioural diff vs. M2 (commit 8b3cc39) ──────────────────────────────
behavioural_diff:
  - area: "pair_confirm handler (authentication)"
    before: >-
      `POST /hub/pair/{code}/confirm` was reachable by any HTTP
      client. There was no CSRF protection, no Scanned-state gate,
      and no rate limit. The only defence was the (now-extracted
      and F-M1-B-hardened) Origin/Referer allowlist. An attacker
      who could read Hub logs could see the unconfirmed pairing
      URL at INFO level and POST to confirm with any `name`,
      getting a vtoken for free (SEC-013 / CWE-862 + CWE-307 +
      CWE-532).
    after: >-
      pair_confirm now requires: (1) a valid X-Pair-CSRF header
      bound to the session, (2) the session to be in Scanned
      state (phone QR scan via pair_page), (3) a per-(code,ip)
      rate limit (one attempt per minute). The CSRF token is
      consumed on success and is 32 hex chars (128 bits from
      OS CSPRNG). pair_url is logged at DEBUG. The error
      ordering (AlreadyConfirmed → CSRF → NotScanned) hides
      the Scanned state from attackers probing stale codes.
    security_classification: >-
      CWE-862 (missing authentication) + CWE-307 (broken
      auth) + CWE-532 (PII/secret in logs) + CWE-203
      (information exposure via race) — closed by the three-
      piece authentication surface (CSRF + Scanned state gate
      + log demotion) and the F-M3-4 error ordering.
  - area: "pair_page handler (CSRF minting)"
    before: >-
      Rendered the static pair.html with only the pairing code
      substituted; no per-session token.
    after: >-
      Renders the static pair.html with BOTH the pairing code
      and a freshly-minted (or refreshed) 32-hex-char CSRF
      token. Re-scanning (page reload) safely refreshes the
      token, invalidating the prior copy.
    security_classification: "Pre-requisite for pair_confirm's CSRF check."
  - area: "PairingRegistry (new fields + variants)"
    before: >-
      `PairingSession` had no CSRF slot; `confirm` returned
      Ok / NotFound / Expired. No state gate, no CSRF.
    after: >-
      `PairingSession` has `csrf: Option<String>`. `confirm`
      returns Ok / NotFound / Expired / AlreadyConfirmed /
      CsrfMismatch / NotScanned / TooManySessions. CSRF is
      constant-time compared and consumed on success.
    security_classification: "CWE-307 — CSRF and Scanned state gate are the new auth surface."

