# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M3: the `POST /hub/pair/{code}/confirm` endpoint must no
# longer be an unauthenticated open vtoken mint. Three layered fixes:
#   1. Log demotion: `pair_url` (carries an unconfirmed active code) is
#      emitted at DEBUG, not INFO. Adjacent fields audited for the
#      same PII/secret sensitivity.
#   2. State gate: `PairingRegistry::confirm` now rejects anything but
#      `PairingStatus::Scanned`. The only legitimate trigger is a phone
#      scanning the QR, which the `pair_page` handler promotes Wait →
#      Scanned via `mark_scanned`. The new `PairingError::NotScanned`
#      variant maps to HTTP 412 Precondition Failed.
#   3. CSRF: a 32-char hex token is bound to the session on every
#      `mark_scanned` (also re-minted safely on re-scan). The HTML
#      pair page injects it as a template placeholder; the JS fetch
#      sends it back via the `X-Pair-CSRF` header. `pair_confirm`
#      extracts the header, requires a match (constant-time), and
#      consumes the token on success so a replay returns CsrfMismatch
#      (and, with F-M3-4 ordering, AlreadyConfirmed hides the Scanned
#      state from attackers probing stale codes).
#
# F-M3-1 (rate-limit per code/IP), F-M3-3 (log demotion), F-M3-4
# (AlreadyConfirmed precedes NotScanned in the error order) were
# flagged by the M0 review and resolved in the same combined commit.

# ─── Source-of-truth changes for SEC-013 ───────────────────────────────────
source_changes:
  - file: src/server/pairing.rs
    symbols:
      - "build_pairing_qr_response"
      - "pair_page (handler)"
      - "pair_confirm (handler)"
    change_summary: >-
      (1) The previous `info!(code, pair_url, ...)` log site in
      `build_pairing_qr_response` is demoted to `debug!` so the
      unconfirmed pairing URL never reaches the INFO stream
      (F-M3-3). (2) `pair_page` now calls `mark_scanned` on every
      visit (already in M1) and reads the freshly-minted CSRF token
      from the session, injecting it as a `__PAIR_CSRF__` template
      placeholder alongside `__PAIR_CODE__`. (3) `pair_confirm`
      extracts the `X-Pair-CSRF` header before doing anything else,
      rejects the request with 403 if the header is missing or empty,
      and passes the value to `PairingRegistry::confirm` for
      constant-time comparison. The `Info!(code = %code, name = %name,
      "pairing confirmed")` site is also demoted to debug! — the
      name field is user-supplied and can be PII. The downstream
      error mapping handles the new `PairingError::{NotScanned,
      CsrfMismatch}` variants (412 / 403).
  - file: src/server/pair.html
    symbols:
      - "pair.html inline JS (X-Pair-CSRF header on fetch)"
    change_summary: >-
      The page's confirm fetch now sets
      `headers: { "Content-Type": "application/json", "X-Pair-CSRF":
      csrf }`, propagating the token from the `__PAIR_CSRF__`
      placeholder that `pair_page` substitutes at render time. The
      "已配对" / "已过期" branches in pair_page return hard-coded
      HTML and never hit the template, so the csrf placeholder is
      not rendered in those terminal views (no token leak).
  - file: src/hub/pairing.rs
    symbols:
      - "PairingSession::csrf (new field)"
      - "PairingRegistry::mark_scanned (mints csrf)"
      - "PairingRegistry::confirm (csrf check + Scanned state gate + consume-on-success)"
      - "PairingError::{NotScanned, CsrfMismatch} (new variants)"
      - "generate_csrf / constant_time_eq (new helpers)"
    change_summary: >-
      `PairingSession` gains `pub csrf: Option<String>`. `mark_scanned`
      mints a 32-char hex token from `rand::rngs::OsRng` (128 bits of
      entropy) the first time a session is scanned and is safe to
      re-enter on page reload (F-M3 page-refresh safety: re-scan
      refreshes the token, invalidating the prior copy). `confirm` is
      extended to take a `csrf_header: &str` and performs the
      constant-time check, consuming the token on success. The state
      check order is `NotFound → Expired → AlreadyConfirmed → CSRF →
      NotScanned` (F-M3-4: AlreadyConfirmed precedes the Scanned
      branch so the loser of a race never learns the Scanned state
      via a 412; the Scanned branch itself is checked AFTER the CSRF
      branch so an attacker without the token cannot distinguish
      Wait from Scanned). `PairingError` gains `NotScanned` (HTTP 412)
      and `CsrfMismatch` (HTTP 403). `rand = "0.8"` is the only new
      dependency — already in `Cargo.toml` from the start, so no
      Cargo.toml change was needed.
  - file: src/server/pairing.rs (tests)
    symbols:
      - "check_origin_or_referer_rejects_missing_headers"
      - "check_origin_or_referer_rejects_garbage"
      - "check_origin_or_referer_accepts_well_formed_referer"
    change_summary: >-
      These tests pin the Origin/Referer allowlist helper that the
      handler invokes between the rate-limit and CSRF checks. The
      "missing both headers" case is the regression F-M1-B flagged
      in the M0 review.
  - file: src/hub/pairing.rs (tests)
    symbols:
      - "confirm_rejected_when_status_is_wait"
      - "csrf_token_consumed_after_confirm"
      - "generate_csrf_is_unique_and_hex"
    change_summary: >-
      Plan §M3 unit tests for the CSRF + Scanned state gate. The
      `confirm_rejected_when_status_is_wait` test creates a session
      without `mark_scanned` and confirms that confirm() fails —
      surfaced as `CsrfMismatch` rather than `NotScanned` because no
      csrf has been minted yet (F-M3-4 ordering). The
      `csrf_token_consumed_after_confirm` test confirms a replay
      fails (replay is reported as `AlreadyConfirmed` because the
      state gate is checked first, hiding the Scanned state). The
      `generate_csrf_is_unique_and_hex` test pins the 32-hex-char
      length and the per-call uniqueness invariant.
  - file: tests/hub_routing_integration.rs
    symbols:
      - "pair_confirm_rate_limiter_rejects_second_attempt (F-M3-1)"
      - "pair_url_is_not_logged_at_info_level (F-M3-3 audit)"
      - "csrf_token_cannot_be_replayed_after_confirm (F-M3-1)"
      - "csrf_check_takes_precedence_over_not_scanned (F-M3-4)"
    change_summary: >-
      Adversarial coverage for the SEC-013 surface. Naming
      intentionally diverges from plan §M3's literal test names
      because the M0 review surfaced additional failure modes
      (rate-limit, audit drift) that warranted dedicated tests;
      the test names below are the *actual* SEC-013 coverage, with
      the plan-required scenario names mapped in
      `plan_test_name_mapping` below.

