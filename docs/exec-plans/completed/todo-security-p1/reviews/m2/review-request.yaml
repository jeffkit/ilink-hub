# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M2: a single vtoken must NOT be able to exhaust Hub
# resources by holding an unbounded number of concurrent getupdates
# long-polls. The fix:
#   1. Introduces `pub const MAX_CONCURRENT_POLLS_PER_VTOKEN: usize = 3`
#      in src/hub/mod.rs.
#   2. Re-orders getupdates so `state.poll_tracker.enter(&vtoken)` is
#      called BEFORE `registry.mark_seen`. When `count > MAX` the
#      guard is dropped (decrement via Drop) and the handler returns
#      HTTP 429 with body `{ret: 429, errmsg: "too many concurrent
#      polls for this vtoken"}` — it does NOT enter
#      `wait_notify_or_shutdown`.
#   3. Tightens the split-brain warn so it only fires for the legal-
#      but-suspicious `1 < count <= MAX` window (anything strictly
#      above MAX is already rejected by the 429 gate).
#
# F-M2-2 (poisoned-mutex panic-safety) is preserved: PollTracker::enter
# still returns (count=0, guard) on a poisoned counts mutex, so the
# 429 gate degrades gracefully (falls through to the over-cap path
# with count=0 — no panic).

# ─── Source-of-truth changes for SEC-003 ───────────────────────────────────
source_changes:
  - file: src/hub/mod.rs
    symbols:
      - "pub const MAX_CONCURRENT_POLLS_PER_VTOKEN"
      - "tests::poll_tracker_caps_concurrent (new unit test)"
    change_summary: >-
      Adds the cap constant (default 3) with a doc comment explaining
      the split-brain motivation and the operator-alert threshold.
      Adds the `poll_tracker_caps_concurrent` unit test which holds
      MAX guards, then verifies that the (MAX+1)th enter observes
      `count == MAX+1` (the boundary the handler gates on), and that
      after dropping the over-cap guard the next enter recovers to
      MAX+1 (proving no permanent counter inflation).
  - file: src/server/routes.rs
    symbols:
      - "getupdates (handler)"
    change_summary: >-
      Re-orders the handler so the per-vtoken concurrent-poll gate
      runs FIRST (after Authorization extraction). On `count >
      MAX_CONCURRENT_POLLS_PER_VTOKEN` the guard is dropped
      (releasing the increment via PollGuard::Drop) and the handler
      returns `StatusCode::TOO_MANY_REQUESTS` with body
      `{ret: Some(429), errmsg: "too many concurrent polls for this
      vtoken", msgs: None, get_updates_buf: None}` and a `warn!` log
      carrying the redacted vtoken, the current count, and the cap.
      Only on passing the gate does the existing split-brain warn
      fire (now restricted to `concurrent_polls > 1` since over-cap
      is already rejected). The downstream registry-lock +
      mark_seen + wait_notify flow is unchanged.
  - file: tests/hub_routing_integration.rs
    symbols:
      - "getupdates_returns_429_when_polls_exceed_cap (new integration test)"
    change_summary: >-
      End-to-end test through the real axum handler: (1) registers
      a vtoken, (2) holds the shutdown sender alive (so the
      long-polls actually block for the full timeout), (3) spawns
      MAX concurrent getupdates calls with `timeout: 1`, (4) waits
      for the tracker to observe MAX active entries, (5) issues a
      4th getupdates wrapped in a 2-second timeout and asserts the
      status is 429, the body carries `ret=429` and the documented
      errmsg, and the request did NOT enter wait_notify
      (elapsed < 2s). After the in-budget polls finish, a recovery
      call must succeed (200, ret=0), proving the guard-drop
      decrement is correct.

