# ─── Behavioural diff vs. M1 (commit 2d2370b) ──────────────────────────────
behavioural_diff:
  - area: "getupdates handler (over-cap path)"
    before: >-
      PollTracker::enter was called AFTER mark_seen, and the
      `concurrent_polls > 1` warn was a non-blocking advisory. A
      vtoken that opened N concurrent getupdates long-polls would
      occupy N Tokio worker slots and N queue-notify slots
      indefinitely; the Hub had no per-vtoken upper bound on the
      number of long-polls, so a single misconfigured or malicious
      vtoken could exhaust worker resources (SEC-003 / CWE-400).
    after: >-
      PollTracker::enter is called FIRST. The handler returns
      HTTP 429 with `ret: 429` and errmsg "too many concurrent
      polls for this vtoken" when the count exceeds
      `MAX_CONCURRENT_POLLS_PER_VTOKEN` (default 3). The guard is
      dropped before the response, so the counter is decremented
      and the in-budget polls are not affected. The handler does
      NOT enter `wait_notify_or_shutdown` in the over-cap path.
    security_classification: "CWE-400 (uncontrolled resource consumption) — closed by per-vtoken cap + 429"
  - area: "split-brain warn"
    before: "Fired for any `concurrent_polls > 1`."
    after: >-
      Still fires for `concurrent_polls > 1`, but is now strictly
      in the legal-but-suspicious window because the 429 gate
      above has already returned for any `count > MAX`. Behaviour
      is unchanged for the documented split-brain case (two
      bridges sharing one credential), which is exactly the
      configuration problem the warn is meant to surface.
    security_classification: "no change in security posture; observability preserved for the <= MAX window"
  - area: "PollTracker::enter (unchanged shape, new constant exposed)"
    before: "Returned (count, PollGuard); nothing referenced a cap."
    after: >-
      Same return type and same poison-safe (let-Ok) behaviour
      (F-M2-2). The new constant lives in the hub module and is
      used by the handler to compute the over-cap boundary.
    security_classification: "no behavioural change to PollTracker itself"

