# ─── Recommendation ───────────────────────────────────────────────────────
verdict_rationale: >-
  The M2 fix is correct, minimal, and well-tested. The 429 gate runs
  BEFORE any registry work, the cap boundary is a documented pub const,
  the PollTracker invariant is preserved under poisoned-mutex and
  concurrent-cancellation conditions, and both the unit and integration
  tests pin the boundary and the recovery path. F-M2-1 and F-M2-2
  remain resolved; no new CWE is introduced. The N-1..N-3 findings are
  advisory (DoS surface that was pre-existing, RFC-6585 polish,
  refactor-hardening) and do not block certification of M2.
verdict: PASS_WITH_NOTES
