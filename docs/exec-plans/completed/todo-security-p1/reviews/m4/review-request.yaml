# ─── Behavioural roll-up vs M0 baseline ───────────────────────────────────
behavioural_rollup:
  - sec: SEC-001
    cwe: CWE-662 (+ CWE-754, CWE-400)
    fix_commit: 1961dc3
    fix_mechanism: >-
      pair_confirm 在 `state.pairing.write()` 持锁期间完成
      `NotFound → Expired → AlreadyConfirmed → CSRF → NotScanned`
      五重校验，CSRF 校验通过后**才**在锁内写入 vtoken 与 name。
      注册 ClientRegistry 的动作在锁外执行（保持 registry →
      router 锁序，避免 F-M1-1 死锁）；失败路径上由
      `rollback_speculative_register` 撤销写前的投机插入
      （registry.remove + queue.remove + store.clear_routes +
      store.delete）。
    new_tests:
      - "src/hub/pairing.rs::tests::confirm_after_concurrent_attempt_returns_only_one_winner"
      - "tests/hub_routing_integration.rs::pair_confirm_race_yields_single_winner_and_no_orphan_vtoken"
      - "tests/hub_routing_integration.rs::concurrent_register_and_pair_confirm_does_not_deadlock"
      - "tests/hub_routing_integration.rs::getupdates_mark_seen_runs_under_write_lock"
      - "tests/hub_routing_integration.rs::rollback_cas_aborts_when_legit_re_register_happened"
      - "tests/hub_routing_integration.rs::rollback_preserves_legit_client_when_name_collides"
  - sec: SEC-003
    cwe: CWE-400 (+ CWE-754 from poisoned mutex)
    fix_commit: 8b3cc39
    fix_mechanism: >-
      `getupdates` handler 入口在 `Authorization` 提取之后、
      registry 写锁之前，先调 `state.poll_tracker.enter(&vtoken)`。
      当 `count > MAX_CONCURRENT_POLLS_PER_VTOKEN`（=3）时立即
      丢弃 guard（让 Drop 自减）并返回 HTTP 429 +
      `{"ret":429,"errmsg":"too many concurrent polls for this
      vtoken"}`，**不**进入 `wait_notify_or_shutdown`。
      `>1` 的 split-brain warn 行为保留在 `1 < n <= MAX` 区间内。
    new_tests:
      - "src/hub/mod.rs::tests::poll_tracker_caps_concurrent"
      - "tests/hub_routing_integration.rs::getupdates_returns_429_when_polls_exceed_cap"
      - "src/hub/mod.rs::tests::poll_tracker_poisoned_mutex_does_not_panic"
  - sec: SEC-013
    cwe: CWE-862 + CWE-307 + CWE-532 + CWE-203
    fix_commit: 1961dc3 + a7e5ca9
    fix_mechanism: >-
      pair_confirm 现在要求：(1) 有效的 X-Pair-CSRF header
      （32 hex chars，OS CSPRNG，与 session 绑定）；(2) session
      处于 Scanned 状态；(3) Origin/Referer 通过
      `check_origin_or_referer` helper 校验；(4) per-(code,ip)
      滑动窗口 rate-limit 阻挡 iframe/service-worker 重放。
      pair_url 日志从 info! 降至 debug!。错误顺序
      `AlreadyConfirmed → CSRF → NotScanned` 避免攻击者通过
      412 探测 Scanned 状态。
    new_tests:
      - "src/hub/pairing.rs::tests::confirm_rejected_when_status_is_wait"
      - "src/hub/pairing.rs::tests::csrf_token_consumed_after_confirm"
      - "src/hub/pairing.rs::tests::generate_csrf_is_unique_and_hex"
      - "src/server/pairing.rs::tests::check_origin_or_referer_rejects_missing_headers"
      - "src/server/pairing.rs::tests::check_origin_or_referer_rejects_garbage"
      - "src/server/pairing.rs::tests::check_origin_or_referer_accepts_well_formed_referer"
      - "tests/hub_routing_integration.rs::csrf_token_cannot_be_replayed_after_confirm"
      - "tests/hub_routing_integration.rs::csrf_check_takes_precedence_over_not_scanned"
      - "tests/hub_routing_integration.rs::pair_confirm_rate_limiter_rejects_second_attempt"
      - "tests/hub_routing_integration.rs::pair_confirm_rate_limiter_allows_concurrent_distinct_keys"
      - "tests/hub_routing_integration.rs::pair_confirm_rate_limiter_rejects_concurrent_attempts"
      - "tests/hub_routing_integration.rs::pair_confirm_rate_limiter_bounds_memory_under_adversarial_load"
      - "tests/hub_routing_integration.rs::pair_url_is_not_logged_at_info_level"

