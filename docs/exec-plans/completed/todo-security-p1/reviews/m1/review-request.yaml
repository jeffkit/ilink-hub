# ─── Behavioural diff vs. M0 baseline (61938ba) ────────────────────────────
# Summary of the M1-relevant behavioural change set:
behavioural_diff:
  - area: "pair_confirm handler"
    before: >-
      register_client_in_hub was called with no lock held; the second
      `pairing.write()` was acquired separately and a second concurrent
      caller could both register distinct vtokens and race the
      `confirm` step, leaving the operator's vtoken clobbered (SEC-001).
    after: >-
      register_client_in_hub runs first (OUTSIDE the pairing lock, to
      keep the lock order `registry → router` intact per F-M1-1); the
      handler then takes `state.pairing.write()` once and lets
      `PairingRegistry::confirm` perform the state check + CSRF check
      + Scanned check + commit atomically.  Any non-Ok from `confirm`
      triggers `rollback_speculative_register` to undo the register.
    security_classification: "CWE-362 (TOCTOU) — closed by atomic in-lock commit + rollback of speculative register"
  - area: "PairingRegistry::confirm"
    before: "Returned Ok / NotFound / Expired; no CSRF, no Scanned gate, no AlreadyConfirmed."
    after: >-
      Returns Ok / NotFound / Expired / AlreadyConfirmed / CsrfMismatch
      / NotScanned / TooManySessions.  CSRF is consumed on success
      (single-use).  Order: NotFound → Expired → AlreadyConfirmed →
      CSRF → NotScanned (F-M3-4).
    security_classification: "Pre-requisite for SEC-013 (M3); SEC-001 itself only requires the AlreadyConfirmed check to close the race."
  - area: "rollback_speculative_register (new helper)"
    before: "Did not exist."
    after: >-
      On any non-Ok from `confirm`, the handler calls
      `rollback_speculative_register(state, &name, &vtoken)` which:
      removes the name from the registry, picks a new default after
      remove, removes routes for the vtoken, removes the queue, clears
      routes in the store, and deletes the client row.
    security_classification: "F-M1-2 — closes the orphan vtoken leak from a losing racer."

