checkpoint: "M1 — SEC-001：pair_confirm 原子化（写锁内 register → confirm）"

# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M1: close the TOCTOU window in pair_confirm so that the
# interleaving `register_client_in_hub` → `pairing.write()` + `confirm`
# cannot leak a vtoken to a losing racer. The "atomic" guarantee is
# delivered via Option A (register OUTSIDE the pairing write lock, then
# commit under the lock; on non-Ok, rollback the speculative register).
# This preserves the canonical `registry → router` lock order required
# by F-M1-1.

# ─── Source-of-truth changes for SEC-001 ───────────────────────────────────
# All M1 source deltas are contained in commit 1961dc3, which is a
# combined SEC-001 + SEC-003 + SEC-013 + post-M0-review-fix commit (see
# `combined_commit_note` below). The portions of that commit attributable
# to SEC-001 are:
source_changes:
  - file: src/server/pairing.rs
    symbols:
      - "pair_confirm (handler)"
      - "rollback_speculative_register (new helper, F-M1-2)"
    change_summary: >-
      pair_confirm now: (1) validates the CSRF header, (2) runs
      register_client_in_hub OUTSIDE the pairing write lock to preserve
      the canonical `registry → router` ordering (F-M1-1), (3) takes
      state.pairing.write() and calls `confirm`, and (4) on any non-Ok
      outcome calls rollback_speculative_register to undo the register
      so a losing racer leaves no orphan vtoken / queue / store row
      (F-M1-2).  doc comment at line ~502 documents the lock-order
      invariant for future maintainers.
  - file: src/hub/pairing.rs
    symbols:
      - "PairingRegistry::confirm (now also consumes CSRF + checks Scanned)"
      - "PairingRegistry::mark_scanned (mints CSRF)"
      - "PairingError::{NotScanned,CsrfMismatch,TooManySessions} (new variants)"
    change_summary: >-
      confirm() now takes the speculative vtoken and CSRF header as
      arguments, performs `purge_expired` + `NotFound` + `Expired` +
      `AlreadyConfirmed` + CSRF + `NotScanned` checks, and only on full
      success writes vtoken / name / label into the session and
      transitions status to `Confirmed`. CSRF is consumed on success
      (F-M3-1). AlreadyConfirmed is checked BEFORE NotScanned so the
      second of two racers never sees the Scanned state through a 412
      (F-M3-4).
  - file: src/hub/pairing.rs (tests)
    symbols:
      - "tests::confirm_after_concurrent_attempt_returns_only_one_winner"
      - "tests::create_and_confirm_pairing"
      - "tests::confirm_rejected_when_status_is_wait"
      - "tests::csrf_token_consumed_after_confirm"
    change_summary: >-
      Adds the plan-required unit test for the SEC-001 outcome (the
      first racer wins, the second sees AlreadyConfirmed, NOT a leaked
      Scanned 412). Other unit tests pin CSRF single-use and
      Wait→NotScanned behaviour that the handler relies on.
  - file: tests/hub_routing_integration.rs
    symbols:
      - "pair_confirm_race_yields_single_winner_and_no_orphan_vtoken"
      - "concurrent_register_and_pair_confirm_does_not_deadlock"
    change_summary: >-
      5-racer end-to-end test that asserts exactly one winner, four
      AlreadyConfirmed losers, and that the registry holds exactly one
      client name (no orphan vtoken from rolled-back racers). Plus a
      lock-order deadlock stress test running 6 register workers × 4
      pair_confirm workers against the same state with a 5s timeout.

