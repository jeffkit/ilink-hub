# ─── Scope of this milestone (the diff under review) ──────────────────────
files_changed:
  - src/bridge/dispatcher.rs
diff_overview:
  - 新增 `enum SendOutcome { Sent, Throttled { ret: i32, errmsg: Option<String> } }`
  - `HubClient::sendmessage` 签名 `Result<()>` → `Result<SendOutcome>`：
    - HTTP transport 错误仍走 `Err`（不变）
    - `ret == 0` / `ret == None` / 解析失败 → `Ok(Sent)`
    - `ret == -2` → `Ok(Throttled { ret: -2, errmsg })`
    - 其它非零 `ret` → `Err`（用 `anyhow::bail!` 携带 errmsg）
  - 4 处调用点（shutdown-error、partial reply、cli_session_id 持久化、final reply、CLI-error reply）
    把原本的 `if let Err(e) = client.sendmessage(req).await { warn!(...) }`
    改为 `match ... { Ok(Sent) => {}, Ok(Throttled) => warn!(... M2/M3 placeholder ...), Err => warn!() }`
  - final-reply 这一个调用点在 Throttled 分支里 `anyhow::bail!` 升级为错误

