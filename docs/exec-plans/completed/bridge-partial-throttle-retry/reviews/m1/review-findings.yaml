  - id: M1-F-001
    severity: blocker
    category: correctness / build
    location:
      file: src/bridge/dispatcher.rs
      line: 661
      symbol: handle_one_message
    title: "cargo build 失败：E0308 — anyhow::bail! 给出 anyhow::Error，但函数返回 Result<(), HandleError>"
    description: |
      final-reply 路径在 `SendOutcome::Throttled` 分支里写了
        anyhow::bail!("sendmessage throttled (ret={ret})");
      而 `handle_one_message` 的签名是 `Result<(), HandleError>`。紧挨着的
      `Err(e)` 分支正确地用了 `HandleError::from(e.context(...))` 做转换
      （第 663 行），但 `bail!()` 这行漏了。
      直接 `cargo build` 报 E0308，plan.md M1 要求的 `cargo build` 命令
      退码非零，clippy 也不能跑。这是 M1 任务产出的代码本身通不过 plan
      里规定的验证命令 —— 必须先修。
    evidence: |
      $ cargo build
      error[E0308]: mismatched types
         --> src/bridge/dispatcher.rs:661:21
          |
      661 |                     anyhow::bail!("sendmessage throttled (ret={ret})");
          |                     ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^ expected `HandleError`, found `Error`
        = note: this error originates in the macro `$crate::__anyhow`
      help: call `Into::into` on this expression to convert `anyhow::Error` into `bridge::dispatcher::HandleError`
          |
      661 |                     anyhow::bail!("sendmessage throttled (ret={ret})").into();
    impact: |
      M1 任务在 worktree 内 build 都过不了，验证基线无从谈起。后续 M2-M6
      的所有 diff 都将以"无法编译"为起点 —— 任何 clippy/test 结果都不可信。
    recommendation: |
      选 (1) 与兄弟分支保持一致：
        return Err(HandleError::from(anyhow::anyhow!("sendmessage throttled (ret={ret})")));
      选 (2) 直接返回更轻的 fatal/transient 分类 —— 但 (1) 是最小的修。
    resolution: |
      选 (3) — 与 M2/M3 设计意图对齐：M1 阶段 Throttled 一律不升级为
      错误。把 `bail!` 这行彻底拿掉，改为仅 `warn!`，与 shutdown-error /
      cli_session_id / CLI-error / partial-reply 四处保持一致。这样既消
      除编译错，又消除 F-002 的设计偏差。
    status: fixed
    fixed_in_commit: "(see git log on feat/bridge-partial-throttle-retry after m1 review-iteration-2)"

