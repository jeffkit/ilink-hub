  - id: M1-F-002
    severity: high
    category: correctness / plan-deviation
    location:
      file: src/bridge/dispatcher.rs
      line: 649
      symbol: handle_one_message
    title: "final-reply 路径在 M1 阶段错误地把 Throttled 升级为失败 —— 与 plan.md M1 的设计不符"
    description: |
      plan.md 明确写：
        "M1 | ... | HTTP/JSON 结构零变化"
        "M3 | 最终回复路径同改：限流时不吞收尾 | ... 同样走 match SendOutcome + 缓冲重试"
      也就是说 M1 只是把语义信号分型出来，不要"先决定 Throttled 怎么处
      理"；M3 才在 final-reply 路径上接缓冲+重试。但 M1 实际产物在
      final-reply 路径（dispatcher.rs:649-664）对 Throttled 调用了
      `anyhow::bail!`（就算修了 F-001 转成 HandleError::Transient 之后），
      这等于"在 M1 阶段就把 Throttled 升级为 Transient 错误"—— M3 的缓冲
      +重试根本没机会接入，因为外层 `run_session_worker` 看到
      HandleError::Transient 就走"退避 + 下一条消息"分支（line 220-232），
      这条 final-reply 直接被吞。
      plan.md 风险表的对应缓解也明说"缓冲 pending 在 task panic 时丢失"
      —— 现状是 task 没 panic，限流回复却被外层当成 transient 静默丢。
    evidence: |
      dispatcher.rs:649-664:
        match client.sendmessage(req).await {
            Ok(SendOutcome::Sent) => {}
            Ok(SendOutcome::Throttled { ret, errmsg }) => {
                warn!(ret, errmsg = ?errmsg, "sendmessage throttled on final reply; M3 will buffer+retry here");
                anyhow::bail!("sendmessage throttled (ret={ret})");
            }
            Err(e) => return Err(HandleError::from(e.context("sendmessage reply"))),
        }
      run_session_worker (line 220-232) 在 HandleError::Transient 路径上
      只 log + sleep，不重试本条消息，只 backoff 后续消息。
    impact: |
      即使 F-001 修了，M1 也已经把"final-reply 限流 → 永不送达"的不变量
      写进了控制流；M3 接入缓冲+重试时要么得新加一个 HandleError 变体、
      要么得改 worker 的语义，diff 会比 plan 估计的大。
    recommendation: |
      把 Throttled 分支改成与 M1 其它三处一致：仅 warn!，不升级为错误。
      与 M2/M3 保持单源真相：Throttled 在 M1 阶段一律不触发 HandleError。
      这一改动也顺便把 F-001 的 `bail!` 拿掉。
    resolution: |
      final-reply 路径的 Throttled 分支已改为纯 `warn!` (带 sanitize_errmsg
      脱敏 + 显式 hint "M3 will buffer+retry here")，`anyhow::bail!` 移除。
      现 5 处 Throttled 调用点统一为"warn + 不升级"单源真相；M3 接入缓
      冲+重试时只需修改 final-reply 路径一个 warn，不需新增 HandleError
      变体。M1 阶段 `cargo build` 通过。
    status: fixed

