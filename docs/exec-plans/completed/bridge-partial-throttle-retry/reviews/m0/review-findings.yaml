    milestone: M1
    note: "When adding SendOutcome / final-reply path, ensure shutdown error-reply respects the same 3s window the main task uses; do not send to a context that may have just been unregistered."

# ─── OWASP / security topical checks (no findings) ───────────────────────────
owasp_topical:
  a01_broken_access_control:
    status: "no finding"
    notes: "AdminGuard uses constant-time ct_eq on bearer token (routes.rs:53-64). Per-context dispatch keys prevent cross-tenant bleed (dispatcher.rs:120-128)."
  a02_cryptographic_failures:
    status: "no finding"
    notes: "reqwest uses rustls-tls (Cargo.toml); no OpenSSL. vctx tokens are UUIDs. No secrets in code."
  a03_injection:
    status: "no finding"
    notes: "All SQL goes through sqlx parameterised bind (sessions.rs:208-243, context.rs:71-148). No string concatenation in queries."
  a04_insecure_design:
    status: "no finding"
    notes: "M0 baseline restores parity with main; no new design surface."
  a05_security_misconfig:
    status: "no finding"
    notes: "insecure_no_auth emits a tiered startup warning bound to listen address (serve.rs:87-107)."
  a06_vulnerable_components:
    status: "no finding"
    notes: "libc 0.2 is a low-level syscall shim, well-maintained. No new attack surface beyond what libc already provides on Unix."
  a07_auth_failures:
    status: "no finding"
    notes: "Token comparison is constant-time."
  a08_data_integrity:
    status: "no finding"
    notes: "v7 partial unique index closes a real TOCTOU on find_or_create_vctx."
  a09_logging_failures:
    status: "no finding"
    notes: "Insecure-mode warning at startup; metrics cover dispatch latency and user-message counts."
  a10_ssrf:
    status: "no finding"
    notes: "Hub client URL is built from operator-provided config (resolve_hub_connection); not user-controlled. Reqwest follows redirects disabled by default."
