milestone: M0
title: "Adversarial review — Baseline (pre-fix build/test green)"
reviewer: "rust-safety-concurrency"
date: 2026-06-21
scope: >
  M0 only — baseline worktree that syncs main's WIP into the worktree
  (no production logic change) plus one desktop-hub_delete_client-force-flag
  fix at desktop/ilink-hub-desktop/src-tauri/src/lib.rs:605. The actual
  SendOutcome / partial-throttle / give-up-cap work is in M1–M6 and is NOT
  in this review. Focus areas: memory safety, data races, tokio pitfalls,
  OWASP Top 10 (auth, injection, SSRF, secrets handling).

# ─── Summary ─────────────────────────────────────────────────────────────────
verdict: "PASS_WITH_NITS"
verdict_rationale: >
  M0 is a green-up baseline. No new dispatcher.rs or sendmessage logic was
  authored in this milestone — every src/ change is verbatim from main's
  working tree (proven by /tmp/m0-wip-snapshot/main-wip.patch). 399 unit
  + integration tests + 33 desktop tests all pass; cargo clippy -D warnings
  and cargo fmt --check are clean. The synced changes themselves look sound:
  mpsc-based per-session worker pool uses a std::sync::Mutex (correctly
  chosen — no await points in critical section), SIGTERM/Ctrl-C use the
  CancellationToken pattern with proper timeout-then-abort, v7 partial
  unique index replaces TOCTOU SELECT+INSERT for find_or_create_vctx, and
  admin auth uses constant-time ct_eq on the bearer token.

  Three LOW severity nits are reported. None block M0 — M1+ is the right
  place to address them. One MEDIUM observation is reported for M1 to
  carry forward: the shutdown error-reply path in run_session_worker can
  race with the poll-3s-then-abort in main and emit a reply to a user
  whose context_token has just been unregistered by the Hub.

# ─── Findings (severity-ordered) ─────────────────────────────────────────────
findings:

  # ── MEDIUM (carry into M1, do not block M0) ────────────────────────────────
  - id: M0-RUST-001
    severity: medium
    title: "Shutdown error-reply can race with Hub-side client unregister"
    location: "src/bridge/dispatcher.rs:161-178"
    category: concurrency / data-flow
    description: >
      On shutdown, run_session_worker does `client.sendmessage(req).await`
      using `ctx_for_err` and `from_for_err` captured before the AI call.
      Meanwhile main (src/bin/ilink-hub-bridge.rs:284-309) waits 3 s after
      `shutdown.cancel()` then `handle.abort()`. If during those 3 s a
      parallel Hub admin operation (or a TTL eviction) unregisters the
      vctx / drops the vtoken, the sendmessage HTTP call returns 401/4xx
      and the user gets a confusing "响应中断" message even though their
      context is gone. Worse, the session worker captures `from_for_err`
      (a WeChat peer id), not a vtoken; if the same peer logs in under a
      new vtoken in the 3 s window, the reply lands in the wrong session.
    impact: >
      Misrouted reply delivered to a user whose context is no longer
      registered. Low frequency (only at shutdown), low severity (no
      privilege escalation), but is a real user-visible "ghost" reply.
    recommendation: >
      (1) Take a `&CancellationToken` on the error-reply send so the
      nested send also respects the timeout window; or (2) check
      `shutdown.is_cancelled()` immediately before the `sendmessage` call
      and skip the reply if so. (3) For M1, when the give-up cap / final
      reply is added, ensure the same shutdown gating applies. Track in
      M1.
    blocks_m0: false

  # ── LOW (nits — non-blocking) ─────────────────────────────────────────────
  - id: M0-RUST-002
    severity: low
    title: "make_sigterm_future silently downgrades on signal handler install failure"
    location: "src/bin/ilink-hub-bridge.rs:121-133"
    category: tokio / robustness
    description: >
      If `tokio::signal::unix::signal(SignalKind::terminate())` returns
      Err (e.g. fd exhaustion, or in a sandbox that denies signalfd), the
      code logs nothing, falls through to `std::future::pending`, and
      the process becomes unkillable short of SIGKILL. The same applies
      to ctrl_c() in the other select branch — that one is harder to
      miss because operators notice a stuck process, but the silent
      downgrade here is the worse failure mode.
    impact: >
      Unkillable bridge on platforms that deny signal() — graceful
      shutdown becomes impossible. Rare in practice (most Unix
      environments permit it), but no observability.
    recommendation: >
      On `Err(e)` in the unix branch, `tracing::warn!` with the error
      and at least set a flag so the shutdown function logs the
      downgraded mode at SIGTERM-receipt time. Two-line fix.
    blocks_m0: false

  - id: M0-RUST-003
    severity: low
    title: "try_send drop in e2e harness silently loses messages if channel is full"
    location: "tests/e2e_wechat_simulation.rs:383,432,477,514,550,603,637,659,703,740,749,780,792"
    category: test-correctness
    description: >
      All call sites changed from broadcast::Sender::send (lossless to
      the single Subscriber) to mpsc::Sender::try_send (returns Err when
      buffer is full). The harness uses `dispatch_channel_size: 64` and
      now `try_send(...).unwrap()`. If the dispatcher is slow in CI
      (load, GC pause on other crates), any burst > 64 will panic. The
      pre-change `send().await` would block-and-survive; `try_send` is
      a real semantic change in test reliability, not just a rename.
    impact: >
      CI flakiness on a slow runner — tests panic with an unwrap on
      TrySendError::Full rather than backpressure-yielding. No security
      impact; pure test stability.
    recommendation: >
      Either (a) bump `dispatch_channel_size` in `boot()` to 1024 to
      match production, or (b) replace `.unwrap()` with a small
      `poll_fn`-style retry that yields once. Option (a) is the
      one-liner.
    blocks_m0: false

  - id: M0-RUST-004
    severity: low
    title: "MAX_SESSION_WORKERS eviction in hot path iterates full map"
    location: "src/bridge/dispatcher.rs:267-278"
    category: perf / locking
    description: >
      On every dispatch where the cap is reached, `senders.retain(...)`
      iterates all 512 entries under the std::sync::Mutex. With a busy
      hub this is O(N) on every cap-hit message. Not a security issue;
      a perf footgun for high-fanout deployments.
    impact: >
      Linear-time lock-hold on the dispatch hot path when the worker
      cap is approached. Not data-racy, just slow.
    recommendation: >
      The 60 s background `evict_closed_senders` task already exists.
      In the cap branch, do a cheaper sample-and-shrink (e.g. drain
      only the closed subset) or simply `swap_remove` the first closed
      entry instead of a full retain. M3 / quality-gate scope.
    blocks_m0: false

  # ── INFORMATIONAL (positive confirmations, not findings) ───────────────────
  - id: M0-RUST-INFO-001
    severity: info
    title: "Mutex choice and Send/Sync boundaries are correct"
    location: "src/bridge/dispatcher.rs:227, 250-304"
    description: >
      `SessionDispatcher::senders` uses `std::sync::Mutex`, not
      `tokio::sync::Mutex`. The comment at line 225 is correct: the
      critical section is purely synchronous HashMap ops (retain/get/
      insert) and the async sends are *outside* the lock via cloned
      `mpsc::Sender`. No await-with-lock-hold footgun. `HubClient` is
      Clone (reqwest::Client is internally Arc), so passing clones into
      the worker is sound.
    blocks_m0: false

  - id: M0-RUST-INFO-002
    severity: info
    title: "Admin bearer check uses constant-time compare"
    location: "src/server/routes.rs:53-64"
    description: >
      `subtle::ConstantTimeEq::ct_eq` is used for bearer-token
      comparison. This is correct OWASP-aligned practice — no string
      `==` shortcut. The insecure_no_auth fallback is correctly bounded
      to 127.0.0.1 in startup-warn paths.
    blocks_m0: false

  - id: M0-RUST-INFO-003
    severity: info
    title: "v7 partial unique index closes TOCTOU on find_or_create_vctx"
    location: "migrations/0007_peer_user_id_unique_index.sql + src/store/context.rs:67-99"
    description: >
      The migration adds a partial unique index on peer_user_id (with
      `WHERE peer_user_id != ''`). The Rust code now uses a single
      `INSERT ... ON CONFLICT (peer_user_id) DO UPDATE ... RETURNING`
      on SQLite/Postgres, with a `is_missing_constraint_error` fallback
      for pre-v7 schemas. This is the right pattern: race-free on PG,
      safe-via-serialised-write-pool on SQLite. MySQL fallback path
      documented.
    blocks_m0: false

  - id: M0-RUST-INFO-004
    severity: info
    title: "libc dependency is properly scoped to Unix"
    location: "Cargo.toml:42-44"
    description: >
      `libc = "0.2"` is in a `[target.'cfg(unix)'.dependencies]` block,
      so Windows builds do not pull it. No cross-platform surface area
      bloat.
    blocks_m0: false

  - id: M0-RUST-INFO-005
    severity: info
    title: "Desktop force-flag fix is semantically correct"
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:605"
    description: >
      `unregister_client_in_hub(state.as_ref(), &name, true)` matches
      the same call shape used at src/server/routes.rs:807 for the
      bridge-manager path. The `force: true` flag bypasses the
      StillOnline check, which is the correct UX for an explicit
      user-initiated delete from the desktop UI. No regression vs.
      bridge-manager behavior.
    blocks_m0: false

