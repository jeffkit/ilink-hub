  source_files_changed_pre_plan: []

# ─── Edits made during M0 (deviation from "no code change") ───────────────
# M0's job is to surface a clean baseline. The baseline was dirty in the
# worktree (main had uncommitted WIP not carried into the worktree), so
# M0 syncs the WIP into the worktree and fixes one desktop-frontend call
# site that broke against the synced WIP. This is a strict green-up of the
# quality gates the plan requires — no behavior change in production code.
fixes:
  - id: "sync-main-wip-into-worktree"
    description: >
      Applied /tmp/m0-wip-snapshot/main-wip.patch (917 lines, 17 files
      modified) and copied migrations/0007_peer_user_id_unique_index.sql
      from main's working tree into the worktree. This was necessary
      because main had been edited on-disk but not yet committed/pushed;
      the worktree is forked off git index HEAD and so initially lacked
      these changes. After the sync, the worktree matches the on-disk
      main state.
    files_synced:
      - Cargo.lock
      - Cargo.toml
      - src/bin/ilink-hub-bridge.rs
      - src/bridge/builtin/cursor.rs
      - src/bridge/dispatcher.rs
      - src/bridge/mod.rs
      - src/hub/health.rs
      - src/hub/tests.rs
      - src/runtime/serve.rs
      - src/store/context.rs
      - src/store/sessions.rs
      - src/store/store_tests.rs
      - tests/breaking_changes.rs
      - tests/e2e_wechat_simulation.rs
      - tests/hub_routing_integration.rs
      - tests/metrics_auth_tests.rs
      - migrations/0007_peer_user_id_unique_index.sql
    source: "/tmp/m0-wip-snapshot/main-wip.patch + copied 0007_*.sql"
    safety: >
      Main's working tree was backed up via `git stash push -u` (then
      popped back) before applying the patch to the worktree, and the
      diff was preserved at /tmp/m0-wip-snapshot/main-wip.patch for
      audit. The patch is a verbatim copy of main's on-disk state and
      contains no new logic authored during M0.
    scope: "synced from main working tree; no new logic introduced in m0"
    risk: "none — this restores parity with main; no production behavior delta"

  - id: "desktop-hub_delete_client-force-flag"
    file: desktop/ilink-hub-desktop/src-tauri/src/lib.rs
    line: 605
    before: "match unregister_client_in_hub(state.as_ref(), &name).await {"
    after: "match unregister_client_in_hub(state.as_ref(), &name, true).await {"
    reason: >
      The synced main WIP changed `unregister_client_in_hub` to a 3-arg
      signature (state, name, force) — the force flag is required by the
      Bridge manager path (src/server/routes.rs:807) to skip the
      StillOnline check. The desktop UI's `hub_delete_client` Tauri
      command (a user-initiated "delete this backend" operation) was
      still calling the old 2-arg form, breaking `cargo check
      --manifest-path desktop/ilink-hub-desktop/src-tauri/Cargo.toml`.
      Pass `true` to match the UI's intent: the user has explicitly
      chosen to delete the entry, so the StillOnline guard is
      superseded.
    scope: "desktop frontend only; matches the already-synced ilink-hub API"
    risk: "minimal — same as routes.rs:807 path; user-initiated delete bypasses the StillOnline check, which is the documented UX"

