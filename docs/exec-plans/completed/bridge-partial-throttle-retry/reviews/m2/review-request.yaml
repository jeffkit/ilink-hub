# ─── Plan reference ─────────────────────────────────────────────────────────
plan: docs/exec-plans/active/bridge-partial-throttle-retry/plan.md
checkpoint: "M2 — partial_rx 任务改为有状态循环：pending: String + 退避计时器（起步 5s，×2，封顶 60s）；Sent 清空+重置计时器；Throttled 不清空、退避后重试；Failed 维持原行为"
reviewer_focus: |
  重点审查（Rust 安全 + 并发 + tokio 异步陷阱 + 业务正确性）：
  - 退避计算纯函数（fn backoff_for(attempt) -> Duration）是否在所有 attempt 下都不溢出、序列与 spec 一致
  - 有状态循环的 cancel-safety：shutdown 唤醒 in-flight sleep 后是否丢失 / 错发 pending
  - backoff sleep 期间收到新 chunk 的"覆盖 pending"语义是否正确（最新内容、不重发过时片段）
  - Err 分支是否会陷入"spin 死循环"（如设计不当，Err 时清空 pending 才是正确做法）
  - trait ReplySender 抽象是否合理；HubClient impl 是否把 session_name 正确挂到 ilink_hub_ext
  - mock-based 单测是否完整覆盖 E2E-1 场景 A/B、场景边界

# ─── Scope of this milestone (the diff under review) ──────────────────────
files_changed:
  - src/bridge/dispatcher.rs
diff_overview:
  - 新增常量 `INITIAL_BACKOFF_SECS = 5` / `MAX_BACKOFF_SECS = 60`
  - 新增纯函数 `fn backoff_for(attempt: u32) -> Duration`：
    - 序列 [5, 10, 20, 40, 60, 60, …]，attempt 0 起步
    - 通过内部 `fn backoff_for_with(attempt, initial, cap)` 实现，避免 u64 溢出
  - 新增 `fn backoff_for_test(attempt, initial: Duration, cap: Duration) -> Duration` (cfg(test))：
    - 允许测试注入毫秒级 schedule 而不睡眠真实秒数
  - 新增 `trait ReplySender` + `impl ReplySender for HubClient`：
    - `send_reply(&self, ctx, text, from_user, session_name) -> BoxFuture<Result<SendOutcome>>`
    - HubClient impl 复用现有 `sendmessage`，并把 `session_name` 挂到 `ilink_hub_ext`
  - 新增 `async fn run_partial_forward_loop<S: ReplySender>(...)`：
    - 内部 `pending: Option<String>`、`attempt: u32` 状态
    - phase 1：pending 为 None 时 recv 第一个 chunk；pending 为 Some 时
      `tokio::select!{shutdown, sleep(backoff), recv}`：sleep 完走 phase 2 重试，
      recv 触发则覆盖 pending（保持 attempt 不变，重置 backoff）后继续 sleep
    - phase 2：取 `pending.as_ref()` 构造 `SendMessageRequest` + send_reply：
      - `Ok(Sent)` → pending = None, attempt = 0
      - `Ok(Throttled)` → attempt += 1, warn, 走 phase 1 else 退避
      - `Err(_)` → warn, pending = None, attempt = 0（避免 spin 死循环）
    - 接受 `backoff_fn: fn(u32) -> Duration` 函数指针参数：生产用 `backoff_for`，测试用 5ms 起步 ×2 封顶 40ms
    - cancel-safety：每个 await 在 select 中观察 shutdown，不会出现 panic / 资源泄漏
  - `handle_one_message` 中的 inline forward 闭包替换为对
    `tokio::spawn(run_partial_forward_loop(client, partial_rx, ctx, from, sess, shutdown, backoff_for))` 的调用
  - 测试模块新增 13 个测试：
    - `backoff_sequence_matches_spec` / `backoff_clamps_at_cap_for_large_attempt` /
      `backoff_does_not_overflow_at_u32_max` / `backoff_is_non_decreasing`
    - `partial_three_throttles_then_success_delivers_latest_content`（E2E-1 场景 A）
    - `partial_single_chunk_throttled_then_success_buffers_until_clear`
    - `partial_chunk_overwritten_during_backoff_drops_stale_fragment`（overwrite 语义）
    - `partial_persistent_throttle_caps_retry_at_max_backoff`（E2E-1 场景 B 短变体）
    - `partial_err_drops_buffer_and_continues_serving_new_chunks`（Err 防 spin）
    - `partial_shutdown_during_backoff_exits_cleanly`（cancel-safety）
    - `partial_chunks_arrived_after_sender_continues_normal_path`（happy path 顺序保持）
    - `reply_sender_impl_attaches_session_name_to_hub_ext`（trait impl 编译期 pin）

# ─── Design notes (for the reviewer) ───────────────────────────────────────
design_notes:
  - backoff 序列: "起步 5s, ×2, 封顶 60s" 直接对应 m2 plan 的要求。
    attempt 0 (首次重试) → 5s, attempt 1 → 10s, ..., attempt 4+ → 60s。
    测试 `backoff_sequence_matches_spec` 钉死 [5,10,20,40,60,60,...]，
    `backoff_does_not_overflow_at_u32_max` 钉死 u32::MAX 不溢出。
  - "合并" 语义: partial chunk 是不定长、不定界的流式片段，iLink 协议
    不要求 partial 顺序回放；保留历史片段会浪费流量、可能反过来触发
    更多限流。所以 m2 选择 "覆盖" 语义：新 chunk 总是替换 pending，
    永远只重发最新内容。plan.md 描述的 "合并" 在 iLink partial 语境下
    等同于 "积压只保留最新一份"。E2E-4 后续会在真实场景验证顺序保持。
  - cancel-safety: phase 1 if/else 与 phase 2 发送路径都把
    `shutdown.cancelled()` 放在 `tokio::select!` 的 biased 第一支，
    任何 in-flight sleep 都能被 shutdown 唤醒；shutdown 触发后
    pending 立即 drop（与 run_session_worker 整体退出一致；持久化
    由 m4 引入的"放弃上限"覆盖，pending 的跨 shutdown 持久化
    本来就不在 plan 范围内）。
  - Err 防 spin: 任意 `Err`（非 `Throttled`）清空 pending + 重置 attempt，
    防止 transport 错误导致高频重试；这是 M1 SendOutcome 设计的
    直接延伸（"Throttled 之外的错误是 generic failure"）。
  - trait 抽象: ReplySender 只暴露 partial reply 单一方法；不抽象
    cli_session_id 持久化和 CLI-error reply（M3 范围）。HubClient
    impl 是 trivial 的 wrapper — 它把 m1 的 session_name 挂到
    ilink_hub_ext，然后调 `self.sendmessage(req)`。
  - 函数指针 vs trait object: 选择 `fn(u32) -> Duration` 函数指针
    而非 `Box<dyn Fn>` 是为了 (a) 不引入堆分配，(b) 编译期 monomorphize，
    (c) 测试只需传一个 `fn` 名字。生产 backoff_for 与测试 backoff
    共用同一份 monomorphized 模板。

