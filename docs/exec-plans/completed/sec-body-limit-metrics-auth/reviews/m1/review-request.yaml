# ─── 风险 / 注意事项 ────────────────────────────────────────────────────────
risks:
  - SEC-007 的 "done" 标注与代码事实不符，prompt.md 与 plan.md 均明确指出
    这是要补的；M3 实施后把代码提交信息与 TODO.md commit 引用对齐。
  - DefaultBodyLimit 在 axum 0.8 行为：超过限制时由 axum 自动返回
    413 Payload Too Large（无需 handler 主动判断）。M4 测试断言 413 即可。
  - sendmessage 单独放开 4 MB 的依据：item_list 可能含 base64 编码的
    image/voice/file/video，256 KB 全局上限会过紧；4 MB 是经验阈值
    （参考 v0.1.x 历史 payload 大小）。
  - 鉴权失败返回 401 vs 403：现有 admin handler 全部 401，M3 metrics
    handler 保持一致。insecure_no_auth() 仅作为开发/测试逃生口，
    生产环境必须设 ILINK_ADMIN_TOKEN。

