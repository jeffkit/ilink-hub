milestone: M2
title: SEC-010 Body Limit — 实现
status: ready-for-review
created: 2026-06-17

# ─── 范围 ────────────────────────────────────────────────────────────────────
scope:
  - 在 `src/server/mod.rs` 中为全局路由添加 `DefaultBodyLimit::max(256 * 1024)` 限制（256 KB）。
  - 在 `src/server/mod.rs` 中为 `/ilink/bot/sendmessage` 路由添加 `.layer(DefaultBodyLimit::max(4 * 1024 * 1024))` 限制（4 MB）。
  - 在 `tests/breaking_changes.rs` 中新增单元测试，对全局和 sendmessage 分别进行 256 KB 和 4 MB 的边界限制验证，验证 413 状态码。

# ─── 关键改动 ────────────────────────────────────────────────────────────────
changes:
  - file: src/server/mod.rs
    lines:
      - 4: 引入 `axum::extract::DefaultBodyLimit`
      - 30-33: 在 `/ilink/bot/sendmessage` 路由上加 `.layer(DefaultBodyLimit::max(4 * 1024 * 1024))`
      - 58: 在全局 Router 上加 `.layer(DefaultBodyLimit::max(256 * 1024))`
  - file: tests/breaking_changes.rs
    lines:
      - 617-717: 新增 `test_body_limit_global` 和 `test_body_limit_sendmessage_override` 测试用例，验证边界值

