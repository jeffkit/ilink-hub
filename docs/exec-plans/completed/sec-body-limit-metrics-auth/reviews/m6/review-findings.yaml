findings:
  - id: A-M6-1
    severity: INFO
    status: RESOLVED
    cwe: CWE-400 (Uncontrolled Resource Consumption)
    title: >-
      Evaluation of Graceful Shutdown Queue Drain Loop and Timeout Fallback
    location: src/runtime/serve.rs:695-748
    description: >-
      The graceful shutdown sequence implements a loop `drain_queues_before_shutdown` that blocks the Axum shutdown signal
      until all per-vtoken queues are empty. Since Axum remains fully active and accepting requests during this period,
      continuous message traffic from upstream could theoretically prevent the queues from emptying. This is successfully
      mitigated by the deadline condition (`tokio::time::Instant::now() >= deadline`), which forcefully breaks the loop
      after `ILINK_SHUTDOWN_DRAIN_SECS` (default 30 seconds), preventing the shutdown process from hanging indefinitely.
    impact: >-
      Prevents the service from hanging on shutdown during high traffic while still providing a window for client updates to be pulled.
    recommended_fix: >-
      No change is necessary. The current timeout mechanism is robust. Operators can tune the duration via `ILINK_SHUTDOWN_DRAIN_SECS`.
    test_gap: >-
      None. The boundary unit test `drain_times_out_when_queue_not_empty` verifies this behavior using virtual time manipulation.

