findings:
  - id: A-M5-1
    severity: INFO
    status: RESOLVED
    cwe: CWE-362 (Concurrent Execution using Shared Resource with Improper Synchronization)
    title: >-
      Safety of `unsafe` `std::env::set_var` in a dedicated integration test process
    location: tests/metrics_auth_tests.rs:16-20
    description: >-
      The test uses `unsafe { std::env::set_var(...) }` to configure the test admin token.
      Since Rust 1.79.0, `std::env::set_var` is marked unsafe because modifying environment
      variables concurrently with other threads reading them is not thread-safe.
      This has been safely mitigated by placing the test in a dedicated, isolated integration
      test file `tests/metrics_auth_tests.rs` containing only a single test case. Because
      Cargo runs each integration test file in its own process, there are no other concurrent
      test threads executing within the process, eliminating the risk of data races on the
      process environment.
    impact: >-
      Prevents undefined behavior due to thread-unsafe environment modification.
    recommended_fix: >-
      Keep the test isolated. If future tests are added to `tests/metrics_auth_tests.rs`,
      ensure they do not rely on a different environment or run in parallel threads that
      could conflict with this variable.
    test_gap: >-
      None.

pass_items:
  - "The test correctly validates all three required scenarios (no token, wrong token, correct token)."
  - "The test uses tower::ServiceExt::oneshot to mock requests in-memory without opening real TCP sockets, preventing port conflicts."
  - "Constant-time comparison is preserved in the application routes via `subtle::ConstantTimeEq`."

verdict_rationale: >-
