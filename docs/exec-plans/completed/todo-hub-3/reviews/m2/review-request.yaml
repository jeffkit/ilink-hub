milestone: m2
title: Fix MEM-02 (QuoteRouteIndex Limit)
status: completed
description: |
  Added a limit of 10,000 entries (keys) to `by_content` in `src/hub/quote_route.rs`.
  Checked the count in `register_outbound_content`, skipped registration of new keys if over the limit, and emitted a warning log.
  Added a new unit test `register_outbound_content_respects_limit` to verify limit enforcement and warning logging behaviour.
verification:
  - cargo fmt --check passed
  - cargo clippy -- -D warnings passed
  - cargo test passed (specifically `cargo test quote_route` which includes `register_outbound_content_respects_limit`)
  - cargo build passed
