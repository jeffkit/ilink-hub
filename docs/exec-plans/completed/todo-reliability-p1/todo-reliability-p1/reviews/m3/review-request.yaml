# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M3: harden the QR-login modal so users know the prerequisites
# before scanning, and have a one-click troubleshooting checklist if their
# scan yields nothing. Two pieces:
#
#   1. Prereq banner at the top of `#qr-modal` calling out the two things
#      users have to do before scanning: enable ClawBot (龙虾插件) in
#      微信 → 我 → 设置 → 插件, AND use an iLink-enabled 微信 账号 to scan.
#      Plain (non-iLink) 微信 accounts cannot authorize.
#   2. A collapsible "扫了没反应?" help block at the bottom of the same
#      modal, listing the three classic failure modes (account not enabled,
#      QR expired, mobile network), aligned with `docs/guide/getting-started.md`
#      `:::details 二维码扫了没反应？` and `docs/bridge/quick-try.md` "你需要".
#
# The toggle uses native `<details>`/`<summary>` so the existing
# `.help-collapsible.be-help` CSS handles it without any new TS handlers.
# The modal copy change is pure HTML — no Rust or TS API surface changes.

# ─── Source-of-truth changes for UX-03 ─────────────────────────────────────
source_changes:
  - file: desktop/ilink-hub-desktop/index.html
    symbols:
      - "#qr-modal — new `.qr-prereq` callout under .modal-lead"
      - "#qr-modal — new `.help-collapsible.qr-help` block (after .qr-actions)"
    change_summary: >-
      Adds the ClawBot/iLink prereq callout directly under the existing
      `.modal-lead` paragraph in `#qr-modal`. The callout uses the existing
      `.callout` (warn-soft) style — same treatment as the home-panel
      bind-hint — and is `text-align: left` so the Chinese inline
      parenthetical reads naturally. After the `.qr-actions` row, a
      `<details class="help-collapsible qr-help be-help">` block adds the
      "扫了没反应?" collapsible; the help body contains a `<ul
      class="qr-help-list">` with the three failure modes (账号未开通 iLink /
      二维码过期 / 手机网络异常). The existing `.modal-foot` "二维码不显示..."
      paragraph is preserved unchanged below the new block. No new IDs —
      the block is purely structural and reuses the existing
      `.help-q` / `.help-summary` / `.help-body` summary-icon + title +
      body pattern from the backends panel's "连接说明与微信命令" block.
  - file: desktop/ilink-hub-desktop/src/styles.css
    symbols:
      - ".qr-prereq (new)"
      - ".help-collapsible.qr-help (new)"
      - ".qr-help-list (new)"
    change_summary: >-
      Three small additions inside the QR section of the stylesheet. The
      `.qr-prereq` override forces `text-align: left`, tightens the
      font-size to 0.7rem, and trims the bottom margin so the callout
      fits visually between `.modal-lead` and `.qr-frame` inside the
      320px modal-card without crowding. The `.qr-help` override also
      forces `text-align: left` and reduces the block's top margin so
      the collapsible sits close to the copy button. `.qr-help-list` is a
      left-padded `<ul>` with tighter vertical rhythm (0.32rem gap)
      suited to the narrow modal; `<strong>` runs get `var(--text)` color
      so the failure-mode label pops against the muted description.

