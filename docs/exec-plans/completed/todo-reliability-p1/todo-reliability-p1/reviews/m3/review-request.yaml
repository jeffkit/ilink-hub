# ─── Behavioural diff vs. baseline (5d8d210) ───────────────────────────────
behavioural_diff:
  - area: "QR modal — prereq reminder (new)"
    before: >-
      `#qr-modal` opened straight into the scan flow with `.modal-lead`
      "用微信扫描下方二维码,按提示完成登录。" and no warning that the
      user must (a) enable ClawBot in WeChat settings and (b) scan with an
      iLink-enabled account. Users with a plain WeChat account would
      scan, see nothing happen, and have no in-app pointer to the cause.
    after: >-
      `#qr-modal` now shows a `.qr-prereq.callout` paragraph immediately
      below `.modal-lead`. The callout flags both prerequisites inline
      (ClawBot plugin toggle + iLink-enabled account) and explains why
      (plain WeChat accounts cannot authorize). The existing
      `.modal-lead` scan-flow instructions are preserved unchanged
      underneath.
    security_classification: >-
      Pure UX copy change. No new attack surface, no new IPC commands,
      no schema drift. The reminder is informational only — the actual
      authorization decision is made by the upstream ClawBot service
      regardless of what the desktop UI tells the user.
  - area: "QR modal — collapsible troubleshooting (new)"
    before: >-
      `#qr-modal` offered no in-app recovery path for the "扫了没反应"
      failure mode. Users had to leave the app and consult
      `docs/guide/getting-started.md` or `docs/bridge/quick-try.md`
      to learn that the QR expires after ~2 minutes, that the account
      must be iLink-enabled, and that mobile network issues can block
      the auth callback.
    after: >-
      A `<details>` block titled "扫了没反应?" sits between
      `.qr-actions` and `.modal-foot`. Expanding it reveals a 3-item
      list — 账号未开通 iLink / 二维码过期 / 手机网络异常 — aligned
      verbatim with the `:::details 二维码扫了没反应？` block in
      `docs/guide/getting-started.md:96-100` and the prerequisites in
      `docs/bridge/quick-try.md:12`. Toggle uses native
      `<details>`/`<summary>` (zero JS, identical to the existing
      backends-panel "连接说明与微信命令" collapsible), so it works
      inside WebKit on macOS desktop apps without any extra wiring.
    security_classification: >-
      Pure UX copy change. No new attack surface, no new IPC commands.
      Reuses the existing `.help-collapsible.be-help` style; only adds
      three tiny per-element overrides for text-align/font-size to fit
      the narrow modal.
  - area: "QR modal — copy button + link (unchanged)"
    before: "Existing `.qr-actions` `#qr-copy` "复制备用链接" button and `.modal-foot` hint preserved unchanged."
    after: "Same. The new prereq + help block slot in without disturbing the existing scan / copy / foot flow."
    security_classification: "N/A — no change."

