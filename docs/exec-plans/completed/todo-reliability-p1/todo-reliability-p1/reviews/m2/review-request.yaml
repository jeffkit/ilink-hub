# ─── M2-required test inventory (plan §M2) ─────────────────────────────────
# Plan §M2 explicitly required:
#   1. cargo build -p ilink-hub-desktop passes (src-tauri side)
#   2. pnpm -C desktop/ilink-hub-desktop run build passes (frontend side)
#   3. manual reproduction: occupy 8765 → launch desktop → port-change
#      dialog → enter new port → bind succeeds
m2_test_inventory:
  desktop_lib_unit:
    - test: loopback_listen_addr_for_port_is_loopback_only
      covers: >-
        Contract that the GUI port override cannot accidentally rebind on
        a non-loopback interface. `loopback_listen_addr_for_port(p)` is
        asserted to produce exactly `127.0.0.1:<p>` for boundary values
        (1, 8765, 65535).
      result: pass
    - test: parse_loopback_port_accepts_canonical_and_loose_forms
      covers: >-
        Parser for the listen-port-input prefill / hub-info sync path.
        Accepts `127.0.0.1:8765`, `localhost:9000`, bare `<port>`. Rejects
        `127.0.0.1:0`, out-of-range numerics, negative inputs, IPv6 forms,
        and empty strings so the UI never shows a bogus port.
      result: pass
    - test: desktop_port_override_round_trip_under_data_dir
      covers: >-
        End-to-end: with HOME pointed at a `tempdir`, `save_desktop_port_override(9123)`
        then `load_desktop_port_override()` round-trips through the
        `~/.ilink-hub/desktop-port.json` file. Asserts the on-disk JSON
        uses the camelCase `port` key the TypeScript frontend expects.
      result: pass
    - test: desktop_port_override_rejects_zero_in_loaded_file
      covers: >-
        Hand-crafts `{"port":0}` on disk; the loader MUST surface a
        validation error (not silently fall back) so a corrupted file
        doesn't silently bind to an ephemeral port.
      result: pass
    - test: desktop_port_override_rejects_malformed_json
      covers: >-
        Non-JSON payload on disk surfaces a parse error to `setup()`
        (which then falls back to the env default with a tracing warning
        rather than refusing to launch).
      result: pass
    - test: resolve_initial_listen_addr_prefers_persisted_port
      covers: >-
        With a persisted override present AND `ILINK_HUB_ADDR` set in
        env, the persisted port wins. Verifies the documented priority
        chain: persisted → env → default.
      result: pass
    - test: resolve_initial_listen_addr_falls_back_to_env_when_no_override
      covers: >-
        No persisted file → env var wins; no env var → default
        `127.0.0.1:8765`. Cleans up env state on test exit so parallel
        test runs don't leak into each other.
      result: pass
    - test: hub_controller_set_requested_addr_is_observable_via_getter
      covers: >-
        The GUI change-port flow mutates `requested_addr` in place; both
        `hub_info` (UI) and `start_hub` (next bind) MUST see the new
        value via the accessor. Asserts the in-memory + on-disk paths
        converge.
      result: pass
    - test: set_listen_port_command_rejects_zero
      covers: >-
        `set_listen_port(0)` is rejected at the command boundary with
        a `result.ok == false` + a non-empty `result.error`. This is the
        contract that lets the GUI render an inline error rather than
        getting a confusing bind failure on port 0 (which would mean
        "any ephemeral port").
      result: pass
    - test: set_listen_port_command_persists_and_updates_controller
      covers: >-
        Happy path on a `mock_app()`: after `set_listen_port(9123)`,
        `load_desktop_port_override()` returns `Some(9123)` AND
        `ctrl.requested_addr()` returns `"127.0.0.1:9123"`. Both
        on-disk and in-memory views update under one command.
      result: pass
    - test: set_listen_port_command_overwrites_previous_value
      covers: >-
        Successive calls overwrite the persisted port AND the
        controller's `requested_addr`. Regression-guard for accidental
        "append instead of replace" behaviour.
      result: pass
    - test: get_desktop_settings_prefills_listen_port_from_requested_addr
      covers: >-
        After the controller's `requested_addr` is mutated, the UI
        payload exposes `listenPort` matching the new port. The frontend
        uses this on cold start to prefill the input even when the value
        came from `ILINK_HUB_ADDR` rather than a saved file.
      result: pass
    - test: get_desktop_settings_falls_back_to_default_when_unparseable
      covers: >-
        When the controller's `requested_addr` cannot be parsed to a u16
        (e.g. `[::]:8765` from a non-loopback bind), `get_desktop_settings`
        returns `listenPort = 8765` as a sane fallback so the UI never
        shows "port 0".
      result: pass

