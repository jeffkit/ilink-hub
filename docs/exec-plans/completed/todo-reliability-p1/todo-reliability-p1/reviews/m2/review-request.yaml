# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M2: when the configured listen port is occupied, surface a
# "端口被占用,换一个端口?" dialog inside the GUI instead of forcing the user
# to set `ILINK_HUB_ADDR` and restart the .app. The change has three pieces:
#
#   1. Persist a per-user listen-port override at
#      `~/.ilink-hub/desktop-port.json` (schema: `{ "port": <u16> }`).
#   2. Add a "监听端口" input + "保存并重启" button on the home panel;
#      saving triggers a `restart_hub` (or `start_hub` if previously stopped)
#      and the persisted file is honored on subsequent launches.
#   3. Detect bind failures (`hub-error` payloads matching `EADDRINUSE`,
#      "address already in use", or "bind") and open a port-conflict modal
#      with a one-click "换端口并启动" affordance.
#
# The bind-hint copy on the home panel no longer references the
# `ILINK_HUB_ADDR` env var — users are pointed at the new GUI input.

# ─── Source-of-truth changes for UX-02 ─────────────────────────────────────
source_changes:
  - file: desktop/ilink-hub-desktop/src-tauri/src/lib.rs
    symbols:
      - "HubController.requested_addr (now Mutex<String>)"
      - "HubController::requested_addr / ::set_requested_addr"
      - "desktop_port_override_path()"
      - "loopback_listen_addr_for_port()"
      - "load_desktop_port_override() / save_desktop_port_override()"
      - "resolve_initial_listen_addr()"
      - "DesktopSettingsPayload / SetListenPortResult"
      - "parse_loopback_port()"
      - "#[tauri::command] get_desktop_settings"
      - "#[tauri::command] set_listen_port"
      - "setup() — resolve_initial_listen_addr + Mutex wrap"
      - "hub_info — read via accessor"
      - "start_hub — read addr via accessor"
      - "13 new unit tests under mod tests"
    change_summary: >-
      `HubController.requested_addr` is now `Mutex<String>` so the GUI
      "change port" flow can mutate the value the next `start_hub` will use
      without re-spawning the controller. A persisted-port file at
      `~/.ilink-hub/desktop-port.json` is loaded in `setup()`; the priority
      chain is persisted → `ILINK_HUB_ADDR` → default `127.0.0.1:8765`.
      `set_listen_port(port)` is the GUI write path: validates `port != 0`,
      writes the file atomically (write-tmp + rename), updates
      `requested_addr`, and returns the new loopback address.
      `get_desktop_settings()` returns the current port (parsed out of
      `requested_addr`) so the UI can prefill the input. Both new commands
      are generic over `tauri::Runtime` so they compile against `Wry` AND
      the `MockRuntime` used by the new unit tests. 13 new unit tests cover
      loopback address composition, parser strictness, on-disk round-trip,
      malformed-JSON / zero-port rejection, env-vs-persisted priority,
      controller getter/setter, the full `set_listen_port` happy path, and
      `get_desktop_settings` prefilling.
  - file: desktop/ilink-hub-desktop/src-tauri/Cargo.toml
    symbols:
      - "serde_json (new dep)"
      - "tauri dev-dep with `test` feature (new)"
      - "tempfile dev-dep (new)"
    change_summary: >-
      Adds `serde_json = "1"` for the persisted-port file,
      `tempfile = "3"` (dev) for the test tempdir, and the `tauri = { version = "2", features = ["test"] }`
      dev-dependency so the new tests can build `tauri::test::mock_app()`
      with the `MockRuntime`.
  - file: desktop/ilink-hub-desktop/index.html
    symbols:
      - "#bind-hint callout copy (line ~76-81)"
      - "new `.port-settings` block (~84-108)"
      - "new `#port-conflict-modal` (after #confirm-modal)"
    change_summary: >-
      The bind-hint no longer mentions `ILINK_HUB_ADDR`; users are pointed
      at the new "监听端口" input on the same panel. A new port-settings
      block adds a numeric input + "保存并重启" button + an inline
      `#port-msg` form-msg. A new `#port-conflict-modal` (with
      `data-port-conflict` buttons) provides the bind-failure recovery
      dialog.
  - file: desktop/ilink-hub-desktop/src/styles.css
    symbols:
      - "new `.port-settings`, `.port-form`, `.field-port`, `.field-port-modal` styles"
    change_summary: >-
      Styles for the new port-settings block and port-conflict-modal input:
      same monospace input treatment as the existing register form,
      dashed top border to separate it from the hero stats grid,
      accent-coloured focus ring consistent with the rest of the app.
  - file: desktop/ilink-hub-desktop/src/main.ts
    symbols:
      - "DesktopSettingsPayload / SetListenPortResult types"
      - "openPortConflictModal / closePortConflictModal"
      - "parsePortFromAddr / prefillListenPort / refreshDesktopSettings"
      - "isPortBindError / extractPortFromError / handleBindFailure"
      - "applyListenPortChange"
      - "applyHubInfo — prefill input from requested_addr"
      - "hub-error listener — trigger handleBindFailure on bind errors"
      - "DOMContentLoaded — refreshDesktopSettings + save button + Enter key + modal click"
    change_summary: >-
      New TypeScript surface for the port-change flow. `applyHubInfo`
      now keeps the listen-port input in sync with the controller's view
      of `requested_addr` (which can change mid-session when the user
      saves a new port). The `hub-error` listener detects bind failures
      (EADDRINUSE / "address already in use" / "bind") and opens the
      conflict modal with the active port pre-selected and the next port
      up as the suggested value. The save button on the settings block
      calls `set_listen_port` then `restart_hub` (or `start_hub` if the
      service was previously stopped), surfacing inline errors in
      `#port-msg`.

