# ─── Behavioural diff vs. baseline (ca7bca7) ───────────────────────────────
# Summary of the UX-02-relevant behavioural change set:
behavioural_diff:
  - area: "GUI port-change flow (was: env-var only)"
    before: >-
      The only way to change the listen port was to set
      `ILINK_HUB_ADDR=127.0.0.1:8770` before launching the desktop app, OR
      edit `~/.ilink-hub-bridge/...` files manually. After a port
      conflict, the home panel surfaced a `bind-hint` callout telling
      users to set the env var — which most users don't know how to do
      on macOS / Windows.
    after: >-
      The home panel has a "监听端口" input pre-filled with the active
      port. Saving it persists to `~/.ilink-hub/desktop-port.json` and
      calls `restart_hub` (or `start_hub` if previously stopped). On the
      next launch, `resolve_initial_listen_addr()` honors the persisted
      port over `ILINK_HUB_ADDR` and over the default. When bind fails,
      a "端口被占用,换一个端口?" dialog appears with the active port
      pre-selected and the next port up as the suggestion; clicking
      "换端口并启动" applies the new port and restarts in one click.
    security_classification: >-
      Defence-in-depth UX improvement. No new attack surface: the
      persisted port file is owned by the user, written atomically
      (write-tmp + rename), and validated on load (rejects `port: 0`,
      malformed JSON). The save path refuses `port == 0`; the loopback
      host is hard-coded so a GUI override cannot rebind on
      `0.0.0.0` / `[::]`.
  - area: "HubController.requested_addr (was: String, now Mutex<String>)"
    before: >-
      `HubController.requested_addr: String` was set once in `setup()`
      and never mutated. `start_hub` cloned it; `hub_info` cloned it.
      No path existed to update it from the GUI.
    after: >-
      `HubController.requested_addr: Mutex<String>`. The accessor
      `requested_addr()` returns a clone; `set_requested_addr(addr)` is
      the only mutation entry point and is called from `set_listen_port`.
      `start_hub` reads via the accessor so subsequent binds honour the
      user's choice. `hub_info` returns the current value so the UI's
      prefill stays in sync with what's actually used.
    security_classification: >-
      No new external surface. Internal mutation is serialized by the
      existing mutex (`.expect("HubController mutex poisoned…")`),
      consistent with all other `HubController` fields.
  - area: "Persisted port file (new)"
    before: "N/A."
    after: >-
      `~/.ilink-hub/desktop-port.json` with schema `{ "port": <u16> }`.
      Written atomically (write to `desktop-port.json.tmp`, then rename).
      Loaded once in `setup()`. Malformed / missing files are tolerated:
      `setup()` falls back to the env default with a tracing warning
      rather than refusing to launch.
    security_classification: >-
      Same trust boundary as the existing SQLite database file under
      `~/.ilink-hub/`. No information disclosure; no remote access; the
      file is created with default umask and only readable by the user.

# ─── M2-specific open follow-ups ────────────────────────────────────────────
# UX-02 is fully closed at the code level. Two non-blocking follow-ups are
# worth flagging for future milestones:
open_follow_ups:
  - area: "GUI port-conflict heuristic"
    note: >-
      The `isPortBindError` check uses string-substring heuristics on the
      `hub-error` payload (`address already in use`, `EADDRINUSE`, `bind`).
      This is robust for tokio's `std::io::Error` Display output but does
      NOT use `io::ErrorKind::AddrInUse` directly (the error is serialised
      to a string at the Tauri boundary and loses its `ErrorKind`).
      A future refactor could carry an `errno`-like code in the payload
      to make the check 100% exact. Not blocking UX-02.
  - area: "Port-in-use preflight"
    note: >-
      The current flow attempts to bind, fails, then surfaces the dialog.
      A nicer UX would be a synchronous `is_port_available(port)` check
      that runs BEFORE the bind attempt and warns the user in the input
      field itself. Out of scope for M2 (which is reactive), but a
      natural M-N follow-up.

