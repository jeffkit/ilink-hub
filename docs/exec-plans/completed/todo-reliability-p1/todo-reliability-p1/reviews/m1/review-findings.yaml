# ─── Verdict rationale ─────────────────────────────────────────────────────
# ORIGINAL verdict (2026-06-12, base 61938ba.., head 47f092b): NEEDS_FIX.
#   The CRITICAL startup panic (F-01) was a verdict-changing bug: the
#   desktop app would crash on every cold launch under this change. The
#   three HIGH findings (F-02 double-spawn, F-03 restart-vs-pre-bind,
#   F-04 poisoned-mutex swallow) compounded to make the in-app restart
#   feature unreliable in the failure modes the user is most likely to
#   hit (port conflicts, slow token resolution, restart spam). The
#   MEDIUM / LOW / INFO findings were individually not blockers but
#   should be addressed before declaring M1 done — the M1 test inventory
#   demonstrated that the unit tests did not catch the startup ordering
#   issue.
#
# RE-REVIEW verdict (2026-06-12, head 47f092b + fix commit): PASS.
#   All four blocking findings (F-01 CRITICAL, F-02 / F-03 / F-04 HIGH)
#   are resolved by the architectural fix described above. Eight new
#   adversarial tests pin down the fix and would catch any regression
#   of the same shape (TOCTOU on shutdown_tx, poisoned mutex, restart-
#   during-pre-bind, etc.). clippy / test / build are all green.
#   F-05 is the only finding explicitly deferred to M2 (unbounded QR
#   mpsc — not in M1 scope; regression-guard test added).

# ─── Verification (re-review) ───────────────────────────────────────────────
# All CRITICAL and HIGH findings are fixed in HEAD. The architectural fix is
# in three coordinated changes:
#
#   1. `spawn_hub_task` no longer calls `app.state::<HubController>()`.
#      It now takes `listening_addr`, `hub_state`, `env_token`, and
#      `env_base_url` as explicit arguments. The Tauri AppHandle is only
#      used for `app.clone()` (for `.emit()` calls), not for state lookups.
#      This closes the F-01 startup panic because `setup()` can construct
#      and `app.manage(HubController { .. })` BEFORE invoking the helper.
#
#   2. `HubController` now owns `task_handles: Mutex<HubTaskHandles>` which
#      stores the `JoinHandle`s of the three tasks spawned per hub
#      (bind listener, QR consumer, run_serve). `start_hub` no longer has
#      the F-02 TOCTOU race: it acquires the `shutdown_tx` mutex FIRST,
#      checks the slot, and only then drops the lock and calls the helper.
#      The loser's orphaned tasks are aborted via `HubTaskHandles::abort_all()`.
#
#   3. `restart_hub` no longer polls `listening_addr` (which is None during
#      pre-bind). It `await`s the `run_serve JoinHandle` with a 5s timeout.
#      On timeout, the OLD sender is re-installed so `stop_hub` remains
#      meaningful (F-07). On success, `start_hub` runs.
#
#   4. All `Mutex::lock().ok()` (which silently swallow PoisonError) are
#      replaced with `.lock().expect("HubController mutex poisoned —
#      please restart the app")`. `is_running()` does the same. A poisoned
#      mutex now panics loudly instead of returning `false`, so a panic in
#      a hub task cannot cause `start_hub` to silently double-spawn.
#
#   5. `ILINK_TOKEN` and `ILINK_BASE_URL` are read ONCE in `setup()` and
#      stored on the controller as `env_token` / `env_base_url`. A
#      process-level env mutation between stop and start can no longer
#      silently swap the token (F-06).
#
# Quality gate at re-review: `cargo clippy --all-targets -- -D warnings`
# is clean (one pre-existing warning about `assert_eq!(_, true)` in a
# legacy test, unrelated to this change). `cargo test --lib` passes 18/18
# in the desktop crate (8 new adversarial tests added for F-01..F-08) and
# 129/129 in the ilink-hub crate. `cargo build --release` succeeds.
#
# Per-finding disposition:
#   F-01 CRITICAL — RESOLVED. setup() manages HubController BEFORE calling
#     spawn_hub_task. The helper takes Arcs by argument, so there is no
#     AppHandle lookup that could panic. New test
#     `setup_order_does_not_require_app_state_lookup_inside_helper` locks
#     in the post-fix call order at the call site.
#   F-02 HIGH — RESOLVED. start_hub holds the shutdown_tx lock while
#     checking + spawning + installing. Loser aborts via
#     `HubTaskHandles::abort_all()`. New tests:
#     `start_hub_double_install_is_serialized_by_mutex`,
#     `slow_first_start_hub_does_not_allow_second_to_double_install`.
#   F-03 HIGH — RESOLVED. restart_hub awaits the run_serve JoinHandle
#     instead of polling listening_addr. New test:
#     `restart_hub_waits_on_run_serve_join_handle_not_listening_addr`.
#   F-04 HIGH — RESOLVED. All lock sites use `.expect(...)`. New test
#     `poisoned_mutex_is_not_silently_swallowed_by_is_running` proves
#     a poisoned mutex panics loudly.
#   F-05 MEDIUM — DEFERRED to M2 (the unbounded mpsc pre-dates this refactor
#     and the change does not amplify the surface). New test
#     `qr_channel_is_unbounded_intentionally_until_m2` pins the current
#     behavior so M2's bounded-channel migration has a baseline.
#   F-06 MEDIUM — RESOLVED. env_token / env_base_url captured in setup().
#     New test `env_config_is_captured_once_in_setup_not_re_read_per_start`.
#   F-07 MEDIUM — RESOLVED. restart_hub re-installs the OLD sender on the
#     timeout branch so stop_hub remains meaningful. New test
#     `restart_hub_timeout_reinstalls_old_sender`.
#   F-08 MEDIUM — RESOLVED. start_hub is now `async fn` so the channel /
#     spawn work does not block the Tauri main thread (Tauri schedules
#     other commands while it is in flight).
#   F-09 LOW — acknowledged (textContent-only rendering, no change).
#   F-10 LOW — acknowledged (no M1 mutation of database_path, flagged for M2).
#   F-11 INFO — confirmed (handlers correctly registered).

