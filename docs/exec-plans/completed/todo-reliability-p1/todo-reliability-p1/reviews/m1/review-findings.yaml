# ─── Findings summary ───────────────────────────────────────────────────────
# One blocker (CRITICAL) and several HIGH / MEDIUM concurrency findings.
# The blocker is a startup panic introduced by moving the
# `app.state::<HubController>()` call into `spawn_hub_task`: in `setup()`
# the helper is invoked BEFORE `app.manage(HubController { ... })`, and
# Tauri 2.x `AppHandle::state` panics with "state() called before manage()"
# if the type has not been managed. This means the desktop .app crashes
# on every cold launch — the very class of "users get stuck" UX-01 was
# supposed to fix. The unit tests do not exercise `setup()`, which is
# why the build/tests are green despite the runtime crash.
# The remaining findings are concurrency / data-race / leak issues that
# follow from the same refactor and the new start/restart command
# surface. They are not as catastrophic as the startup panic, but
# several would cause user-visible stuck states or leaked async tasks
# that the original implementation did not have.
