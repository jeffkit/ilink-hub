# ─── Findings ───────────────────────────────────────────────────────────────
findings:
  # ─── CRITICAL — startup panic ─────────────────────────────────────────────
  - id: F-01
    severity: CRITICAL
    category: "startup-panic / blocker"
    title: >-
      `spawn_hub_task` is invoked from `setup()` BEFORE `app.manage(HubController)`,
      so `app.state::<HubController>()` panics on every cold launch
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1527-1539 (helper) and 1712-1714 (setup)"
    root_cause: >-
      The new `spawn_hub_task` helper does `let ctrl = app.state::<HubController>();`
      at the top of its body. In Tauri 2.x, `Manager::state` panics with
      `"state() called before manage()"` if the type has not been
      managed yet (verified in tauri-2.11.2/src/lib.rs:729-739). In
      `setup()`, the call order is now:
        1. `let shutdown_tx = spawn_hub_task(app.handle(), requested_addr.clone(), &db_path);`  // line 1712
        2. `app.manage(HubController { ... });`  // line 1714
      so the very first thing `spawn_hub_task` does — looking up
      `HubController` via the AppHandle — finds nothing and panics.
    evidence: >-
      Tauri 2.11.2 source (`tauri::Manager::state`, line 729-739):
        `fn state<T>(&self) -> State<'_, T> { self.manager().state.try_get()
          .unwrap_or_else(|| panic!("state() called before manage() for {}",
          std::any::type_name::<T>())) }`
      The OLD code (base_commit) worked because the bind/state listener
      closures captured local `listening_addr` / `hub_state` Arcs — it
      NEVER called `app.state::<HubController>()` inside `setup()`. The
      refactor moved the lookup inside the helper, breaking that
      assumption.
    impact: >-
      Every cold launch of the .app panics in `setup()`. The user sees
      the app fail to start, which is strictly worse than the dead-end
      "stopped" state UX-01 was meant to fix. The 5 new unit tests
      pass because none of them call `setup()` or `spawn_hub_task`
      against a real Tauri runtime — they only construct a
      `HubController` directly and exercise `is_running` /
      `stop_hub`-branches in isolation.
    suggested_fix: >-
      Pick ONE of the following (the first is the smallest diff):
        (a) Pass `listening_addr` and `hub_state` into `spawn_hub_task`
            as `Arc<Mutex<...>>` arguments, drop the
            `app.state::<HubController>()` call from the helper, and
            have `setup()` create the `listening_addr` / `hub_state`
            Arcs and `app.manage(HubController { shutdown_tx:
            Mutex::new(None), .. })` BEFORE calling `spawn_hub_task`.
            `start_hub` / `restart_hub` then look up the controller and
            call the helper with the same Arcs.
        (b) In `setup()`, call `app.manage(HubController { shutdown_tx:
            Mutex::new(None), .. })` first, then call `spawn_hub_task`
            and install the returned sender into the controller's
            `shutdown_tx` slot. The helper can keep its current
            `app.state::<HubController>()` lookup because the state
            is now managed before the helper runs.
        (c) Make the helper accept everything as arguments and stop
            capturing controller state from the AppHandle entirely.
      Add an integration test that constructs a Tauri app builder
      (even a minimal one without a window) and asserts `run()`
      completes `setup()` without panicking. This is the gap that
      allowed the bug to slip past `cargo build` + `cargo test`.
    regression_risk: >-
      Low. The `spawn_hub_task` contract already returns a
      `watch::Sender<bool>`; the only change is the source of
      `listening_addr` / `hub_state`. `start_hub` / `restart_hub`
      callers don't need to change.

  # ─── HIGH — double-spawn race / leaked async tasks ────────────────────────
  - id: F-02
    severity: HIGH
    category: "concurrency / data-race"
    title: >-
      `start_hub` re-check inside the lock does NOT clean up the
      orphaned async tasks that `spawn_hub_task` already spawned, so a
      TOCTOU race leaks a run_serve + bind-listener + QR-consumer
      task that clobbers controller state
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1641-1661 (start_hub)"
    root_cause: >-
      `start_hub` performs:
        1. `if ctrl.is_running() { return Err(...) }`  // unlocked check
        2. `let tx = spawn_hub_task(&app, addr, &db_path);`  // <-- spawns 3 async tasks + creates watch channel
        3. `let mut guard = ctrl.shutdown_tx.lock() ...`
        4. `if guard.is_some() { return Err("hub already running") }`  // re-check
      If two `start_hub` invocations interleave (e.g. user double-clicks
      the Start button during the window between step 1 and step 3, or
      `restart_hub` takes the sender concurrently), BOTH pass step 1,
      BOTH call `spawn_hub_task` (which captures `ctrl.listening_addr`
      and `ctrl.hub_state` clones from the controller and spawns the
      bind-listener / QR-consumer / run_serve tasks), and then the
      second one fails at step 4.
      The re-check only refuses to install the sender; it does NOT
      abort the tasks that `spawn_hub_task` already spawned. Those
      tasks proceed to:
        - bind-listener task: `rx_bind.await` then writes to
          `ctrl.listening_addr` and emits `hub-listening` to the
          frontend.
        - QR-consumer task: drains the unbounded mpsc until the
          sender is dropped, which only happens when run_serve ends.
        - run_serve task: actually binds the TCP listener, talks to
          ilink servers, spawns dispatcher / health checker /
          quote-index evictor / poll loop / relay client. These all
          use fresh state, so the leak is bounded to the orphaned
          controller writes — but writes DO happen.
      When the OLD run_serve eventually completes (or the NEW one does,
      whichever loses the race), the completion branch in
      `spawn_hub_task` clears `listening_addr` to None and emits
      `hub-stopped` — clobbering the WINNER's listening_addr with
      None. The frontend then sees "stopped" even though there is a
      live hub.
    impact: >-
      On any concurrent start (fast double-click, restart-while-start
      still pending), the controller's `listening_addr` and
      `hub_state` get overwritten by the loser's completion handler,
      causing the UI to report a "stopped" hub that is in fact
      running. Subsequent `stop_hub` / `restart_hub` calls operate on
      a sender that may point to a dead run_serve, leaving the
      actual hub unkillable except by OS process exit. This is a
      resource leak + state corruption.
    suggested_fix: >-
      Two complementary changes:
        (i) Inside the `start_hub` re-check, if the slot is already
            taken, return the sender's task handles so the caller
            (or a cleanup helper) can abort the bind-listener,
            QR-consumer, and run_serve tasks. The simplest version
            is to have `spawn_hub_task` return
            `(watch::Sender<bool>, JoinHandle<()>, JoinHandle<()>,
            JoinHandle<()>)` (or a small `HubTaskHandles` struct) and
            store the handles in the controller next to the sender;
            `start_hub` then aborts the handles on the loser path.
        (ii) Use a single atomic `is_running` flag (e.g. an
            `AtomicBool` or a `tokio::sync::Mutex<bool>`) as the
            arbiter, and only spawn AFTER the flag is set. The
            current `Mutex<Option<Sender>>`-as-flag pattern is
            racy precisely because `spawn_hub_task` is called
            between the unlocked check and the locked install.

  # ─── HIGH — restart race against pre-bind run_serve ─────────────────────
  - id: F-03
    severity: HIGH
    category: "concurrency / data-race"
    title: >-
      `restart_hub`'s busy-wait on `listening_addr` can fire while the
      OLD run_serve is still alive but has not yet bound, producing
      a double-run_serve scenario
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1663-1688 (restart_hub)"
    root_cause: >-
      `restart_hub` polls `listening_addr` and breaks as soon as it
      becomes None. But `listening_addr` is only set after
      `TcpListener::bind` succeeds, and `run_serve` does significant
      work BEFORE bind: `Store::connect` (open or create SQLite file,
      run migrations), `resolve_token` (DB lookup + optionally QR
      login against the iLink API), `HubState::new`, dispatcher
      spawn, relay client spawn. Any of those can take seconds (QR
      network call in particular) and during that whole window
      `listening_addr` is None.
      If `restart_hub` is called during that pre-bind window — for
      instance because the user clicked restart while the initial
      hub was still starting up — the busy-wait sees None
      immediately, calls `start_hub`, and the OLD `run_serve` is
      still alive when the NEW one is spawned. Two `run_serve`
      tasks then try to bind the same port (the second fails with
      AddrInUse) and both write to `ctrl.listening_addr` /
      `ctrl.hub_state` independently. The OLD one's eventual
      completion then clears the slots the NEW one just populated.
    impact: >-
      User-visible: clicking restart while the hub is still starting
      up causes the new hub to "fail to start" (port collision
      inside run_serve → hub-error event) and the old one to be
      unkillable. The user can then click Start again, but it will
      hit the same port until the OS releases it (which never
      happens until the old run_serve is fully torn down — but
      that never happens because the only thing that signaled it
      was the old `restart_hub` that already exited).
    suggested_fix: >-
      Wait for a stronger signal that the OLD run_serve is
      fully torn down, not just "listening_addr is None":
        - Add a `oneshot::Sender<()>` `shutdown_done` to
          `HubController`, handed to the run_serve task; signal it
          AFTER the completion branch clears listening_addr.
          `restart_hub` waits on `shutdown_done` instead of polling
          `listening_addr`.
        - OR, store the `JoinHandle<()>` of the run_serve task in
          the controller and `await` it (with a timeout) before
          calling `start_hub`.
      Either fix closes the pre-bind race.

  # ─── HIGH — poisoned mutex is silently treated as "not running" ─────────
  - id: F-04
    severity: HIGH
    category: "concurrency / correctness"
    title: >-
      `HubController::is_running` (and the `spawn_hub_task` / `start_hub`
      lock-`ok()` calls) swallow poisoned mutexes, masking panics in
      any task that previously held the lock
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1502-1508 (is_running), 1546, 1551, 1584, 1587, 1594, 1597 (spawn_hub_task .ok() calls)"
    root_cause: >-
      The new code uses `match self.shutdown_tx.lock() { Ok(g) => ..., Err(_) => false }`
      and `if let Ok(mut g) = ...lock() { ... }` patterns. A poisoned
      mutex (`PoisonError`) means a previous holder panicked while
      holding the lock. The state under the lock is now in an
      indeterminate-but-not-empty state — for `shutdown_tx: Mutex<Option<Sender>>`
      it could be Some(sender-of-a-dead-task) or None; for
      `listening_addr: Mutex<Option<String>>` it could be a stale
      value. Silently treating it as "not running" or "not listening"
      lets `start_hub` proceed and `restart_hub` skip its wait, even
      though the system is in a degraded state.
    impact: >-
      If a panic ever occurs inside `spawn_hub_task` (e.g. a bug in
      the bind listener, an `app.emit` panic, or — most realistically
      — a panic in the run_serve task before the completion branch
      runs), the controller's `is_running()` reports `false` because
      the mutex is poisoned. `start_hub` then proceeds to spawn a
      second hub, leaking the first. The user sees "stopped" in the
      UI (because the listener for the second hub hasn't bound yet)
      but the first hub is still consuming the port.
    suggested_fix: >-
      `Mutex::lock().expect("HubController mutex poisoned — please
      restart the app")` at every lock site, and `is_running`
      should `expect()` too. The user-visible message in the
      `expect` tells them the controller is in a bad state and
      they need to relaunch the .app (which is already what UX-01
      was trying to avoid, but at least it's honest).
      Alternatively, use `parking_lot::Mutex` which has no
      poisoning — a panic simply unlocks and the state is left as
      it was. That's the standard fix in Tokio codebases.

  # ─── MEDIUM — QR mpsc is unbounded, consumer is the only backpressure ──
  - id: F-05
    severity: MEDIUM
    category: "resource / DoS-by-async"
    title: >-
      The QR event channel is `unbounded_channel`; if the frontend is
      unresponsive the channel grows without bound while the hub is
      alive
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1558-1564"
    root_cause: >-
      `tokio::sync::mpsc::unbounded_channel::<ilink_hub::QrLoginUiEvent>()`
      is used so QR login UI events from `run_serve` can be forwarded
      to the Tauri `qr-login` event. The consumer task
      `while let Some(ev) = qr_rx.recv().await { app_qr_emit.emit(...) }`
      is the only drain. There is no per-second cap or backpressure.
      During a normal QR login flow this is fine (a handful of
      events), but if `app_qr_emit.emit` ever blocks (it shouldn't,
      but Tauri 2.x's emit is not declared as `await` — it's a
      fire-and-forget that goes through the IPC), or if the
      frontend listener is detached, the channel can accumulate
      events.
    impact: >-
      The same unbounded-channel footgun that exists in the OLD
      code, so this is not a regression. But the new
      `spawn_hub_task` is now called for every restart, multiplying
      the number of channels-in-flight. A user who clicks restart
      100 times (e.g. via a misbehaving automation) leaves 100
      consumer tasks in the background. Each consumer task is
      pinned to a thread until its qr_tx is dropped (which only
      happens when the orphaned run_serve ends), so this is a
      soft thread-pile-up DoS.
    suggested_fix: >-
      Use a bounded `mpsc::channel(64)` with `try_send` and
      log+drop on full, or close the consumer task promptly on
      hub-stopped. The fix is small and removes a pre-existing
      DoS surface that the refactor amplifies.

  # ─── MEDIUM — env vars re-read on every restart, no consistency check ──
  - id: F-06
    severity: MEDIUM
    category: "configuration / security-low"
    title: >-
      `spawn_hub_task` re-reads `ILINK_TOKEN` and `ILINK_BASE_URL`
      from env on every invocation; a process-level env change
      between start and restart silently swaps the token/base URL
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1533-1534"
    root_cause: >-
      `let token = std::env::var("ILINK_TOKEN").ok();` and the
      same for `ILINK_BASE_URL` are read at every `spawn_hub_task`
      call. The Tauri command `start_hub` runs on the main thread
      (sync), but `setup()`-time env reads are on the main thread
      too — so the values are usually the same. However, if a
      subsequent process mutates its own env (some install / update
      flows do this for child processes; some macOS launchctl
      paths do too), the second invocation will use the mutated
      value, silently swapping the token.
    impact: >-
      Low likelihood but high confusion: user stops, clicks Start,
      the new hub authenticates with a different token than the
      old one, and downstream iLink pairing is invalidated. There
      is no UI signal that the token changed.
    suggested_fix: >-
      Capture `ILINK_TOKEN` and `ILINK_BASE_URL` once in `setup()`
      and store them in `HubController`. `spawn_hub_task` then
      takes them as arguments. This also makes the configuration
      source-of-truth obvious (the controller, not the env at
      restart time).

  # ─── MEDIUM — no upper bound on restart_hub wait, but upper bound wrong ──
  - id: F-07
    severity: MEDIUM
    category: "user-experience / failure mode"
    title: >-
      `restart_hub` returns "hub stop timed out" but leaves the OLD
      sender's run_serve alive and the controller's `shutdown_tx`
      slot empty — the user is stuck in a half-restarted state
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1676-1686"
    root_cause: >-
      `restart_hub` does:
        - `let old_tx = ctrl.shutdown_tx.lock().take();`
        - `if let Some(tx) = old_tx { tx.send(true) }`  // signal stop
        - busy-wait up to 5s for `listening_addr` to clear
        - on timeout, `return Err("hub stop timed out")`
      After `take()` the controller's `shutdown_tx` slot is None.
      If the wait times out, we return Err and the slot stays
      None. The OLD `run_serve` is still alive (it didn't get
      the signal in time, or it's in pre-bind). There is no
      recovery path: the next `start_hub` would double-spawn
      (F-02), the next `stop_hub` is a no-op, the next
      `restart_hub` will signal the same OLD tx (it can't, the
      slot is None) — actually no, the slot is None, so it will
      fall through to `start_hub`, which would double-spawn.
      The user has no way to recover except by relaunching the
      .app.
    impact: >-
      In the (rare) case where the OLD hub takes >5s to stop
      during restart, the user is permanently stuck. The UI can
      show "stopped" (because we returned Err) but the backend
      is in a broken state.
    suggested_fix: >-
      On timeout, do NOT leave the controller in a broken state.
      Options:
        (a) Block on the run_serve JoinHandle with a longer
            timeout (e.g. 30s) — gives the OLD hub time to
            clean up. If still stuck, return Err but log
            loudly.
        (b) On timeout, re-install the OLD sender in the
            controller's slot and return Err — this way
            `stop_hub` is still meaningful.
      Either is better than the current "leaving the slot None
      while the OLD task is still alive" behavior.

  # ─── MEDIUM — sync start_hub blocks main thread while spawning ──────────
  - id: F-08
    severity: MEDIUM
    category: "async-runtime / Tauri"
    title: >-
      `start_hub` is declared as a sync Tauri command but it
      performs non-trivial synchronous work (env reads,
      channel creation, `app.state::<HubController>()` lookup)
      on the Tauri main thread
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1641-1661"
    root_cause: >-
      `#[tauri::command] fn start_hub(app: tauri::AppHandle)`
      runs on Tauri's main thread. It reads env vars, constructs
      four channels, calls `app.state::<HubController>()`, and
      returns a `watch::Sender`. None of this is `.await`-heavy
      so the cost is small in absolute terms, but it is
      unbounded: a slow `app.state()` lookup or a future
      `sqlite_url_for_path` change that does IO would block
      the main thread. The OLD `setup()` had the same pattern,
      so this is not a regression — but the new command surface
      means the same blocking work is reachable from the
      frontend (every click of the Start button), so the
      impact is wider.
    impact: >-
      A pathological click (e.g. a frontend bug that fires
      100 start_hub invokes in 1s) would block the Tauri main
      thread 100 times. Window paint stalls; the user sees
      a frozen UI.
    suggested_fix: >-
      Make `start_hub` async and move the env-var reads /
      `app.state()` lookups into the body. The mutex acquisition
      stays sync (which is what the lock is for) and the
      `spawn_hub_task` call also stays sync because
      `tauri::async_runtime::spawn` is non-blocking. So the
      concrete change is minimal: add `async` to the signature
      and call the existing body. This lets Tauri schedule
      other commands while `start_hub` is in flight.

  # ─── LOW — frontend error rendering is safe, but a future change could break it
  - id: F-09
    severity: LOW
    category: "frontend / XSS (defensive note)"
    title: >-
      `setError` and `statusLine.textContent` use `textContent` so
      the `String(err)` payload from `start_hub` is rendered safely;
      no XSS in this M1, but the safety relies on this pattern
      holding for all new error paths
    location: "desktop/ilink-hub-desktop/src/main.ts:285, 355, 1120, 1132, 1143"
    observation: >-
      All new error sinks (`setError(String(err))` in the start
      handler, the `hub-error` listener, the `statusLine.textContent =
      line` in `setHubState`) go through `textContent`. The error
      messages from the backend are short ASCII-ish Chinese strings
      (e.g. "hub already running", "hub stop timed out") so this is
      not a real risk today. But: a future change that, say, passes
      the `addr` value or a database path into the error message
      would now flow into `textContent` — which is fine, but if a
      future contributor reflexively switches to `innerHTML` for
      styling, the same data would become a XSS vector. Not a
      regression; just a note.
    suggested_fix: >-
      No change needed for M1. Consider a one-line code comment on
      `setError` ("textContent only — never innerHTML") as a
      tripwire for future contributors.

  # ─── LOW — quiet divergence: `restart_hub` does not re-fetch the
  # HubController's `database_path` on the timing of stop ──────────────
  - id: F-10
    severity: LOW
    category: "consistency"
    title: >-
      `start_hub` reads `database_path` from the controller at
      call time but `restart_hub` calls `start_hub` which re-reads
      the same field — fine, but a future change that mutates
      `database_path` between start/restart would silently land
      the new hub on a different file
    location: "desktop/ilink-hub-desktop/src-tauri/src/lib.rs:1649-1650, 1687"
    observation: >-
      `start_hub` does `let addr = ctrl.requested_addr.clone();
      let db_path = ctrl.database_path.clone();` and then calls
      `spawn_hub_task(&app, addr, &db_path)`. The fields are
      read from the controller (a `Arc<HubController>`), not
      from the original env. For M1, `database_path` is set
      once in `setup()` and never mutated, so the read is
      stable. If a future feature (e.g. M2 port-change UI)
      mutates these fields, the in-flight `start_hub` would
      see a different value than the user-facing change. Not
      a bug today; flagging for the M2 author.
    suggested_fix: >-
      None for M1. For M2, consider a small `HubController::snapshot()`
      that returns `(addr, db_path, base_url, token)` as a
      `HubSpawnConfig` struct, taken under a single read lock,
      so any future mutation is atomic with respect to
      `start_hub`.

