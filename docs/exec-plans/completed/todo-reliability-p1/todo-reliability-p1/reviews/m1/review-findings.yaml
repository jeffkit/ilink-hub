# ─── Scope ──────────────────────────────────────────────────────────────────
# Refactor: extract the in-`setup()` startup wiring (oneshot channels,
# `run_serve` task, QR event pump, bind/state listeners) into
# `spawn_hub_task(app, addr, db_path) -> watch::Sender<bool>` so the
# helper can be reused by new `start_hub` / `restart_hub` Tauri commands.
# The `HubController` is extended with a small `is_running` helper; the
# footer HTML/TS gets a Start button that toggles with the Stop button
# via `setHubState`.

