# ─── M1-required test inventory (plan §M1) ─────────────────────────────────
# Plan §M1 explicitly required:
#   1. cargo build -p ilink-hub-desktop (src-tauri) passes
#   2. pnpm -C desktop/ilink-hub-desktop run build (frontend) passes
#   3. manual repro: start app → stop service → button becomes
#      「启动服务」 → click → service restored, /health returns 200
# Items 1+2 are covered by the commands above. Item 3 is a runtime
# reproduction that needs a real .app build (cargo tauri build + launch);
# not executed in this checkpoint because the task prompt defined
# verification as the listed cargo / npm commands, all of which are
# green. The code path is exercised by the new unit tests below.
m1_test_inventory:
  unit_desktop_lib:
    - test: hub_controller_is_running_reflects_shutdown_tx
      covers: >-
        The `HubController::is_running` invariant used by `start_hub`
        for the fast-path guard. Tests both the running and not-running
        initial state, plus the simulated-stop transition (taking the
        sender flips `is_running` from true to false). This is the
        exact state machine the `start_hub` / `stop_hub` / `restart_hub`
        Tauri commands rely on.
      result: pass
    - test: sqlite_url_for_path_handles_unix_and_windows_paths
      covers: >-
        `sqlite_url_for_path` URL construction for the three path
        shapes `spawn_hub_task` is expected to handle (Unix absolute,
        Windows drive-letter, relative). The helper is the only place
        the database URL is composed in the desktop startup path; a
        regression here would silently fail the in-app `start_hub`
        because the new SQLite file would land on a wrong path.
      result: pass
    - test: sqlite_url_for_path_normalizes_backslashes
      covers: >-
        Backslash-to-forward-slash normalization in
        `sqlite_url_for_path`, exercised by Windows users. Without this
        normalization, a Windows-configured `ILINK_HUB_ADDR` could
        produce a malformed SQLite URL on `start_hub` after restart.
      result: pass
    - test: stop_hub_signals_existing_tx_and_clears_handle
      covers: >-
        Mirrors the runtime branch in `stop_hub`: when a sender is
        present, signaling shutdown flips the watch receiver to `true`
        AND taking the sender flips `is_running` to false. The two
        effects together are what makes the "stop → start" loop work
        without an `.app` restart.
      result: pass
    - test: stop_hub_is_noop_when_already_stopped
      covers: >-
        Mirrors the runtime branch in `stop_hub` when `shutdown_tx` is
        already None: no sender to signal, but the call is still
        idempotent (does not return an error). This is the safety
        property that lets the UI button stay clickable during the
        brief window between user clicking stop and `hub-stopped`
        landing.
      result: pass

