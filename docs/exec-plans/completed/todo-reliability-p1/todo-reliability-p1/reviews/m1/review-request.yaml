# ─── Behavioural diff vs. baseline ──────────────────────────────────────────
# Summary of the UX-01-relevant behavioural change set:
behavioural_diff:
  - area: "Tauri commands (desktop src-tauri)"
    before: >-
      `stop_hub` was the only hub-lifecycle command. It took the
      `shutdown_tx` sender out of the controller and signaled stop;
      after that, the controller's `shutdown_tx` slot was empty and
      could not be repopulated without restarting the .app. There was
      no `start_hub` command, so the UI's stopped state was a dead
      end for users.
    after: >-
      `stop_hub` is unchanged in behavior, but it now operates
      against a `HubController` whose `shutdown_tx` slot is repopulated
      by `start_hub` on every in-app restart. `start_hub` is gated on
      `HubController::is_running` (false → proceed, true →
      "hub already running") and double-checked under the lock. It
      calls the new `spawn_hub_task(app, addr, db_path) -> Sender`
      helper, which is byte-equivalent to the old `setup()`-embedded
      startup wiring but takes everything it needs as arguments
      instead of capturing the closure environment. `restart_hub`
      combines the two: signal existing sender, busy-wait up to 5s
      for `listening_addr` to clear, then `start_hub`. This is the
      recovery path the user can take from the desktop UI.
    security_classification: >-
      No new attack surface. The new commands operate on the same
      `HubController` instance managed by Tauri; access is still
      scoped to the Tauri command-handler boundary. The 5s wait in
      `restart_hub` is a defense against a race with `hub-listening`
      / `hub-stopped` event emission, not a security boundary.
  - area: "Desktop UI footer"
    before: >-
      Single red "停止服务" button (id=`#btn-stop`), btn-danger, btn-block,
      starting disabled. After stop_hub, the button stayed visible but
      was disabled — there was no visible path back to a running
      hub without quitting and relaunching the .app.
    after: >-
      Footer has two buttons, both initially hidden, both
      btn-block. `#btn-stop` (btn-danger, stop-square SVG) shows when
      state is `running` or `starting`. `#btn-start` (btn-primary,
      play-triangle SVG) shows when state is `stopped` or `error`
      and is disabled during `starting` to prevent double-launch.
      Visibility is driven entirely from `setHubState`, so the
      hub-stopped Tauri listener now naturally renders the start
      button without any per-listener button twiddling.
    security_classification: >-
      No security impact. This is a UX affordance change; the
      underlying hub lifecycle is the same as before.
  - area: "Stop confirmation copy"
    before: >-
      `window.confirm("确定要停止本机 Hub 服务吗？微信中转将暂时不可用，已
      连接的后端会断开。")`. Cancel remains the dialog default, but the
      consequence sentence reads as the entire message body.
    after: >-
      `window.confirm("确定要停止本机 Hub 服务吗？停止后可在下方重新启动。
      \n\n微信中转将暂时不可用，已连接的后端会断开。")`. The recovery
      promise is on the first line; the consequence sentence is on
      its own block. The user now sees the cost and the recovery
      path in the same dialog, which lowers the perceived
      destructiveness of the action and reduces the chance of an
      accidental click leaving them stuck.
    security_classification: "No security impact (copy change)."

