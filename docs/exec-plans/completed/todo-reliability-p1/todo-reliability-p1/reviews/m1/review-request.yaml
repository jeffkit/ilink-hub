checkpoint: "M1 — UX-01: 桌面端停止服务后可在应用内重启"

# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M1: the desktop footer used to expose a single red "停止服务"
# button. Clicking it (after confirm) sent `stop_hub` and put the UI into
# a `stopped` state — but there was no in-app way back: no `start_hub`
# command on the backend and no button in the UI. Users had to fully quit
# the .app to recover, which for a double-click desktop user is
# indistinguishable from "the app is broken".
#
# This change closes the loop on three layers:
#  1. Backend (Tauri): extract the in-`setup()` startup logic into a
#     reusable `spawn_hub_task` helper, keep the `shutdown_tx` handle in
#     `HubController`, and add `start_hub` / `restart_hub` Tauri commands
#     that reuse the same code path. `stop_hub` is unchanged in behavior
#     (signal the existing `watch::Sender<bool>` and take it).
#  2. Frontend HTML: footer now has two mutually-exclusive buttons —
#     `#btn-stop` (danger, shown when running/starting) and `#btn-start`
#     (primary, shown when stopped/error) — both default-hidden so the
#     initial render is unambiguous until `setHubState` runs.
#  3. Frontend TS: `setHubState` toggles the two buttons based on state,
#     and a new `#btn-start` click handler invokes `start_hub` then
#     refreshes hub info. The stop confirmation copy is softened
#     ("停止后可在下方重新启动") so the cost of an accidental click is
#     visibly low.

# ─── Source-of-truth changes for UX-01 ─────────────────────────────────────
source_changes:
  - file: desktop/ilink-hub-desktop/src-tauri/src/lib.rs
    symbols:
      - "HubController::is_running (new)"
      - "spawn_hub_task (new helper, lines ~1440-1510)"
      - "start_hub (new Tauri command, ~1546-1562)"
      - "restart_hub (new Tauri command, ~1564-1592)"
      - "setup() (refactored to call spawn_hub_task, ~1493-1516)"
      - "invoke_handler! registration (~1706: +start_hub, +restart_hub)"
    change_summary: >-
      Extracted the bind / hub-state / QR / run_serve / shutdown wiring
      from the `setup()` closure into `spawn_hub_task(app, addr, db_path)
      -> watch::Sender<bool>`. The helper reads `ILINK_TOKEN` and
      `ILINK_BASE_URL` from env on each call, builds fresh oneshot
      channels for `on_listening` / `on_hub_state`, spawns the
      listening-side and QR event pump forwarders, and returns a fresh
      shutdown sender. The run_serve completion now also clears
      `listening_addr` and `hub_state` so the `stopped` / `error`
      listeners (and `hub_info`) report a consistent view.
      `HubController::is_running` exposes "is there a live sender" as a
      small helper, used both by tests and by `start_hub` for the
      fast-path guard. `start_hub` returns "hub already running" if a
      sender is present (re-checked under the lock to close the race).
      `restart_hub` takes the existing sender, signals stop, then
      busy-waits up to 5s for `listening_addr` to clear before calling
      `start_hub`. `setup()` now just constructs the controller and
      stores the shutdown sender returned by `spawn_hub_task`.
  - file: desktop/ilink-hub-desktop/index.html
    symbols:
      - "#btn-stop (footer)"
      - "#btn-start (footer, new)"
    change_summary: >-
      The footer now contains both buttons, each starting `hidden`. Both
      use `btn-block`. Stop uses `btn-danger` with a square-stop SVG;
      start uses `btn-primary` with a play-triangle SVG. The
      visibility / enabled state is driven entirely from `setHubState`
      so there is no JS that has to guess the initial state.
  - file: desktop/ilink-hub-desktop/src/main.ts
    symbols:
      - "setHubState (~349-385)"
      - "#btn-stop click handler (~1105-1122)"
      - "#btn-start click handler (new, ~1124-1136)"
    change_summary: >-
      `setHubState` now also drives `#btn-start` / `#btn-stop`:
      `showStart = state in {stopped, error}`, `showStop = state in
      {running, starting}`; start is disabled during `starting` to
      prevent double-launch. The stop confirm copy now reads
      "确定要停止本机 Hub 服务吗？停止后可在下方重新启动。" with the
      consequence sentence on a new line — the inline recovery promise
      lowers the perceived weight of the action. The new
      `#btn-start` handler calls `start_hub`, sets state to `starting`
      with "正在重新启动 Hub…", and on failure drops back to
      `stopped` so the user can retry. The `hub-stopped` / `hub-error`
      Tauri listeners still call `setHubState` and now benefit from
      the unified button visibility logic — no per-listener button
      twiddling required.

