  - id: shutdown-receiver-injected
    plan_clause: "修改 src/relay/client.rs:18-29,为 spawn_relay_client 注入 watch::Receiver<bool>,loop 内 tokio::select! 包裹 sleep / run_session,命中 shutdown 时 return"
    observation: >-
      `spawn_relay_client` now takes `shutdown: watch::Receiver<bool>` as
      its fourth parameter and forwards it to `pub async fn run_relay_loop`.
      Inside `run_relay_loop`, the per-session / per-reconnect body is
      wrapped in a biased `tokio::select!` with three arms:
      `shutdown.changed()`, `run_session(...)`, and
      `tokio::time::sleep(RECONNECT_SECS)`. On `*shutdown.borrow() == true`
      the loop returns with `info!("relay client shutting down")`. There
      is also a guard at the top of the loop that returns immediately if
      shutdown is already true at spawn time.
    result: pass
  - id: build-green
    plan_clause: "cargo build -p ilink-hub 通过"
    observation: "cargo build → Finished `dev` profile, exit 0."
    result: pass
  - id: relay-tests-green
    plan_clause: "cargo test -p ilink-hub relay:: 全绿"
    observation: >-
      cargo test --lib relay:: → 9 passed, 0 failed (3 new M2 tests +
      6 pre-existing relay tests).
    result: pass
  - id: graceful-close
    plan_clause: "关闭 hub 时 relay 服务端不再看到异常断开 (日志检查 graceful close)"
    observation: >-
      The shutdown signal is honoured at *every* in-flight I/O point inside
      `run_session`, not just between sessions. Concretely, `run_session`
      now races each await (`connect_async`, the register write,
      `read.next()`, the HTTP forwarding call, the per-request reply write, and
      the Ping reply write) against `wait_for_shutdown(&mut shutdown)`, with
      the shutdown arm biased. On shutdown each future is dropped, which causes
      the WebSocket stream to be dropped, which tokio_tungstenite translates
      into a normal close frame on the wire — the relay server then sees
      a clean disconnect instead of a TCP RST. The outer select! still
      wraps the reconnect-sleep arm so the between-sessions case is also
      interruptible. The spawn-time guard (`*shutdown.borrow() == true`
      before the loop is entered) is retained to cover the startup race.
      The pre-M2 failure was that the spawned task was killed by the
      runtime drop on hub shutdown, which closed the TCP connection
      without a WebSocket close frame. E2E-2 (the manual log check on
      relay server side) is the authoritative validation; the unit tests
      `relay_loop_exits_during_reconnect_sleep_when_shutdown_signalled`,
      `relay_loop_exits_during_held_handshake_when_shutdown_signalled`,
      and `relay_loop_exits_during_http_forward_when_shutdown_signalled`
      pin the between-sessions, in-handshake, and HTTP-forwarding code paths.
      The matching pattern with `spawn_health_checker` /
      `spawn_quote_index_evictor` / the upstream polling loop
      demonstrates the in-tree convention is honoured.
    result: pass
  - id: clippy-clean
    plan_clause: "clippy 无 warning (M3 will re-run --all-targets)"
    observation: "cargo clippy -- -D warnings → 0 warnings, exit 0."
    result: pass
  - id: caller-wiring
    plan_clause: "callers of spawn_relay_client updated to pass shutdown_rx"
    observation: >-
      `src/runtime/serve.rs:128` now passes `shutdown_rx.clone()` to
      `spawn_relay_client`. This is the only caller; no other call sites
      exist in the tree (verified via grep `spawn_relay_client`).
    result: pass

# ─── Behavioural diff vs. baseline (92304bc) ────────────────────────────────
# Summary of the M2-relevant behavioural change set:
behavioural_diff:
  - area: "spawn_relay_client signature"
    before: >-
      `pub fn spawn_relay_client(identity: DeviceIdentity, hub_base: String, relay_ws_url: String)`
      — the spawned task owned an infinite `loop { run_session; sleep }`
      with no shutdown channel. When the hub exited, the task was dropped
      mid-WebSocket-handshake or mid-stream, closing the TCP socket
      without a WebSocket close frame. The relay server then logged the
      disconnect as `connection reset` / `unexpected EOF`.
    after: >-
      `pub fn spawn_relay_client(identity: DeviceIdentity, hub_base: String, relay_ws_url: String, shutdown: watch::Receiver<bool>)`
      — the spawned task runs `pub async fn run_relay_loop` which
      selects between `shutdown.changed()`, `run_session`, and the
      reconnect sleep. On `shutdown = true` it returns; the WebSocket
      future inside `run_session` is then dropped at runtime teardown,
      which tokio_tungstenite turns into a normal close frame on the
      underlying stream before the connection is closed.
    security_classification: "CWE-754 / reliability — closes the `connection reset`/`unexpected EOF` class of relay-side disconnect logs on hub shutdown, matching the in-tree pattern used by every other long-running background task (health checker, quote index evictor, upstream poller)."
  - area: "DeviceIdentity construction in tests"
    before: "No constructor — tests would have needed `DeviceIdentity::load_or_create()`, which writes to `dirs::data_local_dir()`."
    after: "`pub fn for_testing(device_id, signing_key_b64)` lets unit tests build an identity purely in-memory."
    security_classification: "No production behavioural change. The constructor is `#[doc(hidden)]` and only intended for `#[cfg(test)]` callers."

# ─── M2-specific open follow-ups (none) ────────────────────────────────────
