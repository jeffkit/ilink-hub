# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M2: `spawn_relay_client` was previously an infinite-reconnect loop
# with no shutdown signal. When the hub process was torn down, the tokio runtime
# dropped the spawned task mid-WebSocket-handshake, and the relay server
# observed an abnormal close. After this change:
#
#   * `spawn_relay_client` accepts a `watch::Receiver<bool>` and stores it in
#     the spawned task.
#   * The reconnect loop is wrapped in `tokio::select!` with three arms:
#       1. `shutdown.changed()` (biased) — on `true`, the loop returns.
#       2. `run_session(...)` — the per-session WebSocket future.
#       3. `tokio::time::sleep(RECONNECT_SECS)` — the backoff between sessions.
#     Hit on shutdown → return; the loop only proceeds if the new value is
#     anything other than `true`.
#   * At spawn time, if `*shutdown.borrow()` is already `true`, the loop exits
#     before opening any WebSocket — covers the race where shutdown fires
#     during startup ordering.
#
# The pattern mirrors `spawn_health_checker` (src/hub/health.rs:13) and
# `spawn_quote_index_evictor` (src/hub/mod.rs:188), which were cited in the
# exec-plan prompt as the canonical reference. `run_serve` already threads
# the `shutdown_rx` watch channel everywhere else (axum graceful shutdown,
# upstream polling, etc.), so adding the same receiver here completes the
# set.

# ─── Source-of-truth changes for E-03 ───────────────────────────────────────
source_changes:
  - file: src/relay/client.rs
    symbols:
      - "spawn_relay_client (lines ~22-29)"
      - "run_relay_loop (lines ~32-64)"
    change_summary: >-
      `spawn_relay_client` now accepts a fourth parameter
      `shutdown: tokio::sync::watch::Receiver<bool>` and forwards it to a new
      `pub async fn run_relay_loop`. The loop body: (1) checks
      `*shutdown.borrow()` up front and returns immediately if shutdown was
      already signalled at spawn time (info! "relay client skipped (shutdown
      already signalled at spawn)"); (2) runs `tokio::select!` over
      `shutdown.changed()` (biased), `run_session(...)`, and the
      `RECONNECT_SECS` sleep. The `shutdown.changed()` arm reads
      `*shutdown.borrow()` and returns with info! "relay client shutting
      down" when it sees `true`; on any other value the loop continues so a
      future false→true→false→true sequence still works correctly. The
      `spawn_relay_client` signature is unchanged in spirit — it still
      returns `()` — it just spawns the new `run_relay_loop` future so
      callers (e.g. `src/runtime/serve.rs:128`) don't have to know about
      the refactor.
  - file: src/relay/client.rs (tests)
    symbols:
      - "tests::relay_loop_returns_immediately_when_shutdown_already_true"
      - "tests::relay_loop_exits_during_reconnect_sleep_when_shutdown_signalled"
      - "tests::spawn_relay_client_returns_without_blocking"
    change_summary: >-
      Three new tests in `mod tests` (inside `src/relay/client.rs`):
      (1) when `shutdown` is already `true` at spawn time, `run_relay_loop`
      returns within 200ms without ever calling `run_session` (no real
      WebSocket connection is attempted — uses unreachable
      `ws://127.0.0.1:1` as a sentinel);
      (2) when the relay WS URL is unreachable, `run_session` fails fast on
      TCP connect and the loop falls into the 5s `RECONNECT_SECS` sleep;
      sending `shutdown.send(true)` during that sleep must abort it via
      the select!'s `shutdown.changed()` arm within 2s (i.e. far less than
      the 5s reconnect interval, proving the shutdown signal was honoured);
      (3) `spawn_relay_client` itself must return synchronously (it just
      calls `tokio::spawn`), so the caller's startup sequence is not
      blocked by relay connectivity. The new tests use
      `DeviceIdentity::for_testing` (a `#[doc(hidden)]` constructor added
      to `src/relay/device.rs`) so they do not need to write to the user's
      real local data dir.
  - file: src/relay/device.rs
    symbols:
      - "DeviceIdentity::for_testing (lines ~107-114)"
    change_summary: >-
      Adds a `#[doc(hidden)] pub fn for_testing(device_id, signing_key_b64)`
      constructor on `DeviceIdentity` so unit tests can build an identity
      from in-memory material (a freshly generated `SigningKey` + a fixed
      UUID). This avoids the side effect of writing to
      `dirs::data_local_dir()/ilink-hub/device_identity.json` from the
      `relay::client` tests.
  - file: src/runtime/serve.rs
    symbols:
      - "run_serve (line ~128, spawn_relay_client call)"
    change_summary: >-
      The single caller of `spawn_relay_client` now passes
      `shutdown_rx.clone()`. `run_serve` already holds the `watch::Receiver<bool>`
      (used by the axum graceful shutdown and by `upstream.run_polling_loop`),
      so this is a one-line wiring change — no new channels, no new
      configuration.

