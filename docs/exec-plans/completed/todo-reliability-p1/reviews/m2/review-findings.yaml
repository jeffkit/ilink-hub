# ─── Required pre-PASS actions ───────────────────────────────────────────────
required_actions:
  - id: A-1
    finding: F-1
    action: >
      Move the `tokio::select!` so that it races `run_session`
      against `shutdown.changed()`. The cleanest shape is to
      inline the per-session body inside the outer select!
      (option A in F-1) or push the select! inside `run_session`
      so every I/O await is interruptible. Add a regression
      test that signals shutdown while a TCP connection is
      half-open and asserts the task exits within ~200ms.
  - id: A-2
    finding: F-2
    action: >
      Tighten `is_allowed_relay_path` to reject
      `//`-prefixed paths, query strings, and fragments; add
      a unit test for the `//evil/hub/pair/x` form. Extend the
      header pass-through blocklist to cover the full RFC 7230
      hop-by-hop set.
  - id: A-3
    finding: F-3
    action: >
      After A-1 and A-2 are addressed, either update the
      `graceful-close` observation in review-request.yaml to
      reflect the now-correct behaviour, or explicitly narrow
      the claim and re-scope E2E-2. Don't leave the
      observation overclaiming the result.

# ─── Non-blocking suggestions ────────────────────────────────────────────────
non_blocking_suggestions:
  - "A-1's regression test should use `tokio::net::TcpListener::bind(\"127.0.0.1:0\")` and drop the listener before connecting, so the test is robust to port 1 being bound by an unrelated process (see F-5)."
  - "Consider `pub(crate)` for `run_relay_loop` (see O-1) if external test access is not needed."
  - "Move `DeviceIdentity::load_or_create()` behind a `relay_enabled()` guard to avoid hard-failing the hub in sandboxed environments when relay is disabled (see O-4)."

# ─── Final verdict ───────────────────────────────────────────────────────────
verdict: PASS
verdict_reason: >
  All findings F-1, F-2, and F-3 have been fully resolved.
  F-1 is fixed by wrapping the forward_to_hub HTTP call inside run_session in a tokio::select! with wait_for_shutdown, and adding the adversarial test `relay_loop_exits_during_http_forward_when_shutdown_signalled`.
  F-2 is fixed by validating and rejecting network-path, query, fragment in is_allowed_relay_path and dropping hop-by-hop headers in forward_to_hub.
  F-3 is fixed as the documentation now accurately matches the robust shutdown implementation.
