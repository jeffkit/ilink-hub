# ─── Behavioural diff vs. baseline (61938ba) ───────────────────────────────
# Summary of the M1-relevant behavioural change set:
behavioural_diff:
  - area: "Store::connect (sqlite branch)"
    before: >-
      `let pool = if url.contains(":memory:") { PoolOptions::new().max_connections(1).connect(url).await? } else { AnyPool::connect(url).await? };`
      For `sqlite:/path/to/file.db`, this called `AnyPool::connect(url)`
      which uses sqlx's default `PoolOptions` (max_connections=10).
      With 10 physical connections, two concurrent write transactions
      (e.g. `persist_context_tokens_batch` + `set_active_session_name`)
      could race on the file-level EXCLUSIVE write lock; once a writer's
      lock-hold time exceeded the default 5s `busy_timeout`, the second
      writer's transaction returned SQLITE_BUSY (5).
    after: >-
      `let pool = if url.starts_with("sqlite:") { PoolOptions::<sqlx::Any>::new().max_connections(1).connect(url).await? } else { AnyPool::connect(url).await? };`
      For every `sqlite:` URL (file or :memory:), the pool is sized to
      one physical connection. Concurrent transactions queue on that
      single connection, eliminating the second-contender file-lock race.
      The 5s default `busy_timeout` remains as a defense in depth.
    security_classification: "CWE-754 (Improper Check for Unusual or Exceptional Conditions) / reliability — closes the SQLITE_BUSY crash class for the broadcast / dispatch path under concurrent write load."
  - area: "in-memory sqlite"
    before: "max_connections(1) (correct, because each new physical connection to :memory: yields a fresh empty DB)."
    after: "max_connections(1) (unchanged, now reached via the unified `starts_with(\"sqlite:\")` branch)."
    security_classification: "No behavioral change."

