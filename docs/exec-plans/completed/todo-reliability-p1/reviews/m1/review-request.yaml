# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M1: collapse the file-type SQLite AnyPool to a single
# connection (`max_connections(1)`) so that the file-level EXCLUSIVE
# write lock cannot be contested by two physical connections. The
# `busy_timeout` for SQLite connections is 5s by default in sqlx; with
# a single connection, concurrent transactions queue on the same
# connection (so the only wait is the queue, not the file lock), and
# the default busy_timeout becomes a safety net for the rare shutdown
# drain case rather than a primary defense.
#
# :memory: keeps the existing single-connection behavior (it was
# already correct — each new physical connection to :memory: would
# otherwise see a fresh empty database). After this change, every
# `sqlite:` URL goes through the `max_connections(1)` branch, which
# subsumes the `:memory:` case but is identical to it.

# ─── Source-of-truth changes for DB-01 ─────────────────────────────────────
source_changes:
  - file: src/store/mod.rs
    symbols:
      - "Store::connect (lines ~20-48)"
    change_summary: >-
      The `let pool = if ...` branch in `Store::connect` now keys on
      `url.starts_with("sqlite:")` instead of `url.contains(":memory:")`.
      Both the in-memory and file-type SQLite cases use
      `PoolOptions::<sqlx::Any>::new().max_connections(1).connect(url)`.
      The non-SQLite (postgres/mysql) branch still uses `AnyPool::connect`.
      The doc comment now explains the file-level write lock rationale
      and notes that the default 5s `busy_timeout` remains in place as
      a safety net for the migration-runner `acquire` path during
      shutdown drain.
  - file: src/store/mod.rs (tests)
    symbols:
      - "store_tests::file_sqlite_serializes_concurrent_read_and_write_without_busy"
    change_summary: >-
      New unit test under `mod store_tests` (in `src/store/mod.rs`)
      that: (1) opens a file-type SQLite `Store` via `Store::connect`
      against a `tempfile::tempdir()`-backed path; (2) asserts the
      structural invariant `store.pool.options().get_max_connections()
      == 1`; (3) seeds one row via `persist_context_token` and one
      `set_active_session_name`; (4) spawns 8 batch-writer tasks
      (20 iterations of 200 entries each), 4 single-row writer tasks
      (200 iterations), and 4 reader tasks (200 iterations each) on
      a multi-thread runtime (8 workers); (5) joins all tasks and
      expects zero `SQLITE_BUSY` errors. The structural assertion
      is the canonical regression guard: it fails on the pre-fix
      code with `left: 10, right: 1`, and the concurrent workload
      exercises the same code path that the production failure
      targeted.

