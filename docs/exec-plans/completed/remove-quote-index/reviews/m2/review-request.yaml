change_summary: |
  Added the L3 footer fallback regression test `at_mention_quote_reply_l3_footer_routing` in
  `src/hub/dispatch.rs`. The test registers a client named "ilink-claude", constructs a
  WeixinMessage whose quoted text contains a footer `---\nilink-claude · at-20260704-103000`,
  uses an ancient timestamp so L1 and L2 DB lookups don't match, then calls
  `resolve_quote_from_footer` and asserts it returns `QuoteOrigin::Client` with the correct
  vtoken and `session_name = Some("at-20260704-103000")`. This completes the three-test
  regression suite (L1 timestamp, L2 content-prefix, L3 footer) verifying the DB fallback
  routing chain after the in-memory QuoteRouteIndex was removed in M1.

