# ─── New findings (introduced or exposed by fix) ──────────────────────────────

findings:
  - id: "nf1"
    severity: MEDIUM
    category: maintainability
    description: |
      store/messages.rs:58 的 doc comment 仍残留重构前措辞：
      "Used as DB-backed fallback for quote-reply routing when the in-memory
      QuoteRouteIndex is cold (e.g. after a Hub restart)."
      f4 的修复仅覆盖 src/hub/quote_route.rs（两处），但遗漏了同样在 changed_files
      列表中的 store/messages.rs。重构后 DB path 是主路径而非冷启动回退，误导性
      描述会让维护者误判该函数为"低频冷启动路径"，影响后续监控/测试投入决策。
    suggestion: |
      将 store/messages.rs find_assistant_message_by_content 的 doc comment 更新为：
      "DB-backed quote resolver (L2 content-prefix layer). Scans messages table
      for the most recent assistant message whose content starts with `content_prefix`.
      Called on every quote-reply after the L1 timestamp lookup misses."
      同时删除 "in-memory QuoteRouteIndex is cold (e.g. after a Hub restart)" 句。
    location: "src/store/messages.rs:56-58"
    status: open

  - id: "nf2"
    severity: LOW
    category: maintainability
    description: |
      store/store_tests.rs:3154 的模块注释仍引用已删除的 QuoteRouteIndex：
      "before looking up the QuoteRouteIndex and the DB"。
      该文件在本次 changed_files 列表中（修改类型：已删除 recent_outbound_messages 相关测试），
      说明编写者回顾了该文件，但未更新此处的历史注释。残留引用会在 code review 或
      grep 搜索 "QuoteRouteIndex" 时混淆审查者（误以为仍有依赖）。
    suggestion: |
      将 store/store_tests.rs:3154 的注释从
      "before looking up the QuoteRouteIndex and the DB."
      更新为：
      "before querying the DB via the three-layer fallback (timestamp → content-prefix → footer)."
    location: "src/store/store_tests.rs:3154"
    status: open

