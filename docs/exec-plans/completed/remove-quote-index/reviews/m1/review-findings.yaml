summary: |
  三条 DB fallback 调用（L1/L2/L3）均缺少超时包裹（f1, HIGH），在 DB 慢时会
  无限阻塞 dispatch_message 任务，与已有 build_hub_ext_for_vctx 的 5s 超时实践不一致。
  三层全部 miss 时无任何 metric/log（f2, HIGH），quote-reply 静默误路由在生产
  环境完全不可观测。此外存在三处 peer_user_id 推导逻辑拷贝（f3）、stale doc comment
  （f4）、关键 @mention → quote-reply 集成测试缺失（f5）、全空白 prefix guard 边界
  缺漏（f6）等问题。所有 HIGH/MEDIUM/LOW 问题均已修复，re_review_needed: false。
