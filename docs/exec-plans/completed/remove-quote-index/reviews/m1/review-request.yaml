change_summary: |
  移除了 QuoteRouteIndex 内存路由层及其所有支撑代码（ContentEntry、WarmItem、
  warm_item_from_recent_row、evict_expired、warmup 等），将原先作为方法的三个
  公共接口（collect_quoted、collect_quoted_timestamp、footer_from_user_quote）
  转为独立的公共函数。dispatch.rs 中的 quoted 解析逻辑直接从三层 DB fallback
  开始（timestamp → content-prefix → footer），不再经过内存索引。相关 Prometheus
  指标 ilink_hub_quote_index_ready 同步删除。净削减约 1700 行代码。

