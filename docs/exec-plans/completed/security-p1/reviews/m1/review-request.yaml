open_questions_for_reviewer:
  - "Is the `register()` 3-tuple return shape (plaintext, hashed, is_new) acceptable, or should we wrap it in a struct? The 3-tuple is widely visible in tests today; a `RegisterOutcome` struct would push the same information into a single field-access expression."
  - "Is the 8-char vtoken prefix shown by `admin_clients` still acceptable, or should we now show more chars to retain operator UX? The current prefix of a hash is 8 hex chars (32 bits of entropy) which is unique in practice but cosmetically less informative than the old `vhub_xxxx` prefix."
  - "Should `extract_vtoken` short-circuit on `is_valid_vtoken` BEFORE hashing to keep the malformed-format error path cost-free? Today it validates, then hashes; the cost is small but it does mean a 401 response on a malformed Authorization header now runs a SHA-256 over the candidate. We could check the canonical-hex shape (`is_vtoken_hash`) for a small saving, but that requires the candidate to be 64 chars — which is wrong because the candidate is plaintext, not hash. Conclusion: leave as-is, the cost is one SHA-256 per malformed request, and we already pay validation costs above it."
