open_questions_for_reviewer:
  - "Should `recent_outbound_messages` also expose `id` so the warmup can dedupe on (scope, text, created_at) tuples when the same row was indexed twice across a Hub restart? Today the index is in-memory only and the warmup runs once per process, so this is a non-issue, but if the index ever becomes persistent this would need revisiting."
  - "Should the warmup include Hub-internal replies (the `Hub { cmd }` variant)? Today we only index rows where `vtoken` is set, which collapses to a `Client` origin; Hub replies are not in the messages table (they go through `commands.rs` directly). The fallback for missing vtoken currently maps to `HubCommand::Help`; should it preserve the original `HubCommand` from the `create_time_ms` footer? Currently the footer does not encode the HubCommand, so we cannot recover it."
  - "Is the `<warmup>` placeholder name confusing in admin UIs, or is it desirable as a marker? An alternative is `name: <unknown>` to make it clear we lost the footer; the current name leans the other way — the vtoken is what matters, the name is a label."
