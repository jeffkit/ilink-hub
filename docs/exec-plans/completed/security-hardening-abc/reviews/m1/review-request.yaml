change_summary: |
  Adversarial f1 (HIGH): pure single-take cleared vtoken on first get_qrcode_status
  poll. Lost response left the CLI without credentials while register_confirmed_client
  had already inserted a registry row → NameCollision on retry.

  Fix: claim-window semantics. Within 120s of confirm, claim_confirmed_vtoken returns
  the same token without clearing (idempotent retry). After the window, the next claim
  permanently clears vtoken (still closes the 24h re-poll steal hole). Wait/scanned
  paths still return None token. CORS wiring unchanged.

  f2 (MEDIUM): accepted residual — pair code is the capability; client-binding secret
  deferred. f3: default CORS permissive kept (OpenClaw). f4: sequential double-claim
  within window covered; multi-thread race deferred.

acceptance_criteria:
  - "Within VTOKEN_CLAIM_WINDOW, sequential claims all get Some(same token); stored vtoken uncleared"
  - "After window (backdated confirmed_at), claim returns None and vtoken stays cleared"
  - "Wait/scanned claim returns (session, None); unknown code returns None"
  - "CORS default / build_cors_layer wiring unchanged"
  - "cargo fmt, clippy -D warnings, hub::pairing + cors_tests + build pass"

