# ─── Behavioural diff vs. baseline ──────────────────────────────────────────
behavioural_diff:
  - area: "LatencyHistogram internal sum (hub/state.rs)"
    before: >-
      `LatencyHistogram` tracked `sum_ms: AtomicU64`. `observe(u64 ms)`
      added `ms` to the sum. For any observation under 1 ms (the
      common case for `dispatch_latency_ms` and most in-process
      work), `ms == 0` so the sum stayed at 0 indefinitely. Grafana
      `rate(_sum)` produced a flat line for these metrics.
    after: >-
      `LatencyHistogram` now tracks `sum_us: AtomicU64` (microseconds).
      `observe(Duration)` adds `elapsed.as_micros()` to the sum. A
      500 μs observation increments `sum_us` by 500 (would have been
      0 under the previous contract). The on-the-wire `_sum` field
      still emits in milliseconds (`sum_us / 1000`), so existing
      dashboards keep working but operators can now see a non-zero
      trend for in-process latency.
    security_classification: >-
      No new attack surface. The change is purely an internal
      precision bump; the bucket boundaries, count semantics,
      thread-safety guarantees, and Prometheus wire format are all
      unchanged. The new `Duration` parameter is the natural
      representation of an elapsed time and accepts any value the
      previous `u64` parameter would have accepted (a `Duration`
      with `as_millis() == X` produces `sum_us += X * 1000`, which
      renders as `X` ms after the `/ 1000` step).
  - area: "LatencyGuard / HistoGuard / sendmessage observe call sites"
    before: >-
      `LatencyGuard::drop` called
      `self.histogram.observe(self.start.elapsed().as_millis() as u64)`,
      which truncated any elapsed value < 1 ms to 0. The
      upstream-roundtrip observe in routes.rs:594 did the same
      truncation. Both sites silently discarded microsecond-level
      signal before it reached the histogram.
    after: >-
      Both sites now call `observe(self.start.elapsed())` /
      `observe(upstream_start.elapsed())` — the full Duration is
      forwarded. The histogram converts to microseconds for the
      sum and to milliseconds for the bucket boundary. Sub-ms
      observations now contribute to the sum, making the metric
      useful for in-process latency monitoring.
    security_classification: >-
      No new attack surface. The Duration parameter accepts the
      full elapsed range; no input is rejected that the previous
      `u64` parameter would have accepted. The bucket scan still
      caps at the +Inf overflow bucket (no panic, no allocation).

