# ─── M2-required test inventory (plan §M2) ─────────────────────────────────
# Plan §M2 explicitly required:
#   1. cargo test -p ilink-hub --lib hub::state  →  state tests pass
#   2. cargo test -p ilink-hub -- latency         →  latency tests pass
#   3. cargo clippy -- -D warnings                →  no warnings
# Items 1+2+3 are subsumed by the cargo test + cargo clippy commands
# above. The hub state struct is private (`mod state`), so the canonical
# path to run its tests is `cargo test --lib latency` (which matches
# all 5 new tests by name). The `hub::state` glob from plan §M2 returns
# 0 matched tests because the module isn't re-exported at that path —
# the new tests live in `hub::tests` (the file at src/hub/tests.rs),
# which is the same location the m1 unit tests live in.
m2_test_inventory:
  unit_lib_ilink_hub:
    - test: latency_histogram_submillisecond_observation_increments_sum_us
      covers: >-
        The headline N-02 invariant: observing 500 μs increments
        `sum_us` to ≥ 500. Pre-N-02, the millisecond sum was 0 for any
        observation < 1 ms, so `rate(_sum)` on Grafana was a flat line.
        Pins the contract on the data structure itself so a future
        refactor that re-introduces a millisecond-floor cast fails
        this test.
      result: pass
    - test: latency_histogram_submillisecond_observation_lands_in_first_bucket
      covers: >-
        Bucket-count behavior is unchanged: a 500 μs observation still
        lands in the `le=1` bucket (the first HISTOGRAM_BUCKETS_MS
        boundary). Operators reading bucket counts see no difference —
        N-02 only changes the internal sum, not the bucket boundaries.
      result: pass
    - test: latency_histogram_millisecond_observation_still_works
      covers: >-
        Regression guard: a 42 ms observation still produces exactly
        `sum_us == 42_000` (the previous contract would have produced
        `sum_ms == 42`). A future refactor that re-interprets the
        microsecond sum as something else fails this test.
      result: pass
    - test: latency_histogram_render_sum_uses_milliseconds
      covers: >-
        Pins the on-the-wire unit (`_sum` = `sum_us / 1000`) at the
        data-structure level. Four 250 μs observations sum to
        1_000 μs == 1 ms on the wire — the pre-N-02 implementation
        would have rendered `_sum 0` for these same four observations.
        This guards against a future regression that emits
        microseconds on the wire (which would change dashboards
        without warning).
      result: pass
    - test: latency_guard_records_submillisecond_elapsed
      covers: >-
        End-to-end check that `LatencyGuard::drop` (the production hot
        path used by `HistoGuard` in routes.rs) actually passes a
        `Duration` to `observe`. Pre-N-02 the Drop handler did
        `self.start.elapsed().as_millis() as u64`, truncating anything
        under 1 ms to 0 — this test confirms the new path records the
        microsecond value instead.
      result: pass

# ─── Pass conditions vs. plan.md M2 ─────────────────────────────────────────
pass_conditions:
  - id: n02-latency-histogram-microsecond-sum
    plan_clause: >-
      src/hub/state.rs：LatencyHistogram 新增 sum_us: AtomicU64，observe()
      参数改为接受 Duration（内部转 μs 存入 sum_us，同时保留原 sum_ms
      或直接废弃 → 用 sum_us / 1000 替代）。
    observation: >-
      `LatencyHistogram` now has `sum_us: AtomicU64` instead of
      `sum_ms: AtomicU64`. `observe()` accepts a `Duration`, converts
      it to microseconds via `as_micros()`, and bucketizes using
      `as_millis() as u64`. The plan offered a choice between
      "保留原 sum_ms" and "直接废弃 → 用 sum_us / 1000 替代"; the
      latter was chosen to avoid carrying two redundant atomic
      counters (they would always be derivable from each other) and
      to keep the type signature honest about what is being tracked.
      No external callers depend on the `sum_ms` field name (it was
      only read inside `render_histogram`), so the rename is internal.
      New unit test
      `latency_histogram_submillisecond_observation_increments_sum_us`
