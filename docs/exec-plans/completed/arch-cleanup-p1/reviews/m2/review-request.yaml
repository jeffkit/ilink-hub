# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M2:
#   The Prometheus `_sum` field on the latency histograms was always 0 for
#   sub-millisecond observations (the common case for `dispatch_latency_ms`
#   and the inbound pipeline). Operators reading `rate(_sum)` on Grafana
#   saw a flat line, making the metric useless for in-process latency
#   monitoring. N-02 switches the internally-tracked sum from milliseconds
#   to microseconds so sub-millisecond observations become visible, while
#   keeping the on-the-wire unit (and Grafana dashboards) unchanged.
#
# This change:
#   1. Replaces `sum_ms: AtomicU64` on `LatencyHistogram` with
#      `sum_us: AtomicU64`. The Prometheus render path divides by 1000 to
#      keep emitting `_sum` in milliseconds.
#   2. Changes `LatencyHistogram::observe()` to accept a `Duration` (the
#      natural unit for an elapsed-time observation). The bucket selection
#      logic still uses milliseconds so bucket boundaries and the `le=`
#      labels on the wire are unchanged.
#   3. Updates the two production call sites (`LatencyGuard::drop` and
#      `routes.rs::sendmessage` upstream observation) to pass the
#      `Duration` directly instead of a truncated `as_millis() as u64`.

# ─── Source-of-truth changes ────────────────────────────────────────────────
source_changes:
  - file: src/hub/state.rs
    symbols:
      - "LatencyHistogram::sum_ms → sum_us"
      - "LatencyHistogram::observe (signature now accepts Duration)"
      - "LatencyGuard::drop (passes Duration to observe)"
    change_summary: >-
      `LatencyHistogram` now tracks the cumulative sum as `sum_us:
      AtomicU64` (microseconds). `observe()` accepts a `std::time::Duration`
      and computes the bucket boundary by `as_millis() as u64`, so bucket
      counts and the `le=` labels are unchanged on the wire. A 500 μs
      observation increments `sum_us` by 500 (and would have been 0 under
      the previous `sum_ms`); four 250 μs observations now render as
      `_sum 1` instead of `_sum 0`. `LatencyGuard::drop` was the canonical
      hot-path caller — it now passes `self.start.elapsed()` directly
      instead of `.as_millis() as u64`, dropping the implicit truncation.
      The bucket scan is still an O(8) linear walk and the operation
      remains lock-free (no allocation, single fetch_add per bucket).
  - file: src/server/routes.rs
    symbols:
      - "render_histogram (sum_us/1000 → _sum)"
      - "sendmessage upstream observe call (Duration)"
    change_summary: >-
      `render_histogram` now reads `h.sum_us` and renders `_sum` as
      `sum_us / 1000` (still milliseconds, matching existing Prometheus
      dashboards and operator expectations). The `# HELP` text and the
      bucket loop are unchanged. The upstream-roundtrip `observe` call in
      the `sendmessage` handler (line 594) was updated to pass the
      `Duration` returned by `Instant::elapsed()` instead of the
      truncated `.as_millis() as u64` cast — this matches the new
      `LatencyHistogram::observe` signature and removes the last
      millisecond-floor in the metrics path.

