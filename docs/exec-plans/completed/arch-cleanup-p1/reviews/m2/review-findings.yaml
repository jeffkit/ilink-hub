# ─── Findings ──────────────────────────────────────────────────────────────
findings:
  # ─── HIGH-severity findings (none) ─────────────────────────────────────

  # ─── MEDIUM-severity findings ──────────────────────────────────────────
  - id: F-M1
    severity: medium
    title: "Bucket-boundary truncation uses `as_millis() as u64` — Duration > u64::MAX ms (≈584M years) is silently truncated; sum_us path uses safer try_from/unwrap_or"
    description: >-
      state.rs:115 computes `let ms = elapsed.as_millis() as u64;` for the
      bucket-boundary scan. The `as_millis()` method returns u128; the `as u64`
      cast silently truncates on overflow. The state.rs:114 path is safer
      (`u64::try_from(...).unwrap_or(u64::MAX)`). The asymmetry is real but
      practically unreachable — a Duration > 584M years means the process
      survived past the heat death of the universe. The sum_us path was
      defensively hardened against u128→u64 saturation; the bucket path was
      not. Two consequences:
        (a) The bucket scan has a theoretical silent-truncation bug that the
            sum path explicitly avoided. Consistency would suggest using
            `u64::try_from(elapsed.as_millis()).unwrap_or(u64::MAX)` here
            too. Then `ms <= *boundary` would be `u64::MAX <= boundary`,
            which is false for any finite boundary, and the observation
            would correctly land in the overflow bucket.
        (b) A test should pin that path. There is no test for "elapsed
            Duration > u64::MAX ms lands in the +Inf overflow bucket
            without panicking". The current test suite exercises values
            up to 42 ms only.
      The real-world risk is essentially zero (no process survives that
      long). The find is medium because it is a consistency issue and a
      missed test-coverage opportunity, not a correctness bug for any
      reachable input.
    proof: >-
      state.rs:113-127:
        let us = u64::try_from(elapsed.as_micros()).unwrap_or(u64::MAX); // safe
        let ms = elapsed.as_millis() as u64; // truncating cast — asymmetric
      No production code ever feeds a Duration this large (the source is
      `Instant::elapsed()` from monotonic clock; monotonic clock overflow
      is ~584M years). Tests do not exercise the path.
    severity_assessment: "medium — consistency + test coverage, not a reachable bug"
    status: documentation_drift
    recommendation: >-
      Change state.rs:115 to `let ms = u64::try_from(elapsed.as_millis()).unwrap_or(u64::MAX);`
      for symmetry with line 114. Add a test that observes a Duration of
      `Duration::from_secs(u64::MAX)` (or even just the unit-level
      property "any Duration whose ms > 10_000 lands in the overflow
      bucket without panic"). Both are <10 line changes.
    references:
      - "src/hub/state.rs:114-115"

  - id: F-M2
    severity: medium
    title: "Test `latency_guard_records_submillisecond_elapsed` does NOT pin any lower bound on sum_us — it admits it may be 0 on fast CI"
    description: >-
      tests.rs:498-518:
        let _ = h.sum_us.load(Ordering::Relaxed); // discards the value
      The test loads the sum, does not assert any non-zero property, and
      discards the value. The comment at lines 512-516 explicitly states
      "we don't pin a lower bound here because on a fast CI box the
      elapsed could be 0 μs". This means the test does not actually
      verify that LatencyGuard::drop records the microsecond value — it
      only verifies that count incremented. The headline invariant of
      N-02 ("a sub-millisecond elapsed is visible in sum_us") is pinned
      by `latency_histogram_submillisecond_observation_increments_sum_us`
      on the direct observe() path, but not on the LatencyGuard::drop
      production path.
      The 500 μs direct observe path uses an explicit Duration::from_micros(500),
      so it bypasses Instant::elapsed() — the test does NOT cover the
      actual production code path (Drop with real elapsed time). The
      coverage gap is: "LatencyGuard::drop with elapsed < 1 ms
      contributes a positive amount to sum_us".
    proof: >-
      Read tests.rs:498-518. Line 517: `let _ = h.sum_us.load(Ordering::Relaxed);`
      discards the loaded value without assertion. Line 511:
      `assert_eq!(h.count.load(Ordering::Relaxed), 1);` only checks the
      count, not the sum. This is structurally a count-only test, not a
      N-02 invariant test.
    severity_assessment: "medium — the test is labelled as the end-to-end N-02 verifier but doesn't actually verify N-02 on the production path"
    status: verified_incomplete_coverage
    recommendation: >-
      Either:
        (a) Force a non-zero elapsed by sleeping before drop:
            `std::thread::sleep(Duration::from_micros(200));` — adds
            200 μs of CI time but pins the contract on the real Drop
            path. The latency cost is negligible and bounded.
        (b) Replace the load-and-discard with `assert!(sum_us < 1_000)`
            to verify "sub-millisecond contribution is bounded by
            elapsed μs" — but this is weaker and still doesn't pin the
            non-zero property.
        (c) Remove the test or rename it to
            `latency_guard_drop_increments_count` (it's a count-only
            test today) so future readers don't expect it to verify
            the sum invariant.
      Option (a) is preferred.
    references:
      - "src/hub/tests.rs:498-518"

  - id: F-M3
    severity: medium
    title: "routes.rs:1209 doc-comment claims `drop handler is #[inline]` but neither `LatencyGuard::drop` nor `observe` carry `#[inline]`"
    description: >-
      routes.rs:1209 (in the HistoGuard alias documentation):
        "The drop handler is `#[inline]` and lock-free, so the per-request
         cost is a single `Instant::elapsed` + the histogram's 8-bucket
         linear scan."
      state.rs:207-211:
        impl Drop for LatencyGuard<'_> {
            fn drop(&mut self) {
                self.histogram.observe(self.start.elapsed());
            }
        }
      No `#[inline]` attribute on the drop impl, on observe(), or on the
      bucket scan loop. Whether the compiler inlines the drop body and
      observe() is a codegen detail; the doc comment promises it
      deterministically. Pre-M2 this documentation was already present
      and equally inaccurate, but M2 is a good opportunity to either
      add the attribute (it's the right thing — these are tiny functions
      on the hot path) or correct the doc.
    proof: >-
      grep "inline" src/hub/state.rs → no matches.
      grep "inline" src/server/routes.rs → only the doc-comment line
      (1209) and the cross-reference at 1211.
    severity_assessment: "low-medium — documentation accuracy, not a functional bug. Pre-existing drift, M2 inherits it."
    status: pre_existing_drift
    recommendation: >-
      Either:
        (a) Add `#[inline]` to `fn drop(&mut self)` and to
            `pub fn observe(&self, elapsed: Duration)`. The bodies
            are tiny and the optimization is appropriate.
        (b) Soften the doc comment to "the drop body is small enough
            for the compiler to inline; lock-free by construction".
      Option (a) is more honest about the intent.
    references:
      - "src/server/routes.rs:1207-1213"
      - "src/hub/state.rs:113 (observe), 207-211 (drop)"

  # ─── LOW-severity findings ─────────────────────────────────────────────
  - id: F-L1
    severity: low
    title: "`latency_histogram_render_sum_uses_milliseconds` is a test of the data structure + manual division, not the actual render_histogram function"
    description: >-
      tests.rs:479-496 reproduces the render_histogram logic inline:
      `let sum_ms = sum_us / 1000;` and asserts the value. It does NOT
      call `routes.rs::render_histogram`. The test name says "render"
      but it only verifies the data structure's relationship to
      milliseconds — the test would pass even if `render_histogram`
      were refactored to emit raw microseconds, because the test
      re-implements the logic.
      The actual render path is only smoke-tested by the integration
      test suite (`regression_http_smoke` etc., per review-request.yaml),
      which presumably GETs /metrics and parses it. But there is no
      targeted test that asserts "the /metrics output contains
      `_sum` matching `sum_us / 1000` exactly for known seed
      observations".
    severity_assessment: "low — the contract is verified indirectly. Acceptable but not load-bearing."
    status: acceptable
    recommendation: >-
      Either rename the test to `latency_histogram_sum_us_div_1000_is_milliseconds`
      to clarify that it tests the data-structure level, OR add a
      focused test that calls `render_histogram` and asserts the output
      string contains `{name}_sum {expected_ms}` for known inputs. The
      latter is more accurate but requires `render_histogram` to be
      visible from the test (currently `fn` not `pub(crate) fn`).
    references:
      - "src/hub/tests.rs:479-496"
      - "src/server/routes.rs:1223 (render_histogram visibility)"

  - id: F-L2
    severity: low
    title: "`sum_us` is `pub` field; pre-N-02 `sum_ms` was also `pub`. The 'external API surface' is the field name change, which M2 handled via direct rename — no migration risk"
    description: >-
      LatencyHistogram's fields are public (state.rs:76, 80, 84). Pre-N-02
      external callers could have read `sum_ms.load(Ordering::Relaxed)`
      directly. M2 renames to `sum_us` (with the same semantics modulo
      unit). Review-request.yaml line 188-193 claims "No external
      callers depend on the `sum_ms` field name (it was only read inside
      `render_histogram`)". Verified: grep for `sum_ms` in src/ returns
      only the intentional occurrences in tests.rs (historical comment
      + test mirror of render logic), routes.rs (the /1000 division),
      and state.rs (none — fully renamed).
      No external API surface change for downstream consumers (there
      are no downstream consumers — this is a binary crate). The
      review-request's claim is correct.
    severity_assessment: "low — informational; confirms the rename is safe"
    status: verified_correct
    references:
      - "src/hub/state.rs:74-85 (LatencyHistogram fields)"
      - "src/server/routes.rs:1251-1253"

  - id: F-L3
    severity: low
    title: "Histogram bucket scan iterates by `enumerate()` and returns early — but the iteration starts at index 0 with `boundary == 1`. A 0-ms observation increments `buckets[0]` (le=1). This was true pre-N-02 and is preserved by M2"
    description: >-
      state.rs:119-126:
        for (i, boundary) in HISTOGRAM_BUCKETS_MS.iter().enumerate() {
            if ms <= *boundary { self.buckets[i].fetch_add(...); return; }
        }
        self.buckets[HISTOGRAM_BUCKETS_MS.len()].fetch_add(...); // overflow
      For `ms == 0` (which is what `as_millis() as u64` returns for any
      sub-ms observation — note: this is the F-M1 truncating cast path,
      see the M1 finding): the loop iterates with `boundary == 1`, the
      `ms <= boundary` check is `0 <= 1 == true`, so `buckets[0]` (le=1)
      is incremented. This is the desired behaviour and is verified by
      the new test `latency_histogram_submillisecond_observation_lands_in_first_bucket`.
      Note: the test uses `Duration::from_micros(500)`, which gives
      `ms == 0` via the truncating cast, then lands in `le=1`. Correct.
    severity_assessment: "informational — pre-existing behaviour, M2 preserves it"
    status: verified_correct
    references:
      - "src/hub/state.rs:118-126"
      - "src/hub/tests.rs:443-456"

  - id: F-L4
    severity: low
    title: "`observe()` uses `Ordering::Relaxed` on the bucket counter — same as pre-N-02. No ordering change"
    description: >-
      state.rs:116, 117, 121, 126 all use `Ordering::Relaxed`. Relaxed
      is the correct memory ordering for an observability counter that
      has no cross-atomic invariant: each bucket counter is independent,
      the sum is independent, the count is independent. The Prometheus
      scrape path also uses Relaxed loads (routes.rs:1235, 1241, 1244,
      1251), so there is no acquire/release fence between observe and
      scrape — and there doesn't need to be, because the counter values
      are eventually-consistent by design (Prometheus tolerates per-scrape
      skew).
      This is unchanged from pre-N-02. M2 doesn't introduce any new
      ordering concern.
    severity_assessment: "informational — M2 preserves the existing relaxed-atomic discipline"
    status: verified_correct
    references:
      - "src/hub/state.rs:116-126"
      - "src/server/routes.rs:1235, 1241, 1244, 1251"

# ─── Security-specific checks (OWASP, memory, race, panic) ─────────────────
security_checks:
  memory_safety:
    result: pass
    notes: >-
      No new `unsafe` blocks. M2 uses only safe Rust: `Duration::as_micros()`,
      `Duration::as_millis()`, `u64::try_from(...).unwrap_or(u64::MAX)`,
      `AtomicU64::fetch_add(..., Ordering::Relaxed)`. No raw pointers,
      no manual lifetime management, no transmute. The `as_millis() as u64`
      truncating cast is technically a "silent narrowing" but for any
      reachable Duration (Instant::elapsed() over the heat death of the
      universe), the high bits are zero. Not a memory safety issue.
  data_race:
    result: pass
    notes: >-
      `LatencyHistogram` fields are `AtomicU64` (thread-safe by
      construction). observe() does concurrent fetch_add on multiple
      atomic fields, which is well-defined. The bucket array has no
      read-modify-write overlap between bucket indices — each
      observation touches exactly one bucket slot, plus count and
      sum_us. No data race; no torn read of a single atomic; the
      Prometheus scrape reads each atomic independently (also safe).
      Ordering::Relaxed is appropriate here (no cross-atomic invariant).
  tokio_async_traps:
    result: pass
    notes: >-
      M2 touches only synchronous code paths. observe() is called
      either from Drop (sync) or from a sync context in routes.rs:594
      (after the upstream `.await` has already returned). No `.await`
      is held across the bucket scan. No Send/Sync changes — LatencyHistogram
      is Sync (atomics), LatencyGuard<'a> is Send (where 'a: Send).
      The M2 Duration parameter is Send/Sync (Duration is Copy + Send +
      Sync). No new spawn-bound considerations.
  panic_surface:
    result: improved
    notes: >-
      N-02 strictly reduces panic surface for sub-millisecond latency
      observations: pre-N-02, `as_millis() as u64` on a Duration of
      u64::MAX+1 μs would silently produce a wrong bucket assignment,
      while the `u64::MAX` fallback in state.rs:114 now saturates
      explicitly. The u64::MAX fallback on state.rs:115 (F-M1) is the
      only remaining silent-truncation path, and it's unreachable in
      practice.
      The Drop impl is no-panic (observe is no-panic — saturating
      arithmetic on the bucket loop's early-return).
  unwrap_audit:
    result: pass
    notes: >-
      New code in M2 introduces exactly one `unwrap_or` in production
      (state.rs:114: `u64::try_from(elapsed.as_micros()).unwrap_or(u64::MAX)`),
      and this is the safe idiom for handling u128→u64 saturation —
      better than a direct cast would be. No new `.unwrap()` or
      `.expect()` in production code. Tests use `.unwrap()` /
      `.expect()` freely for assertions (acceptable).
  owasp_top10:
    result: pass
    notes: >-
      No injection sinks (no SQL, no shell, no path traversal). No
      authentication/authorization changes. No crypto. No new HTTP
      endpoint. No new deserialization surface. The /metrics output
      format on the wire is unchanged (still `_sum` in milliseconds),
      so existing Prometheus scrapers and Grafana dashboards continue
      to work without modification. No new external API surface.
  secrets_handling:
    result: pass
    notes: >-
      No secrets in the histogram path. The /metrics output is purely
      numeric counters; no PII or token material is included. The
      vtoken-based rate limit / pair-confirm paths are unrelated to
      the histogram.
  concurrency_lock_order:
    result: pass
    notes: >-
      LatencyHistogram has no internal lock — it is lock-free via atomics.
      No cross-mutex interaction with HubState. LatencyGuard<'a> holds
      only a `&'a LatencyHistogram` borrow, so Drop cannot recursively
      enter any HubState mutex. No lock-ordering hazard introduced.
  unit_overflow_at_extremes:
    result: informational
    notes: >-
      `sum_us: AtomicU64` saturates at ~584,554 years of cumulative
      latency. For a single Hot-path observation, the max representable
      Duration is bounded by `Instant::elapsed()` from a monotonic
      clock — so the per-observation contribution is bounded by the
      process uptime, not by u64::MAX. The saturation behaviour is
      correct. `Duration::as_micros()` returns u128; `u64::try_from`
      converts with explicit saturation. Defensive design.

# ─── Conclusion ────────────────────────────────────────────────────────────
conclusion:
  summary: >-
    M2 is a focused, minimal, well-tested observability-precision fix.
    The N-02 invariant (sub-millisecond observations contribute to the
    internal sum) is correctly implemented via Duration parameter on
    observe() and AtomicU64 sum_us field, with the on-the-wire unit
    preserved via `sum_us / 1000`. All 5 production call sites
    (state.rs:209 LatencyGuard::drop, routes.rs:594 sendmessage
    upstream, plus 4 test sites) use Duration. The bucket layout,
    count semantics, and Prometheus wire format are all unchanged.
    All 439 tests pass; clippy clean with -D warnings; cargo fmt clean.
  blocking_findings: []
  non_blocking_findings:
    - id: F-M1
      title: "Bucket boundary cast is asymmetric vs sum path (as_millis() as u64 vs try_from/unwrap_or)"
      recommendation: "Change state.rs:115 to `u64::try_from(elapsed.as_millis()).unwrap_or(u64::MAX)` for symmetry with line 114. Add a regression test for very-large Duration."
    - id: F-M2
      title: "LatencyGuard::drop test does not actually pin the sub-ms sum invariant"
      recommendation: "Either add `std::thread::sleep(Duration::from_micros(200))` before drop to force a non-zero elapsed, or rename the test to clarify it only verifies count increment."
    - id: F-M3
      title: "Doc comment claims `drop handler is #[inline]` but the attribute is absent"
      recommendation: "Add `#[inline]` to LatencyGuard::drop and observe(), OR soften the doc to 'the drop body is small enough to be inlined by the compiler'."
  security_posture: unchanged
  concurrency_posture: unchanged
  memory_posture: unchanged
  observability_posture: improved

# ─── Verdict rationale ─────────────────────────────────────────────────────
# All blocking criteria satisfied:
#   - cargo fmt --check: clean
#   - cargo clippy -- -D warnings: clean
#   - cargo test --lib latency: 5 new M2 tests pass
