# ─── Behavioural diff vs. baseline ─────────────────────────────────────────
behavioural_diff:
  - area: "HubError::UpstreamHttp { status, msg } — field rename + Display"
    before: >-
      Pre-m4: `UpstreamHttp { code: u16, msg: String }` with Display
      `iLink upstream HTTP error {code}: {msg}`. No constructor in
      src/ (dead code — declared but never instantiated).
    after: >-
      `UpstreamHttp { status: u16, msg: String }` with Display
      `iLink upstream HTTP error {status}: {msg}`. The field rename
      from `code` to `status` matches plan §M4's exact spec. The
      Display string changed in form (now uses the renamed field)
      but the rendered text is identical for the same numeric
      value. The 13 call sites in ilink/{upstream, login}.rs now
      construct this variant via `upstream_http_err`, which extracts
      `reqwest::Error::status()` (None → 0) and `reqwest::Error::
      to_string()` into the variant.
    security_classification: >-
      No new attack surface. The variant was already declared and
      had a public Display formatter; m4 only renames a struct
      field and populates the variant at production call sites.
      The `status: 0` for transport-level errors is a deliberate
      design choice (None-as-0) and is pinned by a unit test.
  - area: "HubError::UpstreamParse(String) — first production uses"
    before: >-
      Pre-m4: declared as `UpstreamParse(String)` with Display
      `iLink upstream parse error: {0}`. No constructor in src/
      (dead code).
    after: >-
      Same variant shape, now constructed at 4 production call
      sites: get_updates.json, get_config.json, get_upload_url.json,
      login::get_qrcode.json. The fifth JSON parse site
      (login::poll_qrcode_status.json) is intentionally not
      migrated because it sits inside a retry loop where the
      error is logged-and-discarded — tagging it with
      UpstreamParse would be dead-tag.
    security_classification: >-
      No new attack surface. JSON parse errors are surfaced to
      logs and HubError consumers (via Display); the variant
      does not change wire-level behaviour.
  - area: "From<anyhow::Error> for HubError — outer HubError downcast"
    before: >-
      Pre-m4: a single `match e.downcast::<sqlx::Error>()` that
      returned `Database(err)` on success or `Upstream(e.to_
      string())` on failure. The HubError-via-anyhow round-trip
      had no recovery — if a call site constructed
      `anyhow::Error::new(HubError::UpstreamHttp { ... })`, the
      `?` chain would collapse it to a string-only Upstream.
    after: >-
      An outer `match e.downcast::<HubError>()` runs first and
      returns the specific HubError variant on success. The
      existing sqlx::Error downcast is preserved in the inner
      match arm (Err branch of the outer match), and the
      Upstream(string) collapse remains the final fallback for
      plain anyhow errors. The chain: outer HubError → inner
      sqlx::Error → final Upstream(string). The downcast
      consumption pattern (consume self, return original on
      Err) is what lets the inner match rebind `e` cleanly.
    security_classification: >-
      No new attack surface. The downcast is type-safe
      (HubError is a 'static enum). A buggy HubError that
      contains a secret in its `msg` field would now be
      propagated intact through the anyhow round-trip instead
      of being string-collapsed; the security properties are
      the same as if the HubError had been returned directly.
  - area: "HubError::Upstream(String) — usage count"
    before: >-
      Pre-m4: 2 `HubError::Upstream(string)` references in src/:
      one production (the From<anyhow> fallback at error.rs:65)
      and one pre-m4 test (in error::tests — same fallback path).
    after: >-
      Same 2 references: the production site is structurally
      required as the final fallback for non-HubError non-sqlx
      anyhow errors (preserved); the test site is the new
      `from_anyhow_collapses_other_errors_to_upstream_string`
      pin. No new production callers were added. The plan's
      "应有减少" wording is satisfied in spirit: 13 upstream
      error sites that would have produced string-only Upstream
      under the old pattern now produce the specific
      UpstreamHttp/UpstreamParse variant, and the Upstream
      variant stays as the catch-all for everything that isn't
      upstream-HTTP or upstream-parse.
    security_classification: >-
      No new attack surface. The Upstream variant is unchanged
      in shape; the migration only changes which errors fall
      through to it.

# ─── M4-specific open follow-ups ────────────────────────────────────────────
open_follow_ups:
  - id: F-M4-pending-upstream-error-aware-retry
    title: "When a downstream consumer wants to retry on transient HTTP failures (e.g. 503, 429) but fail-fast on permanent 4xx, the new UpstreamHttp.status field is the input. No retry policy is implemented in m4 — the variant is observable but not yet acted on."
    description: >-
      The m4 change makes the HTTP status observable via
      `HubError::UpstreamHttp { status, .. }`. A natural next step
      (out of scope for m4) is a retry policy in the polling loop
      that distinguishes 429/503/502 (retry with backoff) from
      4xx (fail fast, surface to admin UI). The polling loop's
      existing `backoff_secs` exponential-backoff is response-
      code-agnostic today. This is deferred to a future exec plan
      (probably a dedicated retry-policy milestone, not in p1).
    status: deferred_to_future_work
    references:
      - "src/ilink/upstream.rs:431-437 (polling loop's response-agnostic backoff)"
      - "src/error.rs:7 (UpstreamHttp { status, msg })"
  - id: F-M4-pending-helper-deduplication
    title: "upstream.rs and login.rs each define their own `upstream_parse_err` helper (4-line clone). A future refactor could lift it to `crate::ilink::error_helpers` or similar, but this crosses into refactor scope that m4 explicitly excludes."
    description: >-
      `ilink/upstream.rs::upstream_parse_err` (lines 38-40) and
      `ilink/login.rs::upstream_parse_err` (lines 19-21) are
      byte-identical 4-line functions. m4 did not deduplicate
      them because (a) the two modules are in different parts of
      the ilink tree and (b) plan §M4 explicitly says "全量迁移不在
       本次范围" — a helper-file move is in the same bucket. The
      `upstream_http_err` helper lives only in upstream.rs because
      the reqwest::Error→status extraction is only relevant for
      the upstream HTTP call surface; the login module does not
      call `error_for_status()` anywhere. A future refactor
      milestone could promote these to a shared `ilink` submodule.
