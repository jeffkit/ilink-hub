# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M4:
#   1. Add `UpstreamHttp { status, msg }` and `UpstreamParse(String)` to
#      `HubError` so callers can distinguish HTTP failures (with status
#      code) from JSON parse failures. Keep `Upstream(String)` as a
#      catch-all for everything else.
#   2. Migrate at least 3 call sites in the iLink upstream HTTP surface
#      from "construct a string, wrap in anyhow::anyhow!" to "construct
#      the specific HubError variant, wrap in anyhow::Error::new(...)".
#   3. Update the existing `From<anyhow::Error> for HubError` impl in
#      error.rs to downcast the specific HubError variants back out
#      of the anyhow round-trip, so downstream consumers that pattern-
#      match on HubError still see UpstreamHttp / UpstreamParse after
#      propagation.
#
# The pre-m4 state of error.rs already had `UpstreamHttp { code, msg }`
# and `UpstreamParse(String)` declared but they were dead code — no
# constructor anywhere in src/. M4 is what brings them alive: the
# constructors live in ilink/upstream.rs and ilink/login.rs, and the
# downcast chain in `From<anyhow::Error> for HubError` is what makes
# them observable at the HubError consumer boundary.

# ─── Source-of-truth changes ────────────────────────────────────────────────
source_changes:
  - file: src/error.rs
    symbols:
      - "HubError::UpstreamHttp (field renamed code → status)"
      - "From<anyhow::Error> for HubError (added HubError downcast)"
      - "tests::upstream_http_display_includes_status_and_msg"
      - "tests::upstream_parse_display_includes_message"
      - "tests::from_anyhow_preserves_upstream_http_via_downcast"
      - "tests::from_anyhow_preserves_upstream_parse_via_downcast"
      - "tests::from_anyhow_collapses_other_errors_to_upstream_string"
      - "tests::upstream_http_status_zero_is_legal_for_pre_send_failures"
    change_summary: >-
      Two changes to error.rs: (1) the pre-existing `UpstreamHttp { code,
      msg }` field was renamed to `status` to match plan.md N-06's exact
      field name (plan §M4 / prompt.md both say `status: u16`); the
      `#[error("...{code}...")]` Display formatter was updated to use
      `{status}` so the format string and the field name stay aligned.
      (2) The `From<anyhow::Error> for HubError` impl gained an outer
      `match e.downcast::<HubError>()` step that runs before the existing
      sqlx::Error downcast. When an upstream call site constructs
      `HubError::UpstreamHttp { ... }` or `HubError::UpstreamParse(...)`
      and wraps it in `anyhow::Error::new(...)`, the `?` chain
      propagates that anyhow::Error back to a HubError consumer where
      the new downcast step recovers the specific variant. A `match`
      is used (not `if let Ok(...).downcast()`) because anyhow's
      `downcast()` consumes `self`; the Err branch of the outer match
      rebinds the returned `e` and feeds it to the existing sqlx::Error
      fallback chain, which itself is followed by the legacy
      `HubError::Upstream(e.to_string())` collapse for plain anyhow
      errors. Six new unit tests in `mod tests` pin the load-bearing
      invariants: Display rendering for both new variants, the round-
      trip recovery via `From<anyhow::Error>`, the regression guard
      that non-HubError anyhow errors still collapse to
      `Upstream(string)`, and the `status: 0` edge case for transport-
      level reqwest failures where `e.status()` returns None.
  - file: src/ilink/upstream.rs
    symbols:
      - "fn upstream_http_err (NEW helper)"
      - "fn upstream_parse_err (NEW helper)"
      - "UpstreamClient::notify_start (2 migration points: .send() and .error_for_status())"
      - "UpstreamClient::get_updates (2 migration points: .send() and .json::<T>())"
      - "UpstreamClient::send_message (2 migration points: .send() and .text())"
      - "UpstreamClient::send_typing (2 migration points: .send() and .error_for_status())"
      - "UpstreamClient::get_config (2 migration points: .send() and .json::<T>())"
      - "UpstreamClient::get_upload_url (2 migration points: .send() and .json::<T>())"
    change_summary: >-
      Two new free functions wrap the conversion to anyhow::Error:
      `upstream_http_err(reqwest::Error) -> anyhow::Error` extracts the
      HTTP status code (0 if the error is transport-level and has no
      status), constructs a `HubError::UpstreamHttp { status, msg }`,
      and wraps it in `anyhow::Error::new(...)`. `upstream_parse_err(
      impl Display) -> anyhow::Error` does the same for
      `HubError::UpstreamParse(String)`. Each call site replaces `?`
      with `.map_err(upstream_http_err)?` or `.map_err(
      upstream_parse_err)?` — this is a 1-token change per site, but
      the type of the propagated error is now the specific HubError
      variant, recoverable downstream. The function signatures
      (`anyhow::Result<T>`) and the `UpstreamSink` trait are
      unchanged, so no caller in hub/commands.rs, hub/dispatch.rs, or
      server/routes.rs needed to be touched: they all consume the
      error via `error!(error = %e, ...)` or
      `format!("upstream error: {e}")`, both of which go through
      `Display` and work identically with `anyhow::Error::new(HubError
      ::UpstreamHttp { ... })` and a plain `anyhow::Error`.
  - file: src/ilink/login.rs
    symbols:
      - "fn upstream_parse_err (NEW helper, login-local)"
      - "LoginClient::get_qrcode (1 migration point: .json::<GetQrcodeResponse>())"
    change_summary: >-
      One migration point: the `.json::<GetQrcodeResponse>().await?`
      step in `get_qrcode()` (which decodes the QR-code generation
      response from the iLink server) is now
      `.map_err(upstream_parse_err)?`. The other JSON parse site
      (`poll_qrcode_status`'s `r.json::<QrcodeStatusResponse>()`) is
      intentionally NOT migrated — it sits inside a retry loop where
      parse errors are logged via `warn!` and the loop continues; the
      error never escapes the function, so tagging it with
      `UpstreamParse` would be dead-tag (no consumer could observe
      it). The login-local `upstream_parse_err` helper is a 4-line
      clone of the upstream.rs helper because pulling a single helper
      up to `crate::ilink::error_helpers` (or similar) crosses into
      refactor scope that plan §M4 explicitly excludes ("全量迁移不
      在本次范围" — and the helper file move is in the same bucket).

