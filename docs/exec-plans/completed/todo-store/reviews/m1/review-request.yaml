# ─── Scope of this checkpoint ──────────────────────────────────────────────
# 1. Update routing_state when upsert_client detects a vtoken change to resolve SYNC-02.
# 2. Rewrite row value IN queries to compatible OR queries in get_hub_ext_batch for DB-03.
# 3. Slice transaction updates into chunks of 50 in persist_context_tokens_batch for DB-02.

# ─── Source-of-truth changes for SYNC-02, DB-03, DB-02 ──────────────────────
source_changes:
  - file: src/store/mod.rs
    symbols:
      - "Store::upsert_client"
      - "Store::get_hub_ext_batch"
      - "Store::persist_context_tokens_batch"
      - "store_tests::test_sync_02_upsert_client_updates_routing_state"
      - "store_tests::test_db_03_get_hub_ext_batch_query"
      - "store_tests::test_db_02_persist_context_tokens_batch_large"
    change_summary: >-
      Updated `upsert_client` to select the old vtoken and update any referencing rows in `routing_state` within the same transaction.
      Modified `get_hub_ext_batch` to use equivalent `OR` clauses instead of tuple `IN` syntax for wide MySQL 5.7+ compatibility.
      Added chunking logic to `persist_context_tokens_batch` to commit entries in groups of 50 to avoid holding database locks too long.
      Added unit tests verifying each corresponding behavior fix.

