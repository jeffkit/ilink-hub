# ─── Behavioural diff vs. baseline (61938ba) ───────────────────────────────
behavioural_diff:
  - area: "Client re-registration"
    before: >-
      Clients re-registering under same name but with new vtoken would leave routing_state referencing the stale vtoken.
    after: >-
      routing_state is dynamically updated to the new vtoken.
    security_classification: "Bugfix ensuring message routing continuity across client restarts."
  - area: "MySQL compatibility"
    before: >-
      MySQL 5.7 would fail when parsing the tuple IN clause, leading to broadcast failures.
    after: >-
      OR clauses are used, working seamlessly across MySQL 5.7+ and SQLite/PostgreSQL.
    security_classification: "Compatibility enhancement."
  - area: "Transaction lock duration"
    before: >-
      Transactions held the database write lock for all context tokens sequentially, potentially causing lock timeouts during large broadcasts.
    after: >-
      Transactions commit every 50 records, freeing the lock for other concurrent write queries.
    security_classification: "Robustness and lock timeout prevention under load."

