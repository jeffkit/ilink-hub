  - id: SEC-ADV-M3-11
    severity: LOW
    category: owasp_input_validation
    title: "save_message 未对 role/content 进行长度或内容校验"
    file: src/store/mod.rs
    lines: [1516, 1538]
    description: >-
      `save_message` 将 `role` 和 `content` 直接写入数据库，无长度限制或内容校验。
      `role` 预期为 `user` 或 `assistant`，但接受任意字符串。虽然参数化查询防止了
      SQL 注入，但恶意调用方可能插入超大数据行（导致 DB 膨胀）或垃圾 role 值
      （导致 `find_assistant_message_by_content` 查询逻辑失效）。
    impact: >-
      低。`save_message` 的调用方目前是内部 Hub 路径（消息转发和广播），不受
      外部直接输入影响。但内部代码若传入超大内容，可能影响性能。
    recommendation: >-
      可添加 `role` 的白名单校验（`user` / `assistant`），以及 `content` 的长度
      上限检查（如 64KB）。

# ─── Positive findings (confirmed secure patterns) ──────────────────────────

positive_findings:
  - id: POS-M3-01
    title: "WAL + busy_timeout 通过 after_connect 显式配置"
    description: >-
      SQLite 连接池在 after_connect 中显式设置 `PRAGMA journal_mode=WAL` 和
      `PRAGMA busy_timeout=5000`，通过 `adversarial_sqlite_connect_configures_wal_and_busy_timeout`
      测试验证。WAL 模式提高了崩溃安全性和写吞吐量，busy_timeout(5s) 在多写入者
      场景下提供了合理的重试窗口。

  - id: POS-M3-02
    title: "MySQL INSERT IGNORE 有防御性二次检查"
    description: >-
      MySQL 的 `try_claim_migration` 在 `INSERT IGNORE` 返回 `rows_affected() == 0`
      后，执行了防御性 `SELECT 1` 以区分「行已存在」和「INSERT IGNORE 静默抑制了
      非重复键错误」。若 SELECT 未找到行，则返回 `Err` 而非 `Ok(false)`，避免
      静默丢失迁移版本。

  - id: POS-M3-03
    title: "并发 Store::connect 测试使用 tokio::join! / spawn + join_all 实现真正并发"
    description: >-
      `adversarial_concurrent_store_connect_succeeds_and_converges` 和
      `adversarial_many_concurrent_connects_converge` 测试使用 `tokio::join!` /
      `tokio::spawn` 实现真正并发，而旧的顺序执行无法触发竞态条件。
      这确保了迁移引擎在并发场景下正确工作。

  - id: POS-M3-04
    title: "migrate_to_v4_tx 的 column_exists 内联查询避免死锁"
    description: >-
      v4 ALTER TABLE 的列存在性预检在 `migrate_to_v4_tx` 中内联到同一事务连接上，
      而非调用 `self.column_exists`（后者会 `pool.acquire()` 获取第二个连接）。
      由于 SQLite 使用 `max_connections(1)`，第二个 `acquire()` 会在
      `busy_timeout` 后超时并被 `unwrap_or(None)` 静默处理，导致 ALTER TABLE
      重复执行。内联查询修复了此死锁（F-M3-04）。

  - id: POS-M3-05
    title: "try_claim_migration 在事务中正确实现原子性"
    description: >-
      `try_claim_migration_in_tx` 是加载到事务上的原子 check-and-claim 原语。
      在 SQLite 上，事务持有文件级写锁（`BEGIN IMMEDIATE`），在 Postgres 上通过
      MVCC 串行化。测试 `adversarial_try_claim_in_tx_is_mutually_exclusive` 验证了
      两个并发事务中恰好只有一个能认领成功。

