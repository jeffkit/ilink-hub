  - id: SEC-ADV-M3-08
    severity: LOW
    category: owasp_logging
    title: "DDL 错误消息可能暴露数据库结构信息"
    file: src/store/mod.rs
    lines: [390, 433, 490, 521, 564, 601, 918]
    description: >-
      多个 `migrate_to_vN_tx` 方法中的 DDL 错误消息包含完整的 SQL 语句文本。
      虽然这些是静态迁移 DDL（不包含用户数据），但错误消息会被 tracing 记录，
