findings:

  - id: SEC-ADV-M3-01
    severity: LOW
    category: owasp_injection
    title: "column_exists 非事务路径中的字符串插值（死代码，有 is_safe_identifier 防护）"
    file: src/store/mod.rs
    lines: [888, 889, 893]
    description: >-
      `column_exists`（`#[allow(dead_code)]`，仅用于非事务 `migrate_to_v4` 测试路径）
      在 SQLite 分支通过 `format!` 拼接 `table`/`column` 标识符到 `pragma_table_info`
      查询中。虽然调用了 `is_safe_identifier` 进行验证（仅允许 `[a-zA-Z0-9_]`），但如果
      未来重构移除了该检查，此处的字符串插值将构成 SQL 注入向量。生产路径
      `migrate_to_v4_tx` 已将查询内联并使用参数化形式，不涉及此问题。
    impact: >-
      当前无实际风险（死代码 + is_safe_identifier 防护）。未来若有人移除
      `#[allow(dead_code)]` 并在此处复用生产调用，但遗漏了 is_safe_identifier
      检查，则可能被利用。
    recommendation: >-
      考虑在 `column_exists` 的 SQLite 分支上也使用参数化查询（sqlx 的 `bind`），
      或移除该死代码方法，只保留事务版本。

  - id: SEC-ADV-M3-02
    severity: LOW
    category: tokio_async
    title: "column_exists SQLite 路径的 .unwrap_or(None) 吞没所有错误"
    file: src/store/mod.rs
    lines: [893]
    description: >-
      非事务 `column_exists`（死代码）的 SQLite 路径对 `fetch_optional` 结果调用
      `.unwrap_or(None)`，这意味着连接池耗尽、连接断开、pragma 语法错误等所有运行时
      错误都会被静默抹除为 `Ok(false)`（「列不存在」）。调用方随后执行 `ALTER TABLE
      ADD COLUMN`，可能在列已存在但因连接错误而未能检测到的情况下失败。
    impact: >-
      死代码，仅用于测试路径。生产路径 `migrate_to_v4_tx` 使用 `?` 传播错误，
      不涉及此问题。
    recommendation: >-
      在注释中已有说明。如果该方法将来重新启用，应改为 `?` 传播或至少记录错误日志。

  - id: SEC-ADV-M3-03
    severity: INFO
    category: tokio_async
    title: "迁移中的 claim-then-DDL 模式在取消时留下孤儿行"
    file: src/store/mod.rs
    lines: [332, 359, 363]
    description: >-
      `try_claim_migration` / `try_claim_migration_in_tx` 在 DDL 执行之前写入
      `schema_version` 行。如果持有连接的 future 在 claim 写入之后、DDL 执行之前被
      取消（例如 tokio `select!` 超时或进程崩溃），则版本行存在但 DDL 未被应用。
    impact: >-
      这是已知设计权衡（F-M3-03，已推迟）。恢复步骤在 `run_migrations` 文档注释中
      有说明（删除版本行，重启）。进程崩溃的风险远高于 tokio 取消（tokio 不会自动
      取消随机 future），因此实际风险低。
    recommendation: >-
      接受当前设计。已在 `run_migrations` 文档注释中记录恢复步骤。

  - id: SEC-ADV-M3-04
    severity: LOW
    category: owasp_input_validation
    title: "get_hub_ext_batch 对输入 pairs 数量无上限限制"
    file: src/store/mod.rs
    lines: [1173, 1256]
    description: >-
      `get_hub_ext_batch` 接收 `&[(String, String)]` 并为每个 pair 生成 OR 条件。
      没有对 pairs 数量设置上限。如果传入极大量 pairs（例如 10000+），生成的 SQL
      字符串可能超出 SQLite 的 `SQLITE_MAX_SQL_LENGTH`（默认 1,000,000,000 字节）
      或达到表达式深度限制（`SQLITE_MAX_EXPR_DEPTH`，默认 1000）。
    impact: >-
      当前所有调用方都是内部广播/扇出路径，使用受控的 token 集合，不受外部输入
      直接影响。但若未来通过外部 API 暴露此方法，将成为 DoS 向量。
    recommendation: >-
      添加 `const MAX_BATCH_PAIRS: usize = 500` 并提前返回错误，或在函数文档中
      标注调用方责任。

  - id: SEC-ADV-M3-05
    severity: LOW
    category: owasp_input_validation
    title: "persist_context_tokens_batch 对条目数无上限"
    file: src/store/mod.rs
    lines: [1352, 1378]
    description: >-
      `persist_context_tokens_batch` 在单个事务中循环写入所有条目，没有条目数上限。
      如果传入大量条目，将持有写事务很长时间，阻塞同一连接上的所有读写操作。
    impact: >-
      与 SEC-ADV-M3-04 类似——当前调用方均在内部广播路径上，使用受控的 token 集合。
      若未来暴露为外部 API，可能被用于 DoS。
    recommendation: >-
      可考虑分批提交（每 N 个条目提交一次），或添加上限检查。

  - id: SEC-ADV-M3-06
    severity: INFO
    category: data_race
    title: "ensure_sqlite_file 的 TOCTOU 窗口与并发安全性已验证通过"
    file: src/store/mod.rs
    lines: [127, 165]
    description: >-
      `ensure_sqlite_file` 使用 `create_new(true)` 替代 `File::create`，并通过
      `AlreadyExists` 错误处理来安全应对 exists-check 与 create 之间的竞态条件。
      这是正确实现。`adversarial_ensure_sqlite_file_concurrent_threads_safe` 测试
      通过 16 个 OS 线程并发锤击验证了此行为。`spawn_blocking` 确保文件系统操作
      不在 tokio 工作线程上阻塞。
    impact: >-
      无。当前实现对并发安全是正确的。
    recommendation: >-
      无需更改。

