  - id: SEC-ADV-M3-09
    severity: INFO
    category: tokio_async
    title: "after_connect 回调使用 Box::pin 正确实现"
    file: src/store/mod.rs
    lines: [102, 108]
    description: >-
      SQLite 连接的 `after_connect` 回调使用 `Box::pin(async move { ... })` 返回
