  - id: SEC-ADV-M3-10
    severity: INFO
    category: owasp_authentication
    title: "token 脱敏函数正确处理了 Unicode 边界"
    file: src/lib.rs
    lines: [22, 25]
    description: >-
      `redact_token` 使用 `t.chars().take(8)` 而非 `&t[..8]` 来截取 token 前缀，
      避免了在 UTF-8 多字节字符中间切割导致的 panic。测试覆盖了多字节 Unicode 场景。
