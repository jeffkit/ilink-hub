# ─── Review findings resolution ────────────────────────────────────────────
findings_resolution:
  - finding: F-M1-01 / F-M1-04
    title: "run_migrations 跨版本竞态窗口"
    status: RESOLVED
    fix_commits: ["1c86adc", "21ff66e"]
    resolution: >-
      run_migrations holds a single connection for the entire migration
      process. Each migrator uses try_claim_migration_in_tx for atomic
      check-and-claim within a single transaction. Verified by
      adversarial_concurrent_store_connect_succeeds_and_converges and
      adversarial_many_concurrent_connects_converge.

  - finding: F-M1-02
    title: "v4 ALTER TABLE ADD COLUMN 使用错误字符串匹配"
    status: RESOLVED
    fix_commits: ["21ff66e"]
    resolution: >-
      v4 column_exists uses per-driver catalog queries (PRAGMA table_info for
      SQLite, information_schema.columns for Postgres, SHOW COLUMNS for MySQL)
      instead of matching error string "duplicate column name". Verified by
      adversarial_v4_skips_alter_when_column_already_present.

  - finding: F-M3-01
    title: "MySQL 兼容性完全缺失"
    status: RESOLVED
    fix_commits: ["21ff66e", "1c86adc"]
    resolution: >-
      DatabaseKind::from_url() parses URL scheme directly (sqlite:/postgres:/mysql:).
      v5 DDL uses per-driver id clause. column_exists uses per-driver catalog
      queries. try_claim_migration uses per-driver SQL (ON CONFLICT for
      Postgres/SQLite, INSERT IGNORE for MySQL).

  - finding: F-M3-02
    title: "并发 Store::connect 测试缺陷"
    status: RESOLVED
    fix_commits: ["1c86adc"]
    resolution: >-
      Concurrent connect tests use tokio::spawn + tokio::join! for true
      concurrent execution. adversarial_many_concurrent_connects_converge
      includes retry loop for SQLITE_BUSY.

  - finding: F-M3-04
    title: "column_exists 死锁 (max_connections(1))"
    status: RESOLVED
    fix_commits: ["21ff66e"]
    resolution: >-
      migrate_to_v4_tx performs column existence check inline on the
      transaction connection rather than calling self.column_exists (which
      would pool.acquire() a second connection, causing deadlock under
      max_connections(1)).

  - finding: M3 adversarial review (SEC-ADV-M3-01..11)
    title: "M3 对抗性安全审查 — 11 个发现，全部 LOW/INFO"
    status: ACCEPTED
    resolution: >-
      All 11 findings are LOW severity or INFO level. No CRITICAL, HIGH,
      or MEDIUM findings. No blocking issues. Verdict: PASS.

