    title: "并发 Store::connect 测试设计严密"
    description: >-
      测试中通过 `tokio::join!`、多线程 runtime 以及多任务并发锤击，能够非常逼真地复现 SQLite `SQLITE_BUSY` 和
      并发连接竞争的场景，从而强力验证了 `try_claim_migration` 的隔离效果。

