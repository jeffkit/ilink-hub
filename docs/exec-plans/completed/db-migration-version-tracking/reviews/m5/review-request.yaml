# ─── M5 任务完成状态 ──────────────────────────────────────────────────────────
tasks:
  - id: B-01
    title: "DB 超时 — SQLite busy_timeout 保持默认 5s"
    status: RESOLVED
    resolution: >-
      保持 SQLite 默认 busy_timeout 5s，关机时迁移 runner 的 acquire
      仍有机会排空。已验证 file_sqlite_serializes_concurrent_read_and_write_without_busy。

  - id: SEC-002
    title: "is_safe_identifier 校验 pragma_table_info 拼接"
    status: RESOLVED
    resolution: >-
      column_exists 在拼接 PRAGMA table_info 查询前调用 is_safe_identifier
      校验表名和列名，防止 SQL 注入。已验证 adversarial_column_exists_uses_pragma_on_sqlite。

  - id: SEC-011
    title: "Store::connect 确保 install_default_drivers()"
    status: RESOLVED
    resolution: >-
      Store::connect 在创建连接池之前调用 sqlx::any::install_default_drivers()，
      确保 SQLite/Postgres/MySQL 驱动已注册。

  - id: TO-03
    title: "spawn_blocking 调用带超时保护"
    status: RESOLVED
    resolution: >-
      ensure_sqlite_file 的 spawn_blocking 调用包装在 tokio::time::timeout(10s) 中，
      防止 spawn_blocking 永久阻塞导致迁移卡死。

