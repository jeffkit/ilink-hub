  - id: get-current-version
    plan_clause: "get_current_version() — 查询当前最高版本（排除并发哨兵行 i32::MAX）"
    observation: "SELECT MAX(version) FROM schema_version WHERE version < i32::MAX，排除哨兵行"
    result: pass
  - id: is-migration-run
    plan_clause: "is_migration_run(version) — 检查特定版本是否已运行"
    observation: "SELECT 1 FROM schema_version WHERE version = $1，返回 bool"
    result: pass
  - id: try-claim-migration
    plan_clause: "try_claim_migration(version) — 原子化 claim（SQLite/Postgres: ON CONFLICT DO NOTHING RETURNING；MySQL: INSERT IGNORE）"
    observation: "驱动感知：SQLite/Postgres 用 ON CONFLICT DO NOTHING RETURNING，MySQL 用 INSERT IGNORE + rows_affected"
    result: pass
  - id: record-migration-run
    plan_clause: "record_migration_run(version) — 幂等记录版本"
    observation: "INSERT ... ON CONFLICT DO NOTHING / INSERT IGNORE，幂等安全"
    result: pass
  - id: try-claim-migration-in-tx
    plan_clause: "try_claim_migration_in_tx(tx, version) — 事务内原子 claim（F-M3-02 修复）"
    observation: "与 try_claim_migration 相同的 SQL，但在事务内执行，claim 行的可见性与事务绑定"
    result: pass

