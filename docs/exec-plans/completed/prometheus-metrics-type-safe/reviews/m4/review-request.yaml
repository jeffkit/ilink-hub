milestone: M4
title: "特殊字符安全验证 — 构造特殊字符 label value 并确认输出合法"
status: ready_for_review
date: "2026-06-17"

summary: |
  M4 重点验证了 Prometheus 指标中 label 值的特殊字符安全性。
  在 `src/metrics.rs` 中新增了 3 个单元测试，分别覆盖了 `\`、`{`、`}` 以及组合特殊字符（`{`, `}`, `\`, `"`, `\n`）。
  测试结果表明，底层的 `prometheus` crate 会自动对特殊字符进行转义（例如 `\` 转义为 `\\`，`"` 转义为 `\"`），
  并且不会因为裸花括号打破 Prometheus 的文本指标格式。

