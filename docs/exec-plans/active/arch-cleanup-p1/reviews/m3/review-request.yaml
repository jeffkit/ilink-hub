# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M3:
#   N-03: column_exists() on the MySQL branch was supposed to use ?
#         placeholders. In practice the F-M3-01 review finding already
#         fixed the placeholder form (Postgres + MySQL share a single
#         information_schema.columns path that binds $1/$2, which is
#         sqlx's portable syntax across all backends). The remaining
#         task is to remove the now-unnecessary #[allow(dead_code)]
#         annotations so clippy continues to flag a real dead-code
#         regression in the test build.
#   N-05: bump rand to 0.9 in Cargo.toml and migrate every
#         `rand::thread_rng()` call site (paths.rs, sse_ticket.rs,
#         pairing.rs) to the new `rand::rng()` form. rand_core stays
#         on 0.6 because ed25519-dalek 2.x pins 0.6 and the test
#         helpers' `use rand_core::OsRng` must resolve to the same
#         major that SigningKey::generate expects.
#   The `rand::rngs::OsRng` re-export in rand 0.9 now points at
#   rand_core 0.9, so the relay/client.rs test that used
#   `rand::rngs::OsRng` was switched to `rand_core::OsRng` to match
#   auth.rs / device.rs and to stay on the 0.6 version ed25519-dalek
#   accepts.

# ─── Source-of-truth changes ────────────────────────────────────────────────
source_changes:
  - file: src/store/migrations.rs
    symbols:
      - "is_safe_identifier (was #[allow(dead_code)], now #[cfg_attr(not(test), allow(dead_code))])"
      - "Store::column_exists (was #[allow(dead_code)], now #[cfg_attr(not(test), allow(dead_code))])"
    change_summary: >-
      Both functions lost their unconditional #[allow(dead_code)] and
      gained #[cfg_attr(not(test), allow(dead_code))] instead. The
      non-test build keeps the warning-clean profile the original
      allow was protecting (the only caller chain lives in
      #[cfg(test)] store_tests); the test build no longer suppresses
      the lint, so a future refactor that drops column_exists's only
      caller (or removes its only call site) is caught by clippy with
      `dead_code: function 'X' is never used`. Plan.md's wording
      "remove #[allow(dead_code)]" was reconciled against the
      #[cfg(test)] split — pure removal would have re-introduced the
      `cargo build -D warnings` failure this annotation exists to
      prevent, because clippy runs on the lib crate where store_tests
      is not visible.
  - file: Cargo.toml
    symbols:
      - "rand = \"0.8\" → rand = \"0.9\""
      - "rand_core stays on 0.6 with explanatory comment"
    change_summary: >-
      rand bumped 0.8 → 0.9. rand_core stayed on 0.6 with a new
      comment block explaining why: ed25519-dalek 2.2.0 pins
      rand_core 0.6 and SigningKey::generate's `R: CryptoRngCore`
      bound is that major's trait; the direct rand_core dep is shared
      with relay/auth.rs + relay/device.rs + relay/client.rs (test
      helper), so resolving it to 0.6 keeps SigningKey::generate
      happy. rand 0.9's transitive rand_core 0.9 is harmless because
      no production code path imports it directly — the rand::rng()
      calls (paths.rs, sse_ticket.rs, pairing.rs) just call
      fill_bytes, which is in rand::RngCore (rand's own re-export).
      The rand::random::<u32>() call in ilink/upstream.rs is
      unchanged — rand 0.9 keeps that free function (gated behind the
      new `thread_rng` feature, enabled by default in `full`).
  - file: src/paths.rs
    symbols:
      - "load_or_create_relay_secret (rand::thread_rng() → rand::rng())"
    change_summary: >-
      `rand::thread_rng()` → `rand::rng()`. The doc-comment line
      that referenced the old name was updated to match. The
      `use rand::RngCore;` import is unchanged because RngCore is
      the trait fill_bytes dispatches through and is re-exported
      by rand 0.9 under the same path. Behaviour identical:
      rand::rng() returns the same OsRng-backed ThreadRng on Linux
      as thread_rng() did under 0.8.
  - file: src/server/sse_ticket.rs
    symbols:
      - "SseTicketStore::issue (rand::thread_rng() → rand::rng())"
    change_summary: >-
      `rand::thread_rng()` → `rand::rng()`. Used inside `issue()`
      to mint a 16-byte hex ticket; same OsRng-backed ThreadRng,
      same entropy, same wire format.
  - file: src/hub/pairing.rs
    symbols:
      - "generate_csrf (rand::thread_rng() → rand::rng())"
    change_summary: >-
      `rand::thread_rng()` → `rand::rng()` in the CSRF-token mint
      helper. Output is 16 bytes hex (32 chars, 128 bits of
      entropy); unchanged contract.
  - file: src/relay/client.rs
    symbols:
      - "tests::test_identity (rand::rngs::OsRng → rand_core::OsRng)"
    change_summary: >-
      The test-only `use rand::rngs::OsRng;` was switched to
      `use rand_core::OsRng;` to align with auth.rs and device.rs.
      The trigger: under rand 0.9, `rand::rngs::OsRng` re-exports
      the rand_core 0.9 OsRng, but SigningKey::generate expects
      rand_core 0.6's CryptoRngCore trait. Using the direct
      rand_core dep (which is 0.6) keeps the test on the version
      ed25519-dalek accepts. Behaviour identical at the test level.

