# ─── Behavioural diff vs. baseline ─────────────────────────────────────────
behavioural_diff:
  - area: "column_exists / is_safe_identifier dead_code attribute (store/migrations.rs)"
    before: >-
      Both functions were annotated `#[allow(dead_code)]`,
      which suppressed the dead-code lint in every build
      profile (test and non-test alike). The only callers
      live in #[cfg(test)] modules, so the annotation was
      load-bearing for `cargo build` and `cargo clippy
      -- -D warnings` to remain warning-clean.
    after: >-
      Both functions now use
      `#[cfg_attr(not(test), allow(dead_code))]`. The
      production build (cargo build, cargo clippy without
      --tests) still sees the allow and stays clean. The
      test build (cargo test --lib) does NOT see the allow,
      so a future refactor that removes the last call site
      inside store_tests is caught by clippy with a
      `dead_code` error. No runtime behaviour change.
    security_classification: >-
      No new attack surface. The annotation is a lint
      suppressor; swapping which build profile sees it
      has zero observable runtime effect.
  - area: "rand 0.8 → 0.9 bump (Cargo.toml)"
    before: >-
      Project pinned rand 0.8 and rand_core 0.6. `rand::thread_rng()`
      was the canonical local-RNG entry point and was used in
      three production hot paths (relay secret, SSE ticket,
      CSRF). `rand::rngs::OsRng` was the rand 0.8 re-export
      of rand_core 0.6's OsRng.
    after: >-
      Project pins rand 0.9 and rand_core 0.6. The three
      `rand::thread_rng()` call sites are now `rand::rng()`,
      which returns the same OsRng-backed ThreadRng. The
      `rand::rngs::OsRng` re-export is NOT used anywhere —
      relay/client.rs switched to `rand_core::OsRng` so the
      test helper keeps using the rand_core 0.6 OsRng that
      ed25519-dalek accepts. Output bytes are identical
      (same OsRng source, same ThreadRng wrapper, same
      fill_bytes semantics).
    security_classification: >-
      No new attack surface. The rand upgrade is a
      dependency-only change; the underlying OS entropy
      source (getrandom(2) via OsRng) is unchanged. The
      three production paths (relay secret, SSE ticket,
      CSRF) emit the same bytes as before. rand 0.9's
      RngCore trait is semantically identical to 0.8's
      for the methods we use (fill_bytes). The CSPRNG
      properties (uniformity, unpredictability) are
      unchanged because both versions ultimately call
      getrandom on Linux / BCryptGenRandom on Windows.
  - area: "rand_core major-version coexistence"
    before: >-
      Only rand_core 0.6 was in the dependency tree. All
      OsRng callers resolved to the 0.6 type.
    after: >-
      Two rand_core majors coexist: 0.6 (direct dep,
      used by relay/auth.rs + relay/device.rs +
      relay/client.rs test helper + ed25519-dalek) and
      0.9 (transitive via rand 0.9). Production code
      only ever resolves to 0.6, so there is no cross-
      major mixing at runtime. The version skew is
      isolated to the ed25519-dalek crate boundary.
    security_classification: >-
      No new attack surface. Two rand_core majors in the
      dependency graph is a normal Cargo outcome when a
      crate pins an older version and another pulls the
      newer version transitively. The two OsRng types
      both call the same OS entropy source (getrandom);
      using one or the other is interchangeable for
      cryptographic purposes as long as the caller does
      not require compatibility with a specific major's
      trait (which ed25519-dalek does, hence the version
      pinning).

