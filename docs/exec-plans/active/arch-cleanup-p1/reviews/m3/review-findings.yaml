# ─── Security & concurrency verdict ────────────────────────────────────────
security_concurrency_verdict:
  memory_safety:
    - "No unsafe introduced. rand::rng() and rand_core::OsRng are both safe APIs."
    - "fill_bytes writes to a stack-allocated [u8; N] buffer in all three call sites (paths.rs:180, sse_ticket.rs:46, pairing.rs:242). No out-of-bounds risk."
    - "The m3 diff contains no pointer arithmetic, no lifetime changes, no new Send/Sync impls."
  data_race:
    - "rand::rng() returns !Send ThreadRng. All three call sites use it inline in a non-shared, single-task context (function-local, blocking code path on a sync mutex, or a request handler). No cross-task sharing — no data race introduction."
    - "rand_core::OsRng is Sync (backed by getrandom 0.2's read syscall, which is thread-safe at the kernel level). The test helpers use it via &mut OsRng in single-threaded test bodies — no aliasing."
  tokio_async_pitfalls:
    - "rand::rng() is a blocking call. All three call sites are in synchronous code paths (SSE ticket issue is inside std::sync::Mutex lock; relay secret load is on the startup path; CSRF generation is in the pairing handler's blocking section). None of them sit in the middle of an awaited future or a tokio::spawn — no need for spawn_blocking."
    - "The M1 dispatcher's std::sync::Mutex is not touched by M3. The m3 changes do not introduce a new async-vs-sync mismatch."
  owasp:
    - "SQL injection: column_exists's is_safe_identifier gate (migrations.rs:575) is preserved. The SQLite branch (lines 580-588) still uses string interpolation for table_name/column, but the gate ensures only `[A-Za-z0-9_]+` reaches the format! — verified by store_tests.rs:1531."
    - "CSPRNG: rand 0.9 preserves OsRng backing. fill_bytes is the same dispatch path. No downgrade."
    - "Cryptographic key handling: ed25519-dalek's SigningKey::generate still uses rand_core 0.6's OsRng via the rand_core::OsRng alias in the test helper. The device.rs:51 production path was already on rand_core::OsRng and is unchanged."
    - "Sensitive data lifetime: relay secret (paths.rs) is written to a 0600-mode file with best-effort persist. The in-memory lifetime is bounded by process — no long-lived key material crosses a thread boundary via m3."
    - "No new HTTP/WS/protobuf surface; no input parsing changes; no path traversal changes; no authn/authz changes."
  rand_0_9_specific:
    - "rand 0.9 removed the `gen()` method on Rng in favor of `random()` (free function) or the RngExt trait. None of the m3 call sites used `.gen()`. No .gen() → .random() migration work was needed."
    - "rand 0.9 renamed Rng to RngExt (RngCore was kept). The m3 sites all use `use rand::RngCore;` (preserved from 0.8) and call `.fill_bytes()` on the RngCore trait — no rename needed."
    - "rand 0.9's `random()` was removed from the prelude. The ilink/upstream.rs:141 site calls it as `rand::random::<u32>()` (fully qualified), so the prelude removal does not affect it."

# ─── Overall verdict ───────────────────────────────────────────────────────
verdict: PASS
verdict_rationale: >-
  M3 is a low-risk, well-scoped change: a dead_code annotation swap
  (cfg_attr form, correctly preserves the test build's clippy coverage)
  plus a partial rand major bump (0.8 → 0.9, with rand_core 0.6 pinned
  for ed25519-dalek). All three call sites migrate cleanly because
  rand::rng() is a rename of rand::thread_rng() in 0.9. The test helper
  in relay/client.rs correctly switches to rand_core::OsRng to stay on
  the rand_core 0.6 trait surface that ed25519-dalek expects. No memory
  safety, data race, tokio async pitfall, or OWASP-relevant regression
  is introduced. The rand_core 0.6/0.9 and rand 0.8/0.9 coexistence is
  documented in Cargo.toml and is the canonical cargo outcome of a
  partial major bump — recorded as F-M3-I1 / F-M3-I5 for future
  cleanup when ed25519-dalek 3.x lands.
