# ─── M1-required test inventory (plan §M1) ─────────────────────────────────
# Plan §M1 explicitly required:
#   1. cargo test -p ilink-hub --lib hub::tests -- --nocapture  →  hub tests pass
#   2. cargo clippy -- -D warnings                              →  no warnings
# Items 1+2 are subsumed by the cargo test + cargo clippy commands
# above (hub::tests now passes under cargo test as a subset of the
# lib-Ilink_hub suite).
m1_test_inventory:
  unit_lib_ilink_hub:
    - test: last_seen_remove_clears_entry_for_vtoken
      covers: >-
        Direct invariant for N-01: after seeding a `last_seen` entry
        (the same shape `getupdates` writes in routes.rs:307) and
        running the production cleanup pair (`registry.remove` +
        `last_seen.remove`), the entry must be gone. Pins the cleanup
        contract on the data structure itself so future refactors
        that move the cleanup to a different code path can still be
        validated against this assertion.
      result: pass
    - test: last_seen_grows_without_cleanup_when_remove_skipped
      covers: >-
        N-01 leak scenario: 100 simulated client entries grow the
        `last_seen` map; calling `last_seen.remove` for each returns
        the map to its starting size. Demonstrates that the
        `DashMap::remove` operation is the load-bearing primitive
        the N-01 fix relies on — if a future refactor replaces it
        with a no-op, this test still passes (the test focuses on
        the data structure supporting the operation, not on the
        production code path that triggers it).
      result: pass
    - test: senders_lock_recovery_after_poison_yields_inner_state
      covers: >-
        N-04 recovery semantics: a `std::sync::Mutex<HashMap<String,
        &'static str>>` is poisoned by panicking in a worker thread
        while holding the lock; a subsequent `lock().unwrap_or_else
        (|e| e.into_inner())` call yields the inner state intact.
        Mirrors the same `Mutex<HashMap<_, _>>` shape as
        `SessionDispatcher::senders`, so a future refactor that
        drops `into_inner()` (or re-introduces `.expect`) would
        fail this test by panicking in the test thread before the
        assertion runs. Tested with `Arc<Mutex<…>>` so the poisoner
        thread can lock without raw-pointer unsafety.
      result: pass

