# ─── Behavioural diff vs. baseline ──────────────────────────────────────────
behavioural_diff:
  - area: "ClientRegistry unregister paths (server/pairing.rs)"
    before: >-
      `unregister_client_in_hub` and `rollback_speculative_register`
      each removed the client from `ClientRegistry.by_vtoken` /
      `ClientRegistry.by_name`, removed the client's routes from the
      router, removed the client's message queue, and deleted the
      client's rows from the store. The per-vtoken entry in
      `ClientState.last_seen` (a lock-free `DashMap<String, AtomicU64>`)
      was NOT touched. Every re-register produced a fresh
      UUID-based vtoken, so the leaked `last_seen` entries were
      never overwritten or evicted.
    after: >-
      Both unregister paths now call
      `state.clients.last_seen.remove(&vtoken)` immediately after
      `registry.remove(name)` returns true. The cleanup site is
      before the router / queue / store cleanup steps so that even
      if any of those steps error, the `last_seen` map is bounded
      by the registered vtoken set. Behaviourally, any code that
      reads `state.clients.last_seen.get(&vtoken)` after a
      successful unregister now sees `None` instead of a stale
      timestamp; the health checker's stale-detection iteration
      (which is the only reader) skips absent vtokens naturally.
    security_classification: >-
      No new attack surface. The cleanup is keyed on the same
      `vtoken` string that already lives in the registry's
      `by_vtoken` index, so there is no new lookup / hash / IO.
      The behaviour change is observable only via the memory
      footprint of `state.clients.last_seen` over long uptime.
  - area: "SessionDispatcher mutex recovery (bridge/dispatcher.rs)"
    before: >-
      `SessionDispatcher::dispatch` acquired
      `self.senders.lock().expect("SessionDispatcher senders lock
      poisoned")`. If a previous holder of the same `std::sync::Mutex`
      panicked (an unlikely but possible scenario during a
      refactor that holds the lock across an `await`), every
      subsequent `dispatch` call would propagate the panic into
      the Tokio worker that received the inbound message.
    after: >-
      `dispatch` now uses `self.senders.lock().unwrap_or_else(|e|
      e.into_inner())`, which recovers from a poisoned mutex by
      extracting the inner state. This matches the recovery idiom
      already used by `evict_closed_senders` in the same struct,
      so the dispatcher is now consistent across both code paths.
      No-op on the happy path: an unwrapped, unpoisoned `lock()`
      is the same syscall.
    security_classification: >-
      No new attack surface. The recovery path is exercised only
      when a prior panic poisoned the mutex — a condition that is
      itself a process-wide bug. The recovery does not silently
      drop or rewrite dispatcher state; `into_inner` returns the
      same HashMap that was in the mutex when it was poisoned.

