# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M1: two narrow reliability fixes:
#   N-01: `last_seen` DashMap grew without bound because every unregister
#         path (admin-delete, speculative-rollback) removed the registry
#         entry but never removed the per-vtoken last-seen timestamp.
#         Re-register gets a fresh UUID-based vtoken, so the old key is
#         never overwritten — pure leak.
#   N-04: `SessionDispatcher::dispatch()` used `senders.lock().expect(...)`
#         which panics the Tokio worker if any prior holder of the same
#         lock panicked. Inconsistent with `evict_closed_senders` (which
#         uses `if let Ok(...)`).
#
# This change adds the missing cleanup call on both unregister paths and
# switches the dispatcher's lock call to the same poison-recovery idiom
# already used elsewhere in the file.

# ─── Source-of-truth changes ────────────────────────────────────────────────
source_changes:
  - file: src/server/pairing.rs
    symbols:
      - "unregister_client_in_hub (registry.remove + last_seen.remove)"
      - "rollback_speculative_register (registry.remove + last_seen.remove)"
    change_summary: >-
      Two unregister paths now both call `state.clients.last_seen.remove(&vtoken)`
      immediately after `registry.remove(name)` returns true. The
      `vtoken` is the same `ClientInfo.vtoken` that `registry.remove`
      already extracted from the by_name→by_vtoken index, so no extra
      hash pass is needed (plan.md's `vtoken_hash` wording is a
      doc-vs-code mismatch — last_seen's key in state.rs:428 is the
      vtoken string itself, not a hash; routes.rs:307 writes under
      the same key, so the cleanup must match). Both call sites sit
      between `pick_default_after_remove` and `queue.remove_client`,
      so even if downstream cleanup fails (queue/store error), the
      last_seen map still cannot leak past the registered vtoken set.
  - file: src/bridge/dispatcher.rs
    symbols:
      - "SessionDispatcher::dispatch (lock recovery)"
      - "SessionDispatcher::sender_keys (test-only helper, lock recovery)"
    change_summary: >-
      Replaced `self.senders.lock().expect("SessionDispatcher senders
      lock poisoned")` with `self.senders.lock().unwrap_or_else(|e|
      e.into_inner())` in `dispatch`. This matches the recovery idiom
      already used by `evict_closed_senders` and by `PairConfirmRateLimiter`
      elsewhere in the codebase (search for `unwrap_or_else(|e| e.into_inner())`).
      The test-only `sender_keys()` helper (#[cfg(test)]) was updated
      to the same idiom so future poisoning tests do not need to know
      about the historical `.expect` path. The dispatcher's hot path
      cost is unchanged: an unwrapped poison-free `lock()` is the same
      syscall whether or not the recovery closure is compiled in.

