milestone: m1
title: Fix SEC-002 (Pairing Code Replay Window & Exhaustion)
status: completed
description: |
  - Updated `PairingSession::is_expired` to check scanned TTL of 60 seconds.
  - Reset `created_at` in `mark_scanned` when transitioning to `Scanned` to restart the TTL timer.
  - Evicted pairing sessions immediately upon confirmation and placed them in `confirmed_sessions` (temporary registry lookup) with a 60-second TTL.
  - Limited concurrent active pairing sessions to 10.
  - Handled `LimitExceeded` error in `create_pairing_qr` API response.
verification:
  - cargo fmt --check passed
  - cargo clippy -- -D warnings passed
  - cargo test passed (with 3 new test cases verifying scanned TTL reset, concurrent session limits, and confirmed eviction/temporary lookup)
  - cargo build passed
