milestone: m1
verdict: PASS
review_date: "2026-06-12"
reviewer: "Rust Security and Concurrency Expert"
summary: "Adversarial security and concurrency review of milestone m1 identified several high and medium severity vulnerabilities. All critical and high issues (blocking tokio async loop in supervisor, and command injection/RCE via Tauri IPC) have been successfully resolved."
findings:
  - id: SEC-M1-001
    title: "Tokio Async Loop Block in mark_exited_children"
    severity: HIGH
    status: FIXED
    file: "src/bridge/manager.rs"
    line_range: "295-316"
    description: >
      In `mark_exited_children` (src/bridge/manager.rs), the manager iterates over children using a mutable iterator
      and directly awaits `crate::bridge::dry_run_profile(profile, "ping").await`. Since this async operation spawns
      a child process and awaits its execution (with a timeout of up to 10 seconds), this blocks the entire manager's
      reconcile loop synchronously. If multiple children exit, the wait times stack up, freezing the service supervisor,
      preventing shutdown signals and other tasks from progress.
    impact: >
      Denial of Service (DoS) / Task Hang / Heartbeat Failure.
    recommendation: >
      Avoid awaiting time-consuming asynchronous subprocess executions directly inside the sequential `iter_mut()` loop of the children manager.
      Instead, spawn the dry-run command into the background using `tokio::spawn` and communicate the result back via channels,
      or introduce a non-blocking `Probing` state in `ManagedBridgeState`.

  - id: SEC-M1-002
    title: "Prompt/Command Injection and RCE in bridge_test_profile with claude-code"
    severity: HIGH
    status: FIXED
    file: "src/bridge/mod.rs"
    line_range: "888-896"
    description: >
      In `bridge_test_profile` (src-tauri/src/lib.rs), the Tauri command accepts an arbitrary user-controlled `message` parameter,
      which is subsequently passed down to `dry_run_profile`. For profiles of type `claude-code`, the message is forwarded
      directly as arguments: `--dangerously-skip-permissions -p <message>`. Because interactive safety prompt validation is explicitly bypassed
      by the skip-permissions flag, a malicious payload (via XSS or config injection) can execute arbitrary local shell commands or
      manipulate local files under the security context of the user.
    impact: >
      Remote Code Execution (RCE) / Privilege Escalation (OWASP A03:2021-Injection).
    recommendation: >
      For testing/probing purposes, hardcode the test `message` to a safe, static string (e.g. `"ping"` or `"echo 'ping'"`).
      Do not permit arbitrary user inputs to pass directly into agent execution parameters with safety confirmations disabled.

  - id: SEC-M1-003
    title: "Logic Bug and Directory Traversal in cwd Placeholder Replacement"
    severity: MEDIUM
    file: "src/bridge/mod.rs"
    line_range: "835-842"
    description: >
      Both `probe_profile_light` and `dry_run_profile` (src/bridge/mod.rs) attempt to replace `{{MESSAGE}}` in `profile.cwd` (working directory).
      This replacement is a logical error copied from command arguments replacement. If a user-supplied message contains directory traversal
      sequences (such as `../../`), it could manipulate the target working directory or trigger unintended path operations.
    impact: >
      Path Traversal / Logic Bug (OWASP A01:2021-Broken Access Control).
    recommendation: >
      Remove `{{MESSAGE}}` replacement from the `profile.cwd` path resolution logic. Only replace session-related variables and validate
      the target path using `canonicalize` to ensure it is bounded to legitimate workspace boundaries.

  - id: SEC-M1-004
    title: "Brittle CLI Probing in find_in_path_robust Leading to False Positives/Negatives"
    severity: LOW
    file: "src/bridge/mod.rs"
    line_range: "792-825"
    description: >
      `find_in_path_robust` checks if a command exists by inspecting `candidate.is_file()` across path directories, without verifying executable permissions.
      Moreover, desktop Tauri applications often inherit incomplete `PATH` variables. Consequently, `find_in_path_robust` can fail to locate valid CLI commands
      (e.g., node environments managed by nvm/mise/fnm). A probe failure causes the manager to reject starting the subprocess entirely, marking it as restarting,
      or causing the CLI to abort with exit code 1 at startup.
    impact: >
      Application Instability / Faulty Denial of Service.
    recommendation: >
      Use robust crates like `which` for executable lookup. Allow users to provide the absolute executable path directly in the profile config
      rather than forcing implicit automatic path discovery.
