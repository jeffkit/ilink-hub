# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Per plan.md M2.1:
# - ILINK_HUB_ADDR、ILINK_HUB_URL 保留为别名兼容（读取时若主变量未设置则回退）。
# - 涉及文件：
#   - src/main.rs (env 读取与 --addr / --hub-url 默认值)
#   - src/bin/ilink-hub-bridge.rs (env 读取与默认值)

source_changes:
  - file: "src/main.rs"
    description: "Changed --addr and --hub-url env attributes to WEIXIN_BASE_URL. Added helper functions get_addr_default() and get_hub_url_default() to check WEIXIN_BASE_URL first, then fallback to ILINK_HUB_ADDR / ILINK_HUB_URL. Intercepted and parsed the listen addr in Serve command handler to extract host/port if specified as a URL."
  - file: "src/bin/ilink-hub-bridge.rs"
    description: "Added get_hub_url_default() helper to check WEIXIN_BASE_URL first, then fallback to ILINK_HUB_ADDR / ILINK_HUB_URL. Used it as default_value_t for hub_url argument."
  - file: "tests/breaking_changes.rs"
    description: "Added integration tests test_cli_hub_url_env_fallback and test_bridge_hub_url_env_fallback to verify env var priorities and fallback behaviors."

