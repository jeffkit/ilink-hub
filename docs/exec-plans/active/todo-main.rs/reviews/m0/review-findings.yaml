# ─── Findings ────────────────────────────────────────────────────────────────
findings:
  # ── BLOCKING (must fix in M0 deliverable, not in code) ─────────────────────
  - id: BLOCK-1
    severity: high
    title: "M0 missing the four explicit --help command captures from plan.md"
    location: "review-request.yaml → commands[] (line ~38-98)"
    description: >
      plan.md M0 验证命令 (line 14-19) explicitly lists four commands that must be
      recorded as part of the M0 baseline:
        ./target/release/ilink-hub --help
        ./target/release/ilink-hub serve --help
        ./target/release/ilink-hub register --help
        ./target/release/ilink-hub-bridge --help
      The current review-request.yaml captures the *output* of those commands in
      `help_snapshots` (good), but the `commands` block does not list the four
      invocations as separate executed steps with their own exit codes, stdout/stderr
      size, or binary hash. M1 and M2.1 will diff against this snapshot; without a
      verifiable command record (what was run, on which binary, on which commit) the
      diff is not reproducible.
    impact: >
      If the four captures are re-taken later from a different build, the M1 diff
      (CONS-01) could be polluted by build-time strings (e.g. cargo version embedded
      in panic messages) or by accidental binary changes between the captures in
      `help_snapshots` and the binaries the team will rebuild in M1. This makes the
      M1 'before/after' comparison ambiguous.
    recommendation: >
      Either (a) add a `commands` entry for each of the four --help invocations with
      its exit code and `sha256sum` of the release binary used; or (b) explicitly
      add a `verification_artifact` block pointing at the snapshot file containing
      the captures, and confirm the binary's commit hash matches base_commit
      (61938ba92fc20cdb00b876ddf5d4a9de52ddcd92). The current `build-release`
      command captures only the build step, not the four runs.
    references:
      - "plan.md:14-19"
      - "review-request.yaml:103-173 (help_snapshots)"
      - "review-request.yaml:38-97 (commands[])"

  - id: BLOCK-2
    severity: medium
    title: "behavioural_diff says 'N/A' rather than confirming no source change"
    location: "review-request.yaml → behavioural_diff (line ~259-266)"
    description: >
      The block has entries with `before: N/A / after: N/A / security_classification: N/A`.
      For an audit/diff baseline, an explicit confirmation is more useful than an
      N/A. The diff section exists 'to make the contract explicit' (per the
      reviewer comment above it) but does not actually confirm the contract.
    impact: >
      Auditors reading the baseline later cannot tell from this section alone whether
      source files were touched. They have to cross-check against git (which is
      fine, but defeats the point of recording the contract in the snapshot).
    recommendation: >
      Replace the placeholder with a single, unambiguous statement and a
      machine-checkable field. Example:
        - area: "All tracked source files"
          before: "HEAD = base_commit 61938ba92fc20cdb00b876ddf5d4a9de52ddcd92"
          after:  "HEAD = base_commit 61938ba92fc20cdb00b876ddf5d4a9de52ddcd92"
          diff:   "git diff --stat 61938ba92fc20cdb00b876ddf5d4a9de52ddcd92..HEAD → empty"
          security_classification: "M0 records state only; no code-level change."
      This makes the 'no source change' claim verifiable in 5 seconds without
      checking git.

  # ── NON-BLOCKING baseline observations M0 should record (security-relevant) ─
  - id: OBS-1
    severity: high
    title: "serve --addr defaults to 0.0.0.0:8765 → Hub is LAN-exposed on first run"
    location: "src/main.rs:27"
    description: >
      The `serve` subcommand's `--addr` default is `0.0.0.0:8765`. On any developer
      laptop or container with a routable interface, this binds the Hub on all
      interfaces. Combined with `CorsLayer::permissive()` on the iLink bot API
      (server/mod.rs:22) — which is required for the iLink protocol but does
      silently extend to the entire bot API surface — an attacker on the same
      network can reach the Hub. The /hub/register endpoint, /hub/clients, and
      /hub/clients/{name} all live on `admin_api` which has no CORS layer and
      is therefore not directly browser-callable, but a LAN attacker can still
      curl them.

      The Hub has no built-in authentication on the admin API. Any process that
      can reach the listening socket can: register a new vtoken, list all
      clients, rename/delete clients, force iLink re-login, and stream the
      iLink QR login flow (admin/ilink_qr_stream). With `ILINK_ADMIN_TOKEN` set,
      the /hub/register endpoint is gated; the other admin endpoints
      (/hub/clients, /hub/clients/{name}, /hub/ilink/*, /hub/pair/*) are not
      gated by that token.

      This is recorded as CONS-02-default-addr-lan-exposed in the baseline, but
      the baseline does not call out the *blast radius* of the LAN exposure
      (admin endpoints are unauthenticated except /hub/register).
    impact: >
      Default-deny should be the baseline posture. 127.0.0.1 forces an explicit
      `--addr 0.0.0.0` for LAN exposure; the current default inverts this. Plan
      M2.3 closes this; until then the pre-fix state exposes the admin API to
      the LAN by default.
    recommendation: >
      (a) In the baseline_observations for CONS-02-default-addr-lan-exposed,
      add a one-line note: "blast radius: /hub/clients, /hub/clients/{name},
      /hub/ilink/{status,relogin,qr-stream}, /hub/pair/* are not gated by
      ILINK_ADMIN_TOKEN; only /hub/register is."
      (b) Treat M2.3 as a security fix, not just a UX nit, and prioritize it.
    references:
      - "src/main.rs:27 (default_value = \"0.0.0.0:8765\")"
      - "src/server/mod.rs:22-54 (admin routes have no auth layer)"
      - "src/server/routes.rs (admin_* handlers)"

  - id: OBS-2
    severity: medium
    title: "Three env-var names for 'Hub address' increases phishing/typo-squat risk"
    location: "src/main.rs:27,56,70 ; src/bin/ilink-hub-bridge.rs:43-48"
    description: >
      Three different env vars refer to the same logical setting:
        ILINK_HUB_ADDR  (serve --addr, expect host:port, no scheme)
        ILINK_HUB_URL   (register/clients --hub-url, expect full URL with scheme)
        WEIXIN_BASE_URL (bridge --hub-url, full URL; also the var backends read)

      Because they are parsed at different points and have different format
      expectations (host:port vs full URL), there is no centralised validation
      and a typo (e.g. setting WEIXIN_BASE_URL but the user runs `serve` which
      reads ILINK_HUB_ADDR) silently falls through to the default. M2.1 plans
      to unify on WEIXIN_BASE_URL as canonical; that change should also add a
      deprecation warning at parse time when ILINK_HUB_ADDR/ILINK_HUB_URL are
      used, otherwise the aliasing is invisible to operators.
    impact: >
      M2.1 aliasing is a soft change. Without an explicit deprecation warning,
      operators who learned the old vars will keep using them, and the docs /
      reality split will persist. This is a configuration-time phishing
      surface (env-var squatting) and an audit-readability issue.
    recommendation: >
      In M2.1, when ILINK_HUB_ADDR or ILINK_HUB_URL is set but WEIXIN_BASE_URL
      is not, log a `tracing::warn!` naming the deprecated var and the new
      canonical one. This is a 4-line change that makes the migration
      discoverable.
    references:
      - "plan.md:44-53 (M2.1 alias retention plan)"
      - "src/main.rs:27,56,70"

  - id: OBS-3
    severity: low
    title: "DEFAULT DATABASE_URL embeds the developer's home path"
    location: "src/main.rs:40 ; review-request.yaml:131-133 (help_snapshot)"
    description: >
      `default_database_url()` returns
      `sqlite:/Users/kongjie/.ilink-hub/ilink-hub.db` on this machine. The
      --help snapshot in review-request.yaml captures this verbatim. If a
      developer copies a --help example into a script and runs it on a
      different machine, the path won't exist and the command will silently
      create a SQLite file in `/Users/kongjie/...` only because of
      username coincidence (or fail). The path should not appear in user-
      visible help.
    impact: >
      Cosmetic for M0, but the --help snapshot is what M1 will diff against
      and what users will read. Recording the developer's home path in the
      public-facing help output is a hygiene issue.
    recommendation: >
      `default_database_url()` should return a path expression that uses
      `dirs::home_dir()` or `$HOME`-style substitution, OR the help text
      should say "~/.ilink-hub/ilink-hub.db" without expanding it. The
      current expansion is platform-specific (and the SQLite URL form
      doesn't honour $HOME expansion either, so the path is a literal).
    references:
      - "src/paths.rs (default_database_url implementation)"
      - "src/main.rs:34-41 (default_value_t = default_database_url())"

  - id: OBS-4
    severity: low
    title: "tokio::sync::watch::Sender cloned and immediately dropped — works but is noisy"
    location: "src/main.rs:94-102"
    description: >
      In the Serve branch, the code does:
        let (shutdown_tx, shutdown_rx) = watch::channel(false);
        let shutdown_tx_clone = shutdown_tx.clone();
        tokio::spawn(async move { ... shutdown_tx_clone ... });
        drop(shutdown_tx);
      This is correct (the original sender is dropped to release the channel
      when the spawned task ends), but the dance is easy to break in future
      edits. A small refactor using `shutdown_rx.clone()` and a single
      `OwnedSemaphore` or `CancellationToken` would be more robust, but
      that is out of scope for CONS-01/CONS-02.
    impact: >
      None for M0. Recorded so M1+ doesn't accidentally re-introduce a
      double-sender pattern.
    recommendation: >
      No change in M0. Carry forward as a code-quality follow-up.
    references:
      - "src/main.rs:94-115"

  - id: OBS-5
    severity: low
    title: "ClientRegistry uses HashMap<Name, Vtoken> indirection — O(n) rename pattern"
    location: "src/hub/registry.rs:39-181"
    description: >
      The registry has two HashMaps (`by_vtoken`, `by_name`) kept in sync.
      `update_client` removes from `by_name` and re-inserts under a
      new name, leaving a window where `by_name` does not point at the
      vtoken. There is no observable bug because both HashMaps are inside
      the same RwLock (registry is a RwLock<ClientRegistry> in
      HubState), but the indirection pattern means every name change
      re-allocates two map entries and clones two Strings. For 10k+
      clients this is fine; for 100k+ it would matter.
    impact: >
      Not a security or correctness issue. Performance nit.
    recommendation: >
      No change in M0. Carry forward as a perf refactor.
    references:
      - "src/hub/registry.rs:136-165 (update_client)"

  # ── POSITIVE OBSERVATIONS (what M0 gets right, for the record) ────────────
  - id: POS-1
    severity: info
    title: "Concurrent register/route deadlock test exists and passes"
    description: >
      src/hub/mod.rs:976-1024 ships a multi-threaded test
      `concurrent_register_and_route_does_not_deadlock` that exercises
      registry write + router write + router read interleaving under 5s
      timeout. This is a strong signal that the lock-ordering convention
      (registry → router) is enforced and tested. M0 inherits this; do
      not break it in M1.
    references:
      - "src/hub/mod.rs:976-1024"

  - id: POS-2
    severity: info
    title: "PollTracker for split-brain detection is in place"
    description: >
      src/hub/mod.rs:86-127 implements PollTracker (concurrent long-poll
      counting per vtoken) with an RAII PollGuard. The commit history
      (`fix(hub,bridge): prevent shared-vtoken split-brain...`) shows
      this was a recent fix. M0's baseline should preserve the test
      coverage (`poll_tracker_counts_concurrent_polls_and_releases_on_drop`
      at src/hub/mod.rs:945-970).
    references:
      - "src/hub/mod.rs:86-127"
      - "src/hub/mod.rs:945-970"
      - "git log: 513c32c"

  - id: POS-3
    severity: info
    title: "CorsLayer is correctly scoped to bot API only"
    description: >
      src/server/mod.rs:17-61 mounts CorsLayer::permissive() on
      `bot_api` (the /ilink/bot/* routes) and explicitly does NOT add
      it to `admin_api`. This is the right defensive choice: the
      iLink-compatible bot API must accept browser CORS (OpenClaw);
      the admin API must not be browser-callable.
    references:
      - "src/server/mod.rs:17-61"

