# ─── M0-required --help snapshot (plan §M0 calls for these four) ──────────
# These are the M0 baseline snapshots the plan explicitly asks for. They
# will be the diff reference for M1 (CONS-01) and M2.1 (CONS-02 env
# aliasing). Full text is captured verbatim from the local build.
help_snapshots:
  - id: ilink-hub--help
    cmd: "./target/release/ilink-hub --help"
    captures:
      about: "iLink-compatible multiplexer hub for WeChat ClawBot"
      subcommands:
        - "serve — Start the hub server"
        - "login — Interactive QR-code login — scans WeChat and saves bot_token to DB"
        - "register — Register a backend client with the hub (outputs vtoken to use)"
        - "clients — List registered clients"
      options: ["-h, --help", "-V, --version"]
      language: "english-only (CONS-01 baseline)"
    file: "src/main.rs"
  - id: ilink-hub-serve--help
    cmd: "./target/release/ilink-hub serve --help"
    captures:
      about: "Start the hub server"
      args:
        - name: "--token <TOKEN>"
          env: "ILINK_TOKEN"
          help: "Real iLink bot token. If omitted, loaded from DATABASE_URL or triggers QR login"
        - name: "--addr <ADDR>"
          env: "ILINK_HUB_ADDR"
          default: "0.0.0.0:8765"
          help: "Hub listen address"
        - name: "--ilink-base-url <ILINK_BASE_URL>"
          env: "ILINK_BASE_URL"
          help: "Override real iLink base URL (for testing / custom deployments)"
        - name: "--database-url <DATABASE_URL>"
          env: "DATABASE_URL"
          default: "sqlite:/Users/kongjie/.ilink-hub/ilink-hub.db"
          help: >-
            Database connection URL. Defaults to SQLite at
            ~/.ilink-hub/ilink-hub.db
      default_addr: "0.0.0.0:8765 (CONS-02 baseline — LAN-exposed)"
    file: "src/main.rs"
  - id: ilink-hub-register--help
    cmd: "./target/release/ilink-hub register --help"
    captures:
      about: "Register a backend client with the hub (outputs vtoken to use)"
      args:
        - name: "--hub-url <HUB_URL>"
          env: "ILINK_HUB_URL"
          default: "http://localhost:8765"
          help: "Hub URL"
        - name: "--name <NAME>"
          help: "Workspace name (short, machine-readable)"
        - name: "--label <LABEL>"
          help: "Human-readable label"
      default_hub_url: "http://localhost:8765 (CONS-02 baseline — uses localhost, not 127.0.0.1)"
    file: "src/main.rs"
  - id: ilink-hub-bridge--help
    cmd: "./target/release/ilink-hub-bridge --help"
    captures:
      about: "Bridge WeChat (via iLink Hub) to a local coding CLI (Claude Code, Codex, …)"
      subcommands:
        - "profile — Run a built-in profile handler (P0 exec protocol: reads ILINK_* env vars, writes to stdout)"
        - "manager — Discover profile YAML files and supervise one bridge workspace per file"
        - "help — Print this message or the help of the given subcommand(s)"
      args:
        - name: "--hub-url <HUB_URL>"
          env: "WEIXIN_BASE_URL"
          default: "http://127.0.0.1:8765"
          help: "Hub base URL (same as WEIXIN_BASE_URL for other backends)"
        - name: "--token <TOKEN>"
          env: "WEIXIN_TOKEN"
          help: >-
            Virtual token. Omit to use saved local credentials, auto-register,
            or `--pair` QR flow
      default_hub_url: "http://127.0.0.1:8765 (uses 127.0.0.1, not localhost — CONS-02 baseline inconsistency)"
    file: "src/bin/ilink-hub-bridge.rs"

# ─── CONS-01 / CONS-02 baseline observations (recorded, not fixed) ────────
# These are not failures of M0 — they are the pre-fix state that the
# later milestones (M1, M2.1-M2.3) will close. They are written here so
# the diff is unambiguous.
baseline_observations:
  - id: CONS-01-english-help
    description: >-
      All four --help surfaces (`ilink-hub`, `serve`, `register`,
      `ilink-hub-bridge`) are English-only. Documentation and GUI are
      Chinese; CLI help is the lone English surface.
    file_refs:
      - "src/main.rs (Cli struct, Commands enum variants)"
      - "src/bin/ilink-hub-bridge.rs (Cli struct)"
    target_milestone: "M1"
  - id: CONS-02-three-env-vars
    description: >-
      Three env-var names reference "Hub address":
        - ILINK_HUB_ADDR  (serve --addr)
        - ILINK_HUB_URL   (register --hub-url, clients --hub-url)
        - WEIXIN_BASE_URL (ilink-hub-bridge --hub-url, plus the env that
                           backends actually read)
    file_refs:
      - "src/main.rs:27 (ILINK_HUB_ADDR)"
      - "src/main.rs:56,70 (ILINK_HUB_URL)"
      - "src/bin/ilink-hub-bridge.rs (WEIXIN_BASE_URL)"
    target_milestone: "M2.1"
  - id: CONS-02-default-addr-lan-exposed
    description: >-
      `serve` default `--addr` is `0.0.0.0:8765`, which binds on all
      interfaces and exposes the hub to the LAN by default. Plan M2.3
      will change this to `127.0.0.1:8765` and require explicit
      `--addr 0.0.0.0:8765` for LAN exposure.
    file_refs:
      - "src/main.rs:27"
    target_milestone: "M2.3"
  - id: CONS-02-default-hostname-inconsistency
    description: >-
      Default hub URLs use three different host tokens:
        - serve default:   0.0.0.0:8765     (binds, not a URL)
        - register default: http://localhost:8765
        - bridge default:   http://127.0.0.1:8765
      Plan M2.2 normalises doc examples to 127.0.0.1; the CLI defaults
      are themselves addressed in M2.1 / M2.3.
    file_refs:
      - "src/main.rs:27, 56, 70"
      - "src/bin/ilink-hub-bridge.rs (--hub-url default_value)"
    target_milestone: "M2.1 + M2.2 + M2.3"

