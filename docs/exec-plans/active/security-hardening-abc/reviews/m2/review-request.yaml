change_summary: |
  Three High security hardenings without touching dangerous CLI flags:

  1) Bridge profile load now errors (bail!) when command is a shell interpreter
  (bash/sh/zsh/fish/dash) AND args contain both `-c` and `{{MESSAGE}}`. Safe
  patterns (stdin: message; shell -c without MESSAGE) still load.

  2) Startup log and ServeOptions Debug redact DATABASE_URL passwords via
  redact_database_url (scheme/host/db/user kept, password → ***).

  3) Desktop resolve_initial_listen_addr rejects non-loopback ILINK_HUB_ADDR
  (0.0.0.0, LAN IPs). Also fixed compile break: hub_update_client now passes
  existing persona through to 6-arg update_client_in_hub.

