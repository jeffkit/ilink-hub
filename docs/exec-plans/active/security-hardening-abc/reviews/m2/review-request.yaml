  - "ILINK_HUB_ADDR=0.0.0.0:8765 → Err; 127.0.0.1:8765 → Ok"
  - "dangerous CLI flags unchanged"
  - "cargo fmt, clippy -D warnings, cargo test, cargo build, desktop tests pass"

