change_summary: |
  Wired production bot API CORS through build_cors_layer() so ILINK_CORS_ORIGINS
  whitelist is enforced on build_router (not only on an isolated toy router).
  Added PairingRegistry::claim_confirmed_vtoken that takes the confirmed vtoken
  once while retaining the confirmed stub for status/baseurl; qrcode_status_json
  now uses a write lock + claim so re-polling a pair code cannot steal the bearer
  token during CONFIRMED_TTL. Legitimate first poll after confirm still receives
  bot_token; subsequent polls return confirmed without token.

