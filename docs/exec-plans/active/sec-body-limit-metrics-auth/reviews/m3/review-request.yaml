# ─── 范围 ────────────────────────────────────────────────────────────────────
scope:
  - 修改 `metrics` handler，引入 `headers: HeaderMap` 参数并调用 `check_admin_auth(&headers)`。
  - 鉴权失败时返回 `401 Unauthorized`，鉴权成功时继续输出 Prometheus 格式的监控指标。
  - 在 `tests/breaking_changes.rs` 和 `tests/e2e_wechat_simulation.rs` 中新增单元与集成测试验证鉴权流程。

