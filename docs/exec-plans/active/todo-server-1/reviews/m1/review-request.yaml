checkpoint: "M1: 修复 SEC-006 (Admin token 非常量时间比较)"

# ─── Scope of this checkpoint ──────────────────────────────────────────────
# In Milestone 1, we introduced the `subtle` crate to verify the `admin_token`
# with a constant-time comparison in the `check_admin_auth` helper function.
# This prevents timing attacks that could leak the admin token.

# ─── Source-of-truth changes for SEC-006 ───────────────────────────────────
source_changes:
  - file: Cargo.toml
    symbols:
      - "dependencies"
    change_summary: >-
      Added `subtle = "2.6.1"` dependency to enable constant-time comparison operations.
  - file: src/server/routes.rs
    symbols:
      - "check_admin_auth"
      - "admin_auth_tests"
    change_summary: >-
      Modified `check_admin_auth` to use `subtle::ConstantTimeEq` when comparing
      the provided Authorization header token with the configured `admin_token`.
      Also added `admin_auth_tests` unit tests to verify authorization correctness with wrong tokens and empty headers.

