  - id: F-ENV-1
    severity: LOW
    cwe: CWE-732
    category: configuration
    title: "`ILINK_ADMIN_INSECURE_NO_AUTH` environment variable still allows admin endpoints (incl. `/hub/register`) without ANY auth when `ILINK_ADMIN_TOKEN` is unset"
    evidence:
      - "src/server/routes.rs:75-91 — `insecure_no_auth()` reads env var, default false, but logged warning is only at first call."
      - "src/server/routes.rs:62-73 — `check_admin_auth` returns true when insecure_no_auth() is true, even if ILINK_ADMIN_TOKEN is unset."
      - "src/server/routes.rs:109-137 — `/hub/register` (admin auth-gated) issues a vtoken with no audit log entry at info! level on success."
      - "src/server/routes.rs:115-124 — Failure path returns UNAUTHORIZED but registration success path (line 126) has no info!() call."
    why_it_matters: >
      If the operator sets `ILINK_ADMIN_INSECURE_NO_AUTH=true` and forgets to unset it, every
      admin endpoint (register, list, delete, update) is wide open. The warning is logged
      once per process, but on a long-running service that's easy to miss in logs. Also, the
      `/hub/register` endpoint specifically silently mints a vtoken on success — an attacker
      who reaches it (via the `insecure_no_auth` flag) gets a credential with no audit trail.
      Pre-existing, not introduced by M0-M3, but relevant to the M0 review which claims
      'no new source code changes' — confirm the production deploy docs are explicit about
      NEVER setting `ILINK_ADMIN_INSECURE_NO_AUTH` in non-dev environments.
    fix: >
      (a) Add an info!() log line on /hub/register success that includes the client name and
      a redacted vtoken (8-char prefix only, matching `redact_token`). (b) At startup, log
      the insecure flag status at WARN level every time it's checked (use a counter or a
      periodic heartbeat) — not just once. (c) In docs/deploy, mark the flag with a large
      DO-NOT-USE-IN-PROD banner.
    resolution: >
      NOT FIXED in this pass. LOW severity, pre-existing, requires a
      deploy-doc update that is out of scope for the M0-M3 security
      milestone. Tracked as a follow-up.
    status: ACCEPTED_LOW

