    fix: >
      Lower line 390 from info! to debug!. Add a line to M3's plan: "audit lines 209/253/304/390;
      redact or demote any field that contains a code, name, or vtoken beyond the 8-char
      prefix to debug!." This is a one-line change, but flag it explicitly so the implementer
      doesn't miss it.
    resolution: >
      RESOLVED. Three log sites demoted from info! to debug! in
      src/server/pairing.rs:
        - build_pairing_qr_response: `info!(code, pair_url, ...)` → debug!.
        - get_bot_qrcode_post:    `info!(count, "get_bot_qrcode POST ...")` → debug!.
        - get_qrcode_status:      `info!("verify_code ignored ...")` → debug!.
        - pair_confirm success:   `info!(code, name, "pairing confirmed")` → debug!.
      A compile-time test (pair_url_is_not_logged_at_info_level) statically
      scans src/server/pairing.rs and fails if any `info!` macro carries
      `pair_url` (catches future reverts at build time).
    verification: >
      - tests/hub_routing_integration.rs:pair_url_is_not_logged_at_info_level
        (static scan; runs on every build).
    status: FIXED

  # ───────────────────────────────────────────────────────────────────────────
  - id: F-M3-4
    severity: LOW
    cwe: CWE-613
    category: authz
    title: "M3's 'pair_confirm rejected when not_scanned' needs a state-transition test for AlreadyConfirmed + Scanned together"
    evidence:
      - "docs/exec-plans/active/todo-security-p1/plan.md:178-180 — 'pair_confirm_requires_valid_csrf_header' / 'pair_confirm_succeeds_with_correct_csrf_and_scanned_state' / 'pair_confirm_csrf_cannot_be_reused' / 'pair_confirm_rejected_when_not_scanned'."
      - "src/hub/pairing.rs:116-118 — AlreadyConfirmed is checked BEFORE the planned NotScanned check."
    why_it_matters: >
      With M3's new ordering: CSRF → Scanned → register → confirm. But the existing
      `confirm` body is `purge_expired → NotFound check → Expired check → AlreadyConfirmed
      check → (NEW NotScanned check) → set Confirmed`. The order matters: an attacker
      that triggers AlreadyConfirmed via two requests where the first wins will get a 409
      for the second, leaking the existence of the (now-confirmed) session. The test plan
      covers CSRF/Scanned/NotScanned in isolation, but not in combination. If the implementer
      mis-orders the checks (e.g., Scanned first, AlreadyConfirmed second), the second
      attacker gets a 412 instead of 409 — they learn the session is in Scanned state and
      can race for the confirm window.
    fix: >
      Add a 5th test: 'pair_confirm_already_confirmed_takes_precedence_over_not_scanned' —
      confirm once (success), then mark_scanned again, then attempt confirm with the OLD
      csrf. Expected: 403 (csrf_mismatch) OR 409 (AlreadyConfirmed) — but verify the code
      is mutually consistent (i.e., the order of checks is documented in a comment).
    resolution: >
      RESOLVED. src/hub/pairing.rs:confirm now checks in this order:
      NotFound → Expired → AlreadyConfirmed → CSRF match (consumes token)
      → NotScanned. The CSRF check is moved before NotScanned so the
      Scanned state is never leaked through a 412 to a CSRF-less
      attacker. The AlreadyConfirmed check is moved before the CSRF
      check so the canonical 409 is returned to a racer (their csrf is
      already consumed by the winner, but the order is documented in
      a comment and pinned by a test). Two tests cover the
      transitions: csrf_token_cannot_be_replayed_after_confirm and
      csrf_check_takes_precedence_over_not_scanned.
    verification: >
      - tests/hub_routing_integration.rs:csrf_token_cannot_be_replayed_after_confirm
        (replay attempt → AlreadyConfirmed, NOT Ok).
      - tests/hub_routing_integration.rs:csrf_check_takes_precedence_over_not_scanned
        (CsrfMismatch returned before NotScanned for an unscanned session).
    status: FIXED

