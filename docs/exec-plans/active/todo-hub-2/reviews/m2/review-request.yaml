behavioural_diff:
  - area: "build_hub_ext_for_vctx database queries"
    before: >-
      `get_active_session_name` and `get_backend_session` queries could block indefinitely if database connection or lock was held, potentially causing inbound message routing to timeout.
    after: >-
      Queries are now guarded with a 5-second timeout, falling back gracefully to standard defaults.
    security_classification: "No security impact. Improves reliability and avoids service stagnation."

