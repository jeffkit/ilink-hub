# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Wrap DB queries (`get_active_session_name` and `get_backend_session`) inside `build_hub_ext_for_vctx`
# with `tokio::time::timeout(Duration::from_secs(5), ...)` and handle timeouts gracefully.

# ─── Source-of-truth changes for TO-02 ─────────────────────────────────────
source_changes:
  - file: src/hub/mod.rs
    symbols:
      - "build_hub_ext_for_vctx"
    change_summary: >-
      Wrapped DB queries `get_active_session_name` and `get_backend_session` inside `build_hub_ext_for_vctx`
      with `tokio::time::timeout(Duration::from_secs(5), ...)` and handled timeouts gracefully.
      When a timeout or query error occurs, the function logs a warning and falls back to default values
      ("default" for session name and None for session ID).
  - file: src/store/mod.rs
    symbols:
      - "Store::pool"
    change_summary: >-
      Added a `#[cfg(test)] pub fn pool(&self) -> &sqlx::AnyPool` accessor to allow unit tests to
      temporarily lock the SQLite connection pool.

