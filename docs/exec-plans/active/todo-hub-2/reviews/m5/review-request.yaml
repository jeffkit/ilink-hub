# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Split the monolithic `HubState` struct into cohesive sub-states (e.g.,
# `IlinkConnState`, `RoutingState`) to restrict direct access to its fields.

# ─── Source-of-truth changes for A-01 ─────────────────────────────────────
source_changes:
  - file: src/hub/mod.rs
    symbols:
      - "IlinkConnState"
      - "RoutingState"
      - "ClientState"
      - "HubState"
    change_summary: >-
      Split the previously-monolithic `HubState` struct into three cohesive
      sub-states:

        * `IlinkConnState` — owns the iLink upstream WebSocket client, the
          graceful-shutdown `watch::Receiver`, the upstream status
          `AtomicU8`, the QR-event broadcast and last-ready replay channels,
          and the relogin trigger broadcast. Anything that mutates only when
          iLink connects, logs in, or sends a QR-ready event lives here.

        * `RoutingState` — owns the per-message dispatch `Router`,
          the conversation `ContextTokenMap`, and the
          `QuoteRouteIndex` used for quote-reply routing. Pure in-memory; no
          I/O, no external handles.

        * `ClientState` — owns the registered backend `ClientRegistry`, the
          in-flight pairing `PairingRegistry`, the per-vtoken `MessageQueue`,
          and the `PollTracker` for long-poll concurrency detection.

      `HubState` itself now holds the three sub-states plus the cross-cutting
      `Arc<Store>` and `Arc<Metrics>`. Field paths changed
      (`state.x` → `state.<sub-state>.x`) across the dispatcher, hub-command
      handler, server routes, pairing handlers, runtime entry point, and
      health checker. External callers continue to operate against the same
      Arc<HubState>; the change is purely structural.
  - file: src/hub/mod.rs
    symbols:
      - "push_to_queue"
    change_summary: >-
      Tightened the helper signature: `push_to_queue` no longer takes
      `&HubState`; it takes `&Arc<dyn MessageQueue>` and `&Metrics` directly,
      so callers express the minimal slice of state they need.
  - file: src/hub/mod.rs
    symbols:
      - "tests::hub_state_new_populates_all_sub_states"
      - "tests::sub_states_are_independently_usable"
      - "tests::sub_state_structs_carry_expected_fields"
      - "tests::hub_state_metrics_are_shared_with_sub_state_paths"
      - "tests::quote_index_evictor_takes_sub_state_path"
    change_summary: >-
      Added five unit tests pinning down the A-01 invariants:

        * `hub_state_new_populates_all_sub_states` — every sub-state is
          correctly wired by `HubState::new` (upstream reachable, iLink
          status starts at UNKNOWN, routing is empty, registry is empty,
          metrics starts at zero).
        * `sub_states_are_independently_usable` — each sub-state can be
          exercised through its `state.<sub-state>.x` field path without
          touching the rest of `HubState`.
        * `sub_state_structs_carry_expected_fields` — compile-time check
          that `IlinkConnState`, `RoutingState`, and `ClientState` carry
          the documented field names; accidental removal breaks the test.
        * `hub_state_metrics_are_shared_with_sub_state_paths` — the
          top-level `Arc<Metrics>` and any cloned handle share the same
          counters, matching the production pattern where spawned
          fire-and-forget tasks clone the `Arc`.
        * `quote_index_evictor_takes_sub_state_path` — the background
          quote-index evictor only needs `state.routing.quote_index`, and
          the lock is reachable through the new path.

