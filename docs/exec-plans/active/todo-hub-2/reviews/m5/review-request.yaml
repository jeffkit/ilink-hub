# ─── Behavioural diff vs. baseline (7d790bf) ───────────────────────────────
behavioural_diff:
  - area: "HubState struct shape"
    before: >-
      `HubState` was a single flat struct exposing ~14 public fields
      (`upstream`, `registry`, `pairing`, `queue`, `ctx_map`, `router`,
      `quote_index`, `store`, `metrics`, `shutdown`, `ilink_status`,
      `qr_tx`, `qr_last_ready`, `relogin_tx`, `poll_tracker`).
    after: >-
      `HubState` holds three cohesive sub-states (`ilink`, `routing`,
      `clients`) plus the cross-cutting `store` and `metrics`. Field paths
      now read like `state.ilink.upstream` or `state.routing.router`,
      making the dependency explicit at every call site.
    security_classification: >-
      No security impact. Pure structural refactor; no behaviour, lock
      order, or visibility change. All previously-public fields remain
      reachable, just one level deeper.
  - area: "Internal helper signatures"
    before: >-
      `push_to_queue(&HubState, ...)` accepted the entire hub state blob
      even though it only needed `queue` and `metrics`.
    after: >-
      `push_to_queue(&Arc<dyn MessageQueue>, &Metrics, ...)` takes the
      smallest slice. The dispatcher / hub-command caller wires those in
      explicitly via `&state.clients.queue` and `&state.metrics`.
    security_classification: "No security impact."

