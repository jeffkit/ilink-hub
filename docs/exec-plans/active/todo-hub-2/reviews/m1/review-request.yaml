# ─── Behavioural diff vs. baseline (61938ba) ───────────────────────────────
behavioural_diff:
  - area: "WeixinMessage.item_list storage"
    before: >-
      `item_list` was stored as `Option<Vec<MessageItem>>`. When broadcasting, `msg.clone()` was called for each client, performing a deep clone of the vector and all heap-allocated fields inside `MessageItem::extra`.
    after: >-
      `item_list` is stored as `Option<Arc<Vec<MessageItem>>>`. When broadcasting, `msg.clone()` only performs a cheap reference-counting clone of the `Arc`.
    security_classification: "No security impact. Improves memory performance."
  - area: "Mutation of item_list"
    before: >-
      Directly mutated `item_list` on mutable references to `WeixinMessage`.
    after: >-
      Mutations are performed through `Arc::make_mut`, cloning the vector only if there are other shared references to the `Arc` (copy-on-write).
    security_classification: "No security impact."

