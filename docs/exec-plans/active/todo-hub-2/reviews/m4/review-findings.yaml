    result: pass (Finished `dev` profile, no diagnostics)
  - id: test-m4-broadcast-counter
    cmd: "cargo test --lib persist_fire_and_forget_failure_increments_metric"
    result: pass (1 passed, 0 failed, 126 filtered out, 0.01s — confirms the broadcast counter increments end-to-end and the forward counter remains at zero)
  - id: test-m4-metrics-endpoint
    cmd: "cargo test --lib metrics_endpoint_emits_persist_fire_and_forget_failures_lines"
    result: pass (1 passed, 0 failed, 0.00s — confirms both label lines are emitted with correct values and update independently)
  - id: test-suite
    cmd: "cargo test"
    result: pass (153 passed; 0 failed; 0 ignored; 1 ignored doctest — full suite green after the counter split + /metrics wiring + new adversarial test)
  - id: build
    cmd: "cargo build"
    result: pass (Finished `dev` profile, exit 0)
  - id: counter-now-in-metrics-endpoint
    cmd: "grep -n 'ilink_hub_persist_fire_and_forget_failures_total' src/server/routes.rs"
    result: >-
      PASS — 5 matches (HELP, TYPE, forward_to label, broadcast label, comment).
      Operators scraping `/metrics` will see both lines with the correct counter
      names and `path` label.

