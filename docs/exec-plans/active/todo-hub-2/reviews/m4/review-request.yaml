# ─── Behavioural diff vs. baseline (42fcf2c) ───────────────────────────────
behavioural_diff:
  - area: "HubState::metrics ownership"
    before: >-
      `HubState::metrics: Metrics` was held by value. The fire-and-forget
      persist tasks could not increment a counter because they had no
      reference to it.
    after: >-
      `HubState::metrics: Arc<Metrics>` is held behind an `Arc` so the
      fire-and-forget persist tasks can clone the handle and increment the
      new `persist_fire_and_forget_failures` counter on error.
    security_classification: "No security impact. Pure observability addition."
  - area: "Broadcast persist observability"
    before: >-
      A failed fire-and-forget persist call logged a `tracing::warn!` and
      silently dropped the real_ctx↔vctx mapping. The only signal of
      durability loss was grepping logs.
    after: >-
      Every fire-and-forget persist failure increments
      `persist_fire_and_forget_failures`, exposed both via the in-process
      `Metrics` struct and (via the existing `/metrics` endpoint wiring) as
      the Prometheus counter
      `ilink_persist_fire_and_forget_failures_total`.
    security_classification: >-
      No security impact. Turns a silent failure mode into an observable
      metric so operators can alert on it.

