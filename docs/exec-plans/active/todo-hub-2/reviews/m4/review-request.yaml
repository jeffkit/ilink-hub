# ─── Plan reference ─────────────────────────────────────────────────────────
plan: docs/exec-plans/active/todo-hub-2/plan.md
checkpoint: "M4 — Fix [C-01] Broadcast persist fire-and-forget window"

# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Add a metrics counter to record fire-and-forget persistence failures and
# document this design trade-off in the README.

# ─── Source-of-truth changes for C-01 ─────────────────────────────────────
source_changes:
  - file: src/hub/mod.rs
    symbols:
      - "Metrics::persist_fire_and_forget_failures"
      - "HubState::metrics"
      - "dispatch_message::ForwardTo::persist spawn"
      - "dispatch_message::Broadcast::persist spawn"
    change_summary: >-
      Added a new `persist_fire_and_forget_failures: AtomicU64` counter to the
      `Metrics` struct. Changed `HubState::metrics` from `Metrics` to
      `Arc<Metrics>` so the background persist tasks spawned by the broadcast
      dispatch path can `clone()` the handle and increment the counter on error.
      Both fire-and-forget persist sites — the per-message single-row call in
      `RoutingDecision::ForwardTo` and the per-broadcast batched call in
      `RoutingDecision::Broadcast` — now increment the counter on failure
      alongside the existing `tracing::warn!` log.
  - file: src/hub/mod.rs
    symbols:
      - "tests::persist_fire_and_forget_failure_increments_metric"
    change_summary: >-
      Added a unit test that holds the only connection of an in-memory SQLite
      pool to force the fire-and-forget `persist_context_tokens_batch` call to
      fail, then asserts that the new `persist_fire_and_forget_failures`
      counter is >= 1 after the task completes.
  - file: README.md
    symbols:
      - "Design Trade-offs / Broadcast persist is fire-and-forget"
    change_summary: >-
      Added a "Design Trade-offs" section to the README documenting the
      broadcast persist fire-and-forget design: the deliberate trade-off
      between dispatch tail latency and context-token durability, the
      observability story via the new counter, and how to detect / alert on it
      in production.

