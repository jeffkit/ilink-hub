milestone: M1
title: Poison-Safe Locks - src/hub/queue.rs 锁安全修复
status: ready-for-review
created: 2026-06-17

# ─── 范围 ────────────────────────────────────────────────────────────────────
scope:
  - 修复 `src/hub/queue.rs` 中 `ContextTokenMap` 和 `PerClientSlot` 热路径上使用 `std::sync::Mutex::lock().unwrap()` 的风险。
  - 将所有 `.lock().unwrap()` 修改为 poison-safe 形式：`lock().unwrap_or_else(|e| e.into_inner())`。
  - 在 `src/hub/queue.rs` 单元测试中补充 `test_mutex_poison_safe` 测试用例，显式毒化 Mutex 并验证锁访问不 panic。

