# ─── Behavioural diff vs. baseline (4433cad, M2) ─────────────────────────────
behavioural_diff:
  - area: "v5 DDL portability"
    before: >-
      migrate_to_v5 used `INTEGER PRIMARY KEY AUTOINCREMENT` unconditionally.
      The M2 review flagged this (F-M2-02) as SQLite-only syntax that would
      fail to parse on Postgres / MySQL, violating the M2 E2E Checkpoint 2
      promise that Store::connect succeeds on a fresh DB regardless of
      driver.
    after: >-
      migrate_to_v5 detects the driver at runtime (reusing the column_exists
      pattern: SELECT current_database() succeeds on Postgres/MySQL, errors
      on SQLite) and selects the id clause accordingly. SQLite gets
      AUTOINCREMENT; Postgres/MySQL gets the SQL standard GENERATED BY
      DEFAULT AS IDENTITY (Postgres 10+, MySQL 8.0+). The DDL string is
      built by v5_create_messages_sql, which the m3 test surface calls
      directly to pin both branches.
    security_classification: "No security impact; closes a portability gap."
  - area: "migrations/0005_messages.sql documentation"
    before: >-
      The 0005 file documented the messages table and its indexes, but
      did not explain the AUTOINCREMENT portability caveat that the m2
      review (F-M2-02) had just flagged.
    after: >-
      The 0005 file now carries a comment pointing readers to F-M2-02 in
      the m2 review-findings.yaml and to the Rust migrator's runtime
      driver selection. The runtime DDL remains the source of truth; the
      SQL file documents the SQLite form as the human-readable reference.
    security_classification: "No security impact; documentation only."

