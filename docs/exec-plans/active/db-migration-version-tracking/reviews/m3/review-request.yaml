# ─── Review findings resolution ────────────────────────────────────────────
findings_resolution:
  - finding: F-M3-01 (CRITICAL)
    title: "MySQL Compatibility completely broken"
    status: RESOLVED
    fix_commits: ["21ff66e", "1c86adc"]
    resolution: >-
      DatabaseKind::from_url() parses the URL scheme directly. v5 DDL has
      three branches (SQLite/Postgres/MySQL). column_exists uses per-driver
      catalog queries. try_claim_migration uses per-driver SQL (ON CONFLICT
      for Postgres/SQLite, INSERT IGNORE for MySQL).

  - finding: F-M3-02 (HIGH)
    title: "Flawed Concurrency Tests"
    status: RESOLVED
    fix_commits: ["1c86adc"]
    resolution: >-
      Concurrent connect tests now use tokio::spawn + tokio::join! for true
      concurrent execution. Atomic claim behaviour verified under concurrent
      access via adversarial_try_claim_is_mutually_exclusive tests.

  - finding: F-M3-03 (MEDIUM)
    title: "TOCTOU / Partial DDL Application Recovery Window"
    status: DEFERRED
    resolution: >-
      Known design trade-off (claim-then-DDL). Recovery procedure documented
      in run_migrations docstring. Not blocking M3.

