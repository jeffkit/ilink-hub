milestone: M2
title: "Adversarial Rust security & concurrency review of M2 — refactor run_migrations into per-version migrate_to_vN"
reviewer: "rust-sec-concurrency-specialist"
date: 2026-06-17
worktree: /Users/kongjie/projects/ilink-hub
base_commit: 5ff7cc6cb9ae078e7f114d951574d5252b3a9a3b
commit_under_review: 4433cad89c
resolution: >-
  M2 is a refactor that preserves the M1 concurrency contract. The five
  `migrate_to_vN` functions are pure extractions of the inline blocks in the
  pre-M2 `run_migrations`, the per-step `try_claim_migration` gate is moved
  inside each migrator (early-return on `false`), and the explicit
  `.map_err(|e| anyhow!(...))` wrappers around CREATE INDEX / ALTER TABLE are
  removed in favor of the existing `ddl()` helper's `DDL failed: {sql}\n
  Error: {e}` message. `cargo fmt --check`, `cargo clippy -- -D warnings`,
  `cargo test` (295 passed / 0 failed), and `cargo build` all green; the
  desktop frontend / Tauri side builds cleanly. The eight M2 tests
  (F-M2-01 .. F-M2-08) cover the headline invariants: per-version isolation,
  idempotency, DDL error propagation, claim/record consistency, v4 alone
  with pre-conditions, full run ordering, double-call idempotency, and
  CURRENT_TIMESTAMP-only DDL.

  Findings (all post-fix from M1; nothing new is CRITICAL or HIGH):
    - F-M2-01 (MEDIUM): The claim-then-DDL window is wider than necessary.
      Each `migrate_to_vN` writes its `schema_version` row first and runs the
      DDL after. A panic or process kill between the two leaves the row
      present with no DDL applied; the next connect sees the claim and
      short-circuits, so a half-migrated DB is silently "skipped" past
      indefinitely until a DBA drops the row. The plan documents this
      behavior at the top of `run_migrations`, so this is a known
      trade-off, but it is still a window of partial application that
      surfaces as a real-world recovery problem in three of the new tests
      (F-M2-03 expects the row to be present after DDL failure; F-M1-02
      already documented the recovery-by-DBA shape). A future milestone
      could tighten this by moving the DDL inside a transaction with the
      claim, but the SQLite-with-single-connection model makes that
      awkward, and a tighter ordering changes the concurrent-writer
      semantics. NOT-EXPLOITABLE today (no remote attacker can force a
      panic mid-`ddl`; the only trigger is a process kill), but the test
      suite should pin down the recovery procedure (drop the row, restart).
    - F-M2-02 (MEDIUM): `AUTOINCREMENT` on `messages.id` (line 370) is
      SQLite-specific syntax. M2's plan claims the code must stay
      portable across SQLite / Postgres / MySQL (see the run_migrations
      docstring at lines 163-168, plus the AnyPool architecture). On
      Postgres / MySQL the `AUTOINCREMENT` keyword would be a parse error.
      M3 (同步与对齐 migrations/) is the right place to flag this — the
      v5 DDL is moved into `migrations/0005_messages.sql` in M3, and the
      equivalent SQL file should use `SERIAL` / `BIGINT AUTO_INCREMENT`
      depending on target. This is NOT a runtime risk in M2 itself
      (M2 only runs against SQLite in tests), but it would surface as a
      DDL failure on first `Store::connect` against a non-SQLite
      database, which violates the M2 E2E Checkpoint 2 (Store::connect
      must succeed on a fresh DB). Mark as DEFER-TO-M3.
    - F-M2-03 (MEDIUM): `ddl()` (line 456) formats the error as
      `"DDL failed: {sql}\n  Error: {e}"` where `sql` is the *full* DDL
      string. The 8 M2 DDL strings total ~1.6 KB of SQL embedded in the
      error chain. On a real production crash with a real SQL string in
      flight, the user-visible log line is fine (a single line), but if
      tracing serialises this into structured JSON it will balloon
      structured-log size. Low-impact today; would benefit from a
      `truncated_sql` helper if logs ever leak into a quota-bound sink.
      Not security-critical.
    - F-M2-04 (LOW): The M2 dispatcher uses `?` to short-circuit on the
      first failing migrator. The plan asks for this ("any DDL failure
      → Store::connect returns Err"). Tests confirm: F-M2-03 seeds v3 to
      fail and asserts Err is propagated; F-M2-06 walks all five steps
      and confirms `get_current_version == 5`. The shape is correct.
      Note (low) that the dispatcher does not wrap the whole walk in
      a single transaction — this is intentional (DDL auto-commits in
      many engines, and SQLite's single-connection pin is the
      serialisation point). Leaving as-is.
    - F-M2-05 (LOW): `try_claim_migration` and `record_migration_run` are
      `pub` (lines 135, 151). The review-request explicitly notes that
      "a future hardening pass can tighten `record_migration_run` to
      `pub(crate)`". M2 did not tighten either. No external callers
      depend on these symbols, so tightening would be a one-line, no-risk
      change. Defer.
    - F-M2-06 (LOW): `migrate_to_vN` are private (correct — only
      `run_migrations` dispatches to them). The visibility is the
      minimum needed. Good.
    - F-M2-07 (LOW): `column_exists` (line 409) uses an ad-hoc driver
      probe (`SELECT current_database()` succeeds on Postgres/MySQL,
      errors on SQLite) every time it is called. The migration runner
      calls it once per `migrate_to_v4`, so the cost is one extra
      round-trip per connect. Negligible. If M4 needs to call it more
      often, cache the result.
    - F-M2-08 (INFORMATIONAL): The `migrate_to_vN` functions are
      `async fn` taking `&self`. They are not `async fn migrate_to_vN(self: &Self)`-style
      explicitly, which is fine — the impl-block style is the idiomatic
      Rust shape. No issue.
    - F-M2-09 (INFORMATIONAL): The M2 refactor does not touch the
      `migrations/` directory (M3's scope). The docstring at lines
      165-167 says "The migration SQL files under migrations/ are the
      canonical human-readable reference. The Rust code here must stay
      in sync with those files." M2 does not break this invariant
      (DDL strings are byte-identical to the M1 baseline), but M3 must
      verify it.

  VERDICT: PASS with two MEDIUM observations (claim-then-DDL recovery window
  is documented but the test suite does not pin the recovery procedure;
  AUTOINCREMENT is SQLite-specific and will fail on Postgres/MySQL — must
  be addressed in M3). All M1 findings (F-M1-01, F-M1-02, F-M1-03,
  F-M1-04, F-M1-07, F-M1-08) remain fixed in the M2 refactor.

scope:
  - "src/store/mod.rs: Store::run_migrations (refactored to dispatch to per-version migrators)"
  - "src/store/mod.rs: Store::migrate_to_v1 .. migrate_to_v5 (new private methods)"
  - "src/store/mod.rs: m2_per_version_migrators_update_schema_version_independently, m2_migrators_are_idempotent_per_step, m2_ddl_error_propagates_through_migrator, m2_claim_and_record_are_consistent_with_schema_version, m2_v4_alone_with_minimal_preconditions, m2_run_migrations_records_all_versions_in_order, m2_run_migrations_idempotent_double_call, m2_ddl_uses_current_timestamp_only (new tests)"

# ─── Method ──────────────────────────────────────────────────────────────────
# Read review-request.yaml against the actual source. For each M2 claim
# (per-version migrators, schema-version update, error propagation,
# CURRENT_TIMESTAMP unification, E2E Checkpoint 2 idempotency) try to
# construct a counter-example that breaks the claim. Findings are organised
# by severity (CRITICAL first), with CWE / OWASP references and concrete
# remediation. Re-ran the commands the request claims to have run; results
# are noted in the claim_audit section.

# ─── Findings ────────────────────────────────────────────────────────────────
findings:

  # ─── CRITICAL ──────────────────────────────────────────────────────────────
  - id: F-M2-00-NONE
    severity: CRITICAL
    cwe: null
    category: null
    status: N/A
    title: "No CRITICAL findings."
    description: |
      M2 is a refactor that preserves the M1 concurrency contract (atomic
      `try_claim_migration`, portable `column_exists` pre-check, decode-error
      propagation). No memory-safety, data-race, or new security issue is
      introduced. The M1 fix surface (F-M1-01 .. F-M1-08) remains intact in
      the M2 code paths.

  # ─── HIGH ─────────────────────────────────────────────────────────────────
  - id: F-M2-00-NONE
    severity: HIGH
    cwe: null
    category: null
    status: N/A
    title: "No HIGH findings."
    description: |
      No HIGH-severity issue found. The M2 dispatcher propagates errors via
      `?` (verified by F-M2-03), `try_claim_migration` is mutually exclusive
      (verified by F-M1-08 / F-M2-04), and the `column_exists` pre-check
      avoids the over-broad substring match that F-M1-02 flagged.

  # ─── MEDIUM ────────────────────────────────────────────────────────────────
  - id: F-M2-01
    severity: MEDIUM
    cwe: CWE-754
    category: error-handling / partial-apply window
    status: KNOWN-DESIGN-TRADE-OFF
    title: >-
      Claim-then-DDL ordering leaves a partial-apply window: a panic or
      process kill between `try_claim_migration(N)` and the DDL body of
      `migrate_to_vN` writes the version row without applying the DDL.
    evidence:
      - "src/store/mod.rs:215-216 — `if !self.try_claim_migration(1).await? { return Ok(()); }` is the first statement of `migrate_to_v1`; the row is written BEFORE the four DDL statements"
      - "src/store/mod.rs:215-260 — same shape for v1, all four DDL statements run AFTER the claim"
      - "src/store/mod.rs:177-179 — the run_migrations docstring acknowledges this: 'a partial DDL failure leaves the version row present and a subsequent connect will skip the broken step (DBA can then drop the row manually)'"
      - "src/store/mod.rs:1987-2000 — `m2_ddl_error_propagates_through_migrator` confirms the row IS present after a v3 DDL failure (`assert!(store.is_migration_run(3).await.unwrap(), ...)`)"
    why_it_matters: >
      The M2 refactor narrows the failure surface (each migrator is one
      function, so the DDL body is in one place), but it does NOT narrow
      the partial-apply window itself. If the process is killed (or
      panics, or is OOM-killed) between the `try_claim_migration`
      INSERT and the CREATE TABLE, the next connect sees the version
      row already present, returns Ok early, and the schema_version
      table claims the DB is at vN when the actual schema is missing
      the vN tables.

      This is a real-world recovery problem: the plan's E2E Checkpoint
      2 promises "Store::connect returns Err on any migration failure"
      — but the error has to surface INSIDE the migrator, not from
      SIGKILL. The recovery is by DBA (drop the version row, restart),
      which is fine for an embedded SQLite app with one operator, but
      the test suite does not pin the recovery procedure down. A
      future regression that, say, wraps `try_claim_migration` and the
      DDL in a `tokio::task::spawn_blocking` could widen this window
      further without breaking any existing test.
    fix: >
      Either (a) tighten the test surface to pin the recovery procedure
      — a test that simulates a kill between claim and DDL (e.g. by
      calling `try_claim_migration(N)` directly on a fresh DB and
      asserting that `run_migrations` correctly skips the now-claimed
      vN — but the test then documents that the operator must drop
      the row to retry), or (b) defer the claim until after the DDL
      succeeds, accepting the narrower window but the SAME
      concurrent-writer race that the M1 fix (F-M1-01) closed. The
      trade-off is "M1-style TOCTOU vs M2-style partial-apply window";
      M2's choice is correct, and the test surface just needs to
      acknowledge it.

      Recommendation: add a test that calls `try_claim_migration(99)`
      (a version that does not exist) on a fresh DB, then calls
      `run_migrations`, and asserts that v99 is silently skipped (the
      claim returns true, the migrator does not exist, the dispatch
      does not error). Wait — `run_migrations` only dispatches to
      v1..v5, so v99 is never tried. The test needs to target a
      real version: call `try_claim_migration(4)` on a fresh DB,
      then `run_migrations` should skip the v4 DDL (claim already
      taken) and the DB should be missing the `created_at` column.
      This is the recovery shape; pin it down.
    references:
      - "M1 review F-M1-05 (partial-apply window) — same shape, M2 refactor preserves it"
      - "M1 plan top-of-run_migrations comment (line 177-179) — operator procedure documented"
    disposition: DEFER (not blocking M2; recovery procedure is operator-driven and documented)

  - id: F-M2-02
    severity: MEDIUM
    cwe: CWE-1104
    category: portability / SQL dialect mismatch
    status: DEFER-TO-M3
    title: >-
      `AUTOINCREMENT` on `messages.id` is SQLite-specific syntax and will
      fail to parse on Postgres / MySQL, violating the M2 E2E Checkpoint 2
      promise that `Store::connect` succeeds on a fresh DB.
    evidence:
      - "src/store/mod.rs:370 — `id INTEGER PRIMARY KEY AUTOINCREMENT` (inside `migrate_to_v5`)"
      - "src/store/mod.rs:165-168 — `run_migrations` docstring claims the runner is portable across SQLite / Postgres / MySQL: 'uses sqlx with runtime driver selection via `DATABASE_URL`'"
      - "src/store/mod.rs:27-63 — `Store::connect` accepts any of the three drivers via `AnyPool`"
      - "Postgres: `AUTOINCREMENT` is not a keyword; the equivalent is `GENERATED BY DEFAULT AS IDENTITY` (SQL standard) or `SERIAL` (Postgres-specific) — using `AUTOINCREMENT` returns a syntax error"
      - "MySQL: `AUTOINCREMENT` IS valid as a column attribute (not a keyword), so MySQL would actually accept this; only Postgres breaks"
      - "M2 test inventory: no test in M2 runs `run_migrations` against a Postgres or MySQL database"
    why_it_matters: >
      The M2 E2E Checkpoint 2 says "正常连接数据库时,所有的迁移步骤(v1-v5)
      都能幂等成功执行" — "any database". The M1 review-request
      (line 36-37) also notes the code is "portable across SQLite,
      Postgres, and MySQL". The M2 refactor does not introduce this
      issue (M1 had the same `AUTOINCREMENT` line), but it also does
      not fix it, and a future user who sets `DATABASE_URL` to a
      Postgres connection string will hit a `DDL failed: CREATE TABLE
      IF NOT EXISTS messages (...)` error on first connect and the
      program will refuse to start.

      M3 is the milestone that "synchronises and aligns migrations/
      SQL files with the Rust DDL". The v5 DDL is moved to
      `migrations/0005_messages.sql` in M3; that file should use
      `GENERATED BY DEFAULT AS IDENTITY` (SQL standard, supported by
      Postgres 10+ and SQLite 3.23+) or have a per-driver variant.
      M2's claim of portability is technically wrong for v5.
    fix: >
      M3: split the v5 DDL into driver-specific forms. The cleanest
      approach is the SQL standard `GENERATED BY DEFAULT AS IDENTITY`
      (Postgres 10+, SQLite 3.23+ via `INTEGER PRIMARY KEY` is
      already auto-rowid; MySQL 8.0+ supports it; older MySQL needs
      `AUTO_INCREMENT`). If the project's minimum supported MySQL is
      < 8.0, add a runtime driver check in `migrate_to_v5` and pick
      the right keyword per driver.

      For now (M2), the existing test surface (SQLite only) does not
      exercise the Postgres path, so the issue is dormant. Mark as
      DEFER-TO-M3.
    references:
      - "M2 E2E Checkpoint 2 (plan.md line 34) — 'Store::connect returns Err on any migration failure'; the failure here is on first connect, not on a migration step"
      - "M1 review-request line 36 — 'portable across SQLite, Postgres, and MySQL' (claim is partially wrong)"
    disposition: DEFER (M3 must address; M2 itself passes its own tests)

  - id: F-M2-03
    severity: MEDIUM
    cwe: CWE-209
    category: information-disclosure / log size
    status: INFORMATIONAL
    title: >-
      `ddl()` formats the full DDL string into the error message,
      which can produce large log lines for the multi-DDL migrators.
    evidence:
      - "src/store/mod.rs:461 — `.map_err(|e| anyhow::anyhow!(\"DDL failed: {sql}\\n  Error: {e}\"))`"
      - "src/store/mod.rs:300-303 (v3) — 71-char DDL string"
      - "src/store/mod.rs:218-256 (v1) — four DDLs, ~600 chars total"
      - "src/store/mod.rs:368-392 (v5) — three DDLs, ~600 chars total"
    why_it_matters: >
      On a real production crash with a real SQL string in flight,
      the user-visible log line includes the entire DDL inline. For
      v1 (four tables) and v5 (one table + two indexes) the
      cumulative string length is ~600 chars per migrator. In a
      structured-log sink (JSON via tracing-subscriber's
      `tracing-subscriber::fmt::format::Json`), each log entry is one
      JSON object and the SQL is one field; if the field is repeated
      across thousands of crashes per minute, the log volume
      increases materially. Not a security vulnerability in the OWASP
      sense, but a low-grade operational concern.
    fix: >
      Either truncate the SQL in the error message to a head/tail
      snippet (e.g. `&sql[..80.min(sql.len())]` and `&sql[sql.len().saturating_sub(40)..]`)
      and reference the rest by `sqlx::query` builder state, or
      accept the operational cost. Not blocking M2.
    disposition: INFORMATIONAL (no fix required)

  # ─── LOW ──────────────────────────────────────────────────────────────────
  - id: F-M2-04
    severity: LOW
    cwe: null
    category: design / refactor confirmation
    status: CONFIRMED-CORRECT
    title: >-
      M2 dispatcher propagates DDL errors via `?`; `run_migrations`
      returns Err on the first failing migrator.
    evidence:
      - "src/store/mod.rs:204-208 — `self.migrate_to_v1().await?; ...` (no swallowing, no `.map_err` wrappers)"
      - "src/store/mod.rs:212-396 — each `migrate_to_vN` is a single function whose body is `try_claim_migration → ddl().await? → ddl().await? → ... → Ok(())`"
      - "src/store/mod.rs:218-256 (migrate_to_v1) — no `.map_err(|e| anyhow!(...))` wrappers around DDL; relies on `ddl()`'s own error message"
      - "src/store/mod.rs:1988-1992 — F-M2-03 test: `let result = store.migrate_to_v3().await; assert!(result.is_err(), ...)`"
    why_it_matters: >
      This is the headline M2 invariant and the explicit F-M2-03
      coverage. Confirmed correct. The .map_err wrappers around
      CREATE INDEX / ALTER TABLE were removed in M2 (the
      behavioural_diff section of the review-request claims this);
      the diff at lines 87-117 of the M2 commit confirms the
      removal.
    fix: null
    disposition: CONFIRMED-CORRECT (no fix required)

  - id: F-M2-05
    severity: LOW
    cwe: null
    category: API surface / visibility
    status: DEFERRED
    title: >-
      `try_claim_migration` and `record_migration_run` remain `pub`;
      the M1 review-request flagged `record_migration_run` as a
      future-tightening target. M2 did not tighten either.
    evidence:
      - "src/store/mod.rs:135 — `pub async fn try_claim_migration(&self, version: i32) -> Result<bool>`"
      - "src/store/mod.rs:151 — `pub async fn record_migration_run(&self, version: i32) -> Result<()>`"
      - "src/store/mod.rs:1268-1269 — `record_migration_run` is called only from `store_tests` (test code), so `pub(crate)` would still be visible from the same crate's tests"
      - "src/store/mod.rs:215-365 — `migrate_to_vN` is `async fn` (private); visibility is correct"
    why_it_matters: >
      `try_claim_migration` is referenced from the M1 test surface
      (line 1845: `let first = store.try_claim_migration(5).await.unwrap();`)
      and could be referenced from external code. `record_migration_run`
      has no external callers — only `store_tests` uses it. Tightening
      the latter to `pub(crate)` would surface as a one-line change
      and a test compile-fix. Low-priority cleanup.
    fix: >
      `pub(crate) async fn record_migration_run(...)` (and
      correspondingly `pub(crate) async fn try_claim_migration(...)`
      if no external crate references it — a quick grep confirms
      `try_claim_migration` is called from `store_tests` only).
      Trivial change, deferred.
    disposition: DEFER (cleanup, not a security issue)

  - id: F-M2-06
    severity: LOW
    cwe: null
    category: API surface / visibility
    status: CONFIRMED-CORRECT
    title: "`migrate_to_vN` are private; only `run_migrations` dispatches to them."
    evidence:
      - "src/store/mod.rs:214, 263, 295, 321, 364 — all `migrate_to_vN` are `async fn` (no `pub`)"
      - "src/store/mod.rs:204-208 — `run_migrations` is the only caller"
    why_it_matters: >
      The dispatcher is the canonical entry point; the per-version
      functions are implementation details. Visibility is correct.
    fix: null
    disposition: CONFIRMED-CORRECT (no fix required)

  - id: F-M2-07
    severity: LOW
    cwe: null
    category: performance / repeated probe
    status: INFORMATIONAL
    title: >-
      `column_exists` issues a `SELECT current_database()` probe on
      every call to discover the driver.
    evidence:
      - "src/store/mod.rs:418-421 — `let is_sqlite = sqlx::query(\"SELECT current_database()\").fetch_optional(&self.pool).await.is_err();`"
      - "src/store/mod.rs:409 — `column_exists` is called once per `migrate_to_v4` (one extra round-trip per connect)"
    why_it_matters: >
      The probe is cheap (one extra round-trip per connect during
      migration). For a 295-test suite running in CI it adds ~295
      round-trips. Negligible in absolute terms; mention only so a
      future refactor does not, say, wrap the probe in a `loop { sleep; probe; }`.
    fix: null
    disposition: INFORMATIONAL (no fix required)

  # ─── INFORMATIONAL ────────────────────────────────────────────────────────
  - id: F-M2-08
    severity: INFORMATIONAL
    cwe: null
    category: style
    status: CONFIRMED-CORRECT
    title: "`migrate_to_vN` are `async fn` taking `&self`; idiomatic shape."
    evidence:
      - "src/store/mod.rs:214, 263, 295, 321, 364 — `async fn migrate_to_vN(&self) -> Result<()>`"
    why_it_matters: >
      The shape is the canonical Rust async-method-on-struct pattern.
      No lifetime / Send / Sync concern (Store holds a `sqlx::AnyPool`
      which is already Send + Sync).
    fix: null
    disposition: CONFIRMED-CORRECT (no fix required)

  - id: F-M2-09
    severity: INFORMATIONAL
    cwe: null
    category: doc / sync
    status: CONFIRMED-CORRECT
    title: >-
      M2's DDL strings are byte-identical to the M1 baseline. M3 must
      verify that `migrations/*.sql` matches.
    evidence:
      - "src/store/mod.rs:218-256, 268-287, 300-302, 342, 351-353, 368-391 — DDL strings in M2"
      - "git diff 5ff7cc6..HEAD -- src/store/mod.rs (lines 200-380) — DDL strings are unchanged from M1; only the surrounding function-boundary is new"
      - "M3 plan clause: 'use diff to check SQL statements ... are aligned with SQL string content in Rust code'"
    why_it_matters: >
      M2 does not break the M1 invariant that the Rust DDL strings
      must match `migrations/*.sql`. M3 will introduce the SQL files
      and run the diff. The M2 refactor is purely structural.
    fix: null
    disposition: CONFIRMED-CORRECT (no fix required; M3 will verify)

