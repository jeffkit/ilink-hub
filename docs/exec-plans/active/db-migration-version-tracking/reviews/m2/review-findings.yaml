    verified: yes (passes; v3 DDL failure → Err; row still present — confirms F-M2-01 design)
  - test: m2_claim_and_record_are_consistent_with_schema_version
    pin: "F-M2-04"
    verified: yes (passes; second try_claim loses)
  - test: m2_v4_alone_with_minimal_preconditions
    pin: "F-M2-05"
    verified: yes (passes; v4 alone on a partial DB works)
  - test: m2_run_migrations_records_all_versions_in_order
    pin: "F-M2-06"
    verified: yes (passes; all 5 versions recorded)
  - test: m2_run_migrations_idempotent_double_call
    pin: "F-M2-07"
    verified: yes (passes; double run is no-op)
  - test: m2_ddl_uses_current_timestamp_only
    pin: "F-M2-08"
    verified: yes (passes; no datetime('now') residue in sqlite_master)
  note: |
    The M2 test surface is well-targeted. Two concerns not pinned by the
    M2 tests (left as DEFERs above):
      - The recovery procedure for a partial-apply window (F-M2-01
        disposition: a DBA drops the version row; this should be
        documented as a runbook step but is not a test concern).
      - Postgres / MySQL driver paths (F-M2-02 AUTOINCREMENT, plus
        any other dialect-specific syntax). M3 introduces the SQL
        files and is the right place to add driver-specific tests.

