# ─── Behavioural diff vs. baseline (5ff7cc6) ───────────────────────────────
behavioural_diff:
  - area: "Migration runner structure"
    before: >-
      run_migrations was a single ~225-line function with five inline if-blocks
      (one per version). Each block called self.ddl(...) one or more times and
      emitted a tracing::info! log line.
    after: >-
      run_migrations is now a thin dispatcher that calls five private
      migrate_to_vN functions in order. Each migrator is ~30-60 lines,
      gated by try_claim_migration, with a single responsibility. The
      per-step .map_err(|e| ...) wrappers around DDL have been removed.
    security_classification: "No security impact — refactor only."
  - area: "DDL error propagation"
    before: >-
      CREATE INDEX and ALTER TABLE had explicit .map_err(|e| anyhow!(...))
      wrappers that re-formatted the error chain with the migration name.
      CREATE TABLE statements used the bare .await? form. The behaviour
      (errors propagate) was correct, but the surface was inconsistent.
    after: >-
      All DDL statements use the bare .await? form. The ddl() helper at
      src/store/mod.rs:447 already prefixes its error with
      "DDL failed: {sql}\n  Error: {e}", which is sufficient context.
    security_classification: "No security impact — error path simplification only."

