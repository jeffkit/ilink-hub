checkpoint: "M2 — 重构 Store::run_migrations 并支持版本管理逻辑"

# ─── Scope of this checkpoint ──────────────────────────────────────────────
# Refactor run_migrations into per-version migrate_to_vN functions, each
# gated by try_claim_migration and propagating DDL errors via ? so
# Store::connect returns Err on any migration failure. Confirms idempotency,
# incremental upgrade, and CURRENT_TIMESTAMP unification.

# ─── Source-of-truth changes for M2 ─────────────────────────────────────
source_changes:
  - file: src/store/mod.rs
    symbols:
      - "Store::run_migrations"
      - "Store::migrate_to_v1"
      - "Store::migrate_to_v2"
      - "Store::migrate_to_v3"
      - "Store::migrate_to_v4"
      - "Store::migrate_to_v5"
    change_summary: >-
      Refactored run_migrations to dispatch to five per-version migrator
      functions (migrate_to_v1 ... migrate_to_v5). Each function is gated
      by try_claim_migration, runs its DDL block via the existing ddl()
      helper (which propagates errors via ?), and emits a structured
      tracing::info! log line. Removed the explicit .map_err(|e| ...)
      wrappers around CREATE INDEX / ALTER TABLE — the ddl() helper's own
      DDL-failed message is sufficient context. Confirmed all DDL uses
      CURRENT_TIMESTAMP (no datetime('now') residue) and the schema_version
      table is updated atomically by the claim primitive.

