# ─── M1 findings folded into M2 ─────────────────────────────────────────
# F-M1-05 (partial-apply window): the M2 refactor narrows the failure
# surface — each migrate_to_vN is now isolated, so a DDL failure inside
# v3 leaves v1, v2 applied and v3's claim row present. The next connect
# observes v3 as claimed and skips the broken step (DBA drops the row).
# This is the same behaviour the M1 plan documented at the top of
# run_migrations; the M2 refactor makes the per-step boundary explicit.
# F-M1-07 (pub API surface): record_migration_run remains pub for
# symmetry with the M1 review surface. The new migrate_to_vN functions
# are private (async fn) — only run_migrations dispatches to them.
# A future hardening pass can tighten record_migration_run to pub(crate).

