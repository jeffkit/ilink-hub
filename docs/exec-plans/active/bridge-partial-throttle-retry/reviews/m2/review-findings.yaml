notes_for_author: |
  整体审查结论:M2 在 **架构 / cancel-safety / panic-safety / Err-no-spin** 这些核心
  不变量上都写得很扎实,select! biased + shutdown.cancelled() 模式一致,SendOutcome
  类型化、send_future drop 不会 partway-send、Err 清空 pending 防 spin 都是教科书式的
  实现。`backoff_for_with` 的 overflow 处理用 SATURATION_SHIFT=20 + saturating_mul
  是正确的纯函数实现。

  但是,**关键的测试覆盖漏洞**让 E2E-1 场景 B 失去集成层面保证:F-M2-001 让测试
  effective schedule 退化为固定 1s,即便你后续加上 wall-clock 断言也能发现问题。
  这条需要先修。

  修复 F-M2-001 + F-M2-002 后,核心 spec (E2E-1) 落地才算完整。
  F-M2-004 (session_name sanitize) 是 P1 防御性补强,与 M1 errmsg 处理标准对齐。
  其余 P2/P3 是代码质量 / 风格,可在本 PR 或后续清理。
