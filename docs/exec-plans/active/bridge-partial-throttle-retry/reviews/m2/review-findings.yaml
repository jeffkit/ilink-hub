# ─── Severity legend ───────────────────────────────────────────────────────
# P0: 直接产生运行时 panic / 数据竞争 / 安全漏洞；需立即修复才能合并
# P1: 业务正确性缺陷（违反 spec）或重大测试盲区
# P2: 文档/语义不一致 / 代码风格 / 防御性补强
# P3: 优化建议 / 后续 milestone 范围

findings:
  # ─── P0: 高危 ───────────────────────────────────────────────────────────
  - id: F-M2-001
    severity: P0
    title: "backoff_for_test 的 ms→s 截断把测试退化为固定间隔,完全无法验证指数退避在循环中的实际生效"
    location: src/bridge/dispatcher.rs:44-47 (backoff_for_test) 与 src/bridge/dispatcher.rs:1478-1484 (test_backoff)
    description: |
      `backoff_for_test` 把传入的 `Duration` 通过 `.as_secs()` 转成 u64 后取 `max(1)`:
        `Duration::from_millis(5).as_secs()`  = 0  → max(1) = 1
        `Duration::from_millis(40).as_secs()` = 0  → max(1) = 1
      effective schedule = initial=1s, cap=1s。`backoff_for_with` 中
      `raw = initial * multiplier`,对任何 multiplier ≥ 1 都得到 ≥ 1,再 `min(1) = 1`。
      所以 partial_* 集成测试中实际生效的 backoff 序列是 [1s, 1s, 1s, 1s, ...] —
      **退化成固定 1 秒间隔**,与测试注释("5ms initial, 40ms cap")及测试名
      ("partial_persistent_throttle_caps_retry_at_max_backoff")宣称的 exponential
      schedule 不一致。
      影响:
        - 退避计算的纯函数正确性有 `backoff_sequence_matches_spec` 钉死[5,10,20,40,60,60,...]
          ✓(生产常量不受影响,因为 `backoff_for` 直接用 `INITIAL_BACKOFF_SECS` / `MAX_BACKOFF_SECS` u64 常量)。
        - 但 **loop 层面的指数退避行为** 在 partial_* 集成测试中完全没有验证:
            · `partial_persistent_throttle_caps_retry_at_max_backoff` 没有断言时间间隔,
              只断言 send 次数(4)和最后一次的文本(`chunk-2`)。
              任意 fixed-interval 退避都能通过这个断言。
            · `partial_three_throttles_then_success_delivers_latest_content` 同理 —
              只断言 `texts.len()==4` 与 `texts.last()=="v3"`。
            · 这两个测试加在一起完全无法区分"固定间隔重试"和"exponential-with-cap"两种实现,
              违反 plan.md E2E-1 场景 B "退避间隔单调不递减,并稳定收敛到 ≤ 60s" 的核心断言。
      该缺陷不导致生产 bug,但意味着 M2 的核心 spec (E2E-1 场景 B) **没有单测覆盖**。
    evidence:
      - "line 46: backoff_for_with(attempt, initial.as_secs().max(1), cap.as_secs().max(1))"
      - "line 1483: backoff_for_test(attempt, Duration::from_millis(5), Duration::from_millis(40))"
      - "polling 循环 200×25ms = 5s 上限 + 2s timeout 足够在 fixed-1s 节奏下完成 4 次 retry"
    recommendation: |
      选择以下任一方案修复:
      (a) **改用 ms 路径**:让 backoff_for_with 接受 u64 millis 而非 secs,
          或新增 `backoff_for_with_millis(attempt, initial_ms, cap_ms) -> Duration`。
          测试可以传 5ms / 40ms,实际序列为 [5ms, 10ms, 20ms, 40ms, 40ms, ...] —
          这样 partial_persistent_throttle_caps_retry_at_max_backoff 才能真正验证
          "exponential-then-cap" 行为(应在第 3 次 throttle 后看到 sleep 收敛到 40ms)。
      (b) **改用 secs 路径(更简单)**:把 test_backoff 改成
          `backoff_for_test(attempt, Duration::from_millis(20), Duration::from_millis(100))`
          — 20ms 截断成 0,max(1) = 1 还是不行;需要 ≥1000ms。
          直接 `backoff_for_with(attempt, 1, 4)` 作为 fn 指针传进去,序列为 [1,2,4,4,...]s
          — 但这样总时长 1+2+4=7s,接近 tokio test 默认 10s timeout 边界,fragile。
      优先选 (a),代价小且真实地测试了 ms 级 backoff。
      修复后,新增测试断言:
        - 收集两次 throttle 之间的 wall-clock 时间,断言单调非递减且收敛到 cap。

  # ─── P1: 业务正确性 / 测试盲区 ────────────────────────────────────────
  - id: F-M2-002
    severity: P1
    title: "E2E-1 场景 B(退避单调不递减且收敛)在 loop 集成层面无断言覆盖"
    location: tests partial_persistent_throttle_caps_retry_at_max_backoff, partial_three_throttles_then_success
    description: |
      见 F-M2-001。即便 backoff_for_test 修复后,这两个测试**目前**也只断言
      `texts.len()` 和 `texts.last()`,**没有**断言"相邻两次 send 之间的
      elapsed 时间"。所以即便 backoff schedule 是正确的(例如真正 [5ms,10ms,20ms,40ms]),
      这两个测试也无法验证 — 任何固定 40ms 间隔都能通过。
      plan.md E2E-1 场景 B 要求"退避间隔单调不递减,稳定收敛到 ≤ 60s"。
      单元层 (`backoff_is_non_decreasing`) 钉死了纯函数,但 loop 集成层缺测试。
    recommendation: |
      在修复 F-M2-001 之后,改写 `partial_persistent_throttle_caps_retry_at_max_backoff`:
      - 在 `ScriptedSender::send_reply` 里记录 wall-clock 时间戳 (e.g. `Instant::now()`)
      - 收集所有 timestamp diff,断言 diff 序列单调非递减
      - 断言:对 N 次连续 throttle,至少前几次的 diff 是 2× 关系(或至少严格递增)
        直到 diff 收敛到 cap 附近
      这样可以真正捕获"忘了 bump attempt" / "hardcoded sleep" 类回归。

  - id: F-M2-003
    severity: P1
    title: "run_partial_forward_loop 的 overwrite 语义对 attempt 计数器的影响需要 test 钉死"
    location: src/bridge/dispatcher.rs:359-378 (overwrite 内循环)
    description: |
      overwrite 分支(line 372-378)故意**不**重置 attempt,只重算 backoff:
        `backoff = backoff_fn(attempt)`  // line 378
      注释说"the hub is still throttling us; just keep extending the wait" —
      意图是 attempt 不应被一次 overwrite 重置,否则 Throttled 的指数退避
      会被任意 CLI 节奏的 overwrite 抹平。

      但 `partial_chunk_overwritten_during_backoff_drops_stale_fragment` 测试只断言
      `v1_count == 1` 与 `v2_count == 2` 和最终 sent 顺序,没有断言 attempt 计数
      行为(例如"v2 第二次 send 的间隔应该等于或大于 v1 的间隔")。
      如果有人未来错误地改成 `attempt = 0` on overwrite,这个测试不会捕获。
    recommendation: |
      在 `partial_chunk_overwritten_during_backoff_drops_stale_fragment` 中,
      至少加一个断言:两次 v2 send 之间的时间差 ≥ 第一次 v2 send 与第一次 v1 send
      之间的时间差(粗略验证 attempt 没被重置)。

  - id: F-M2-004
    severity: P1
    title: "HubClient ReplySender impl 中 session_name 未做长度/控制字符 sanitize"
    location: src/bridge/dispatcher.rs:282-298
    description: |
      `session_name` 直接来自上游 `WeixinMessage.ilink_hub_ext.session_name`,
      经过 `to_string()` 后挂到 `req.msg.ilink_hub_ext.session_name`,并最终被
      `tracing::info!(session_name = %session_name_for_cli, ...)` (line 855) 记录。
      没有任何长度/控制字符 sanitize:
        - 如果上游传入 10MB 字符串,会消耗 send_future 的内存(reqwest 序列化时),
          并写入 log(如果 log writer 同步,会 block runtime)。
        - 如果上游传入含 ANSI escape / CR/LF 的字符串,可能污染 log 行(虽然 % formatting
          会 Display escape 一些字符,但 session_name 是 field 而不是 message)。
      M1 已对 `errmsg` 引入 `sanitize_errmsg`(`MAX_LEN=256`,剥离控制字符),
      但 session_name 路径未被同样处理。
    recommendation: |
      在 dispatcher.rs 中复用 `sanitize_errmsg` 的策略(或抽出一个通用
      `sanitize_field(input: &str, max_len: usize) -> String`),把 session_name
      在 attach 到 ilink_hub_ext 之前 sanitize 一次。
      类似地 `from_user` 也是从上游来,但通过 HubClient::getupdates 已经在更上层
      被处理,不在本 PR 范围内。

  # ─── P2: 文档/语义不一致 / 风格 ────────────────────────────────────────
  - id: F-M2-005
    severity: P2
    title: "test_backoff 注释与实际 effective schedule 不符"
    location: src/bridge/dispatcher.rs:1478-1484
    description: |
      注释写"5ms initial, 40ms cap — small enough that 4 retries still complete
      well under the tokio test timeout",但实际 effective schedule 是
      initial=1s, cap=1s(由 backoff_for_test 的 .as_secs().max(1) 截断产生)。
      注释会误导未来读者。
    recommendation: |
      修复 F-M2-001 后更新注释;或者如果保持现状(测试慢但能跑),
      至少注释改为如实描述 "effective: 1s initial, 1s cap — fixed-interval
      in test; production schedule is exercised by `backoff_sequence_matches_spec`"。

  - id: F-M2-006
    severity: P2
    title: "overwrite 内循环 line 378 的 backoff 重算在 attempt 不变时是无操作(dead-ish code)"
    location: src/bridge/dispatcher.rs:378
    description: |
      `backoff = backoff_fn(attempt)` 在 attempt 没变的情况下,值不变。
      代码上无害(no functional bug),但读者会困惑 — 看上去在"重置 sleep 计时",
      实际只是重新计算一个相等的值。
      注释也含糊:"cap the sleep to the new (same) backoff value so we don't
      get stuck past the cap"。
    recommendation: |
      删掉 line 378,或改为:
        `// backoff unchanged — attempt is intentionally preserved across overwrites`
      让意图自解释。

  - id: F-M2-007
    severity: P2
    title: "err_sender_once 是 dead helper,只被 `_keep_err_sender_helper_in_scope` 调用"
    location: src/bridge/dispatcher.rs:1458-1463, 1826-1829
    description: |
      `err_sender_once` 不被任何测试使用,只通过 `_keep_err_sender_helper_in_scope`
      (一个 `#[allow(dead_code)]` 函数)被 keep alive。这是 dead code —
      注释里写的"future test expansions have a single canonical builder"
      是 forward-looking justification,但目前没有任何 future-looking 需求。
      与 review-request.yaml 中"三连删死代码"的工程美学不符。
    recommendation: |
      删除 `err_sender_once` 与 `_keep_err_sender_helper_in_scope`。
      等真需要时再加(且到时候的设计很可能与现在不同,YAGNI)。

  - id: F-M2-008
    severity: P2
    title: "parse_unparseable_body_falls_back_to_sent 注释承诺 caller 会发 warn,但 dispatcher sendmessage 的 warn 可能不触发"
    location: src/bridge/dispatcher.rs:1214-1221 与 src/bridge/dispatcher.rs:242-256
    description: |
      测试注释说"the dispatcher now emits a warn log; the unit test pins the
      fallback itself"。看 sendmessage(line 242-256):warn 只在 body_len > 0 且
      outcomes 是 `Sent` 且 JSON parse 失败时触发 — 这个组合是可能但不显然的:
      - body 长度 0 → 不 warn(返回 Ok(Sent) 给 caller,caller 不知)
      - body 非空 + JSON parse OK + ret=0 → 不 warn
      - body 非空 + JSON parse OK + ret=-2 → 不 warn(走 Throttled 分支)
      - body 非空 + JSON parse 失败 → warn + 返回 Ok(Sent) ← 唯一 warn 路径
      实际行为没问题,但注释的措辞("silent fallback is observable")会让读者
      以为所有非空 body 都有 warn,实际只有"非空 + parse 失败"这一支。
    recommendation: |
      改 `parse_unparseable_body_falls_back_to_sent` 注释为:"warn only fires
      when body_len > 0 AND JSON parse fails AND outcome would otherwise be Sent"。

  # ─── P3: 优化建议 ────────────────────────────────────────────────────────
  - id: F-M2-009
    severity: P3
    title: "SendMessageRequest::reply_text 在 session_name 为空字符串时仍会把空 session_name 挂上"
    location: src/bridge/dispatcher.rs:293
    description: |
      即便 `session_name_for_cli.unwrap_or("default")` 不会产生空字符串,
      但 trait ReplySender 的 send_reply 接受任意 &str session_name,
      调用者可能传 ""。当前 impl 会把空 session_name 挂到 ilink_hub_ext
      (Some(""))而不是保持 None,这会改变序列化输出。
      实际上 handle_one_message line 851 用 `unwrap_or("default")` 兜底,
      所以 "" 不会从 production 路径到达;但 trait 接口允许传 ""。
    recommendation: |
      在 impl HubClient 的 send_reply 中:
        if !session_name.is_empty() { ext.session_name = Some(session_name.to_string()); }
      防御性更强。

  - id: F-M2-010
    severity: P3
    title: "未来 give-up 上限 (M4) 引入前,partial 循环在 permanent throttle 下 attempt 会无限增长"
    location: src/bridge/dispatcher.rs:407-408
    description: |
      `attempt = attempt.saturating_add(1)` 在 u32 上是 safe(不会溢出),
      但 permanent throttle 下 attempt 会单调递增到 u32::MAX,虽然不影响行为
      (backoff cap 在 60s) 但日志里 `attempt` 字段会变成天文数字,
      不利于可观测性。这是 plan.md "non_goals: M4 引入 give-up 上限" 明示的
      已知范围,不需要在 M2 修复。
    recommendation: |
      留给 M4。设计 notes 已记录。

# ─── Correctness checklist (no findings below) ──────────────────────────────
checked_no_issue:
  - "退避计算 backoff_for 在 u32::MAX 处: saturating_mul + SATURATION_SHIFT=20 正确处理,无 panic"
  - "backoff 序列 [5,10,20,40,60,60,...] 与 spec 完全一致,backoff_sequence_matches_spec 钉死"
  - "shutdown 在 phase 1 的两个分支(pending None 与 pending Some 内循环)都被 select! biased 第一支观察,in-flight sleep 可被 cancel 唤醒"
  - "shutdown 在 phase 2 的 send 阶段也被 select! biased 观察,send_future drop 不会产生 partway-sent HTTP"
  - "Err 分支(line 421-429)清空 pending + 重置 attempt,无 spin 死循环风险"
  - "Throttled 分支(line 407-420)bump attempt + 回到 phase 1,正确进入 backoff sleep"
  - "SendOutcome 不携带 unsent payload — caller 必须自己 retain,设计注释明确(M2 用 pending 持有)"
  - "ReplySender trait 的 Send + Sync + 'static bound 允许 HubClient impl,且 tokio::spawn generic S 安全"
  - "HubClient.sendmessage 是 &self,impl 内部调用 self.sendmessage(req) 自动 reborrow,无 move-out 问题"
  - "production 路径无新增裸 unwrap (仅 expect("reqwest client") / expect("pending must be Some") 等 invariant 守卫)"
  - "session_dispatch_key 与 SessionDispatcher 的 std::sync::Mutex 持有时间短,无 await 跨临界区"
  - "SendMessageRequest::reply_text 始终设置 msg=Some,所以 if let Some(ref mut msg) 在 ReplySender impl 中总是命中"

